name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify governance files
        shell: bash
        run: |
          set -euo pipefail
          test -f AGENT.md
          test -f AGENTS.md
          test -f README.md
          test -f CONTRIBUTING.md
          test -f ROADMAP.md
          test -f TODO.md
          test -f CHANGELOG.md
          test -f docs/ci-cd-policy.md
          test -f docs/manual-intervention.md
          test -f docs/release-strategy.md
          test -f .github/workflows/release.yml
          test -f apps/linux-cli/README.md
          test -f crates/config-core/README.md
          test -f crates/control-domain/README.md
          test -f crates/control-runtime/README.md
          test -f crates/engine-native/README.md
          test -f crates/platform-linux/README.md
          test -f docs/architecture/control-kernel-domain.md
          test -f docs/architecture/control-kernel-interfaces.md
          test -f docs/architecture/proxy-engine-adapter.md
          test -f docs/architecture/control-runtime-orchestration.md
          test -f docs/architecture/ios-platform-risk-assessment.md
          test -f docs/architecture/linux-artifact-pre-release-design.md
          test -f docs/architecture/linux-platform-adapter.md
          test -f docs/architecture/linux-cli-entrypoint.md
          test -f docs/architecture/linux-cli-runtime-wiring.md
          test -f docs/architecture/native-engine-listener-node-config.md
          test -f docs/architecture/linux-native-proxy-engine-start.md
          test -f docs/architecture/linux-cli-artifact-installation-rollback.md
          test -f docs/architecture/linux-package-artifact-manifest.md
          test -f docs/architecture/linux-artifact-license-notice-confirmation.md
          test -f docs/architecture/release-ci-success-source-contract.md
          test -f docs/architecture/linux-package-runner-toolchain-target-contract.md
          test -f docs/architecture/linux-package-archive-staging-contract.md
          test -f docs/architecture/linux-package-checksum-manifest-contract.md
          test -f docs/architecture/linux-package-publish-upload-boundary-contract.md
          test -f docs/architecture/linux-package-signing-attestation-policy-binding-contract.md
          test -f docs/architecture/linux-package-release-notes-rollback-policy-binding-contract.md
          test -f docs/architecture/linux-package-publish-eligibility-aggregate-contract.md
          test -f docs/architecture/adr-0001-initial-core-stack.md
          grep -q "本机只负责代码" AGENT.md
          grep -q "GitHub Actions" docs/ci-cd-policy.md
          grep -q "Roadmap" ROADMAP.md
          grep -q "TODO" TODO.md
          grep -q "Changelog" CHANGELOG.md
          grep -q "linux-artifact-readiness" .github/workflows/release.yml
          grep -q "Linux artifact readiness" .github/workflows/release.yml
          grep -q "Linux Artifact Manifest Output Contract" .github/workflows/release.yml
          grep -q "linux-artifact-manifest-output-fields" .github/workflows/release.yml
          grep -q "Linux Artifact License/NOTICE Source Contract" .github/workflows/release.yml
          grep -q "linux-artifact-license-notice-source=docs/manual-intervention.md" .github/workflows/release.yml
          grep -q "Release CI Success Source Contract" docs/architecture/release-ci-success-source-contract.md
          grep -q "release-ci-success-source-contract=present" .github/workflows/release.yml
          grep -q "Linux Package Runner Toolchain Target Contract" docs/architecture/linux-package-runner-toolchain-target-contract.md
          grep -q "linux-package-platform-input-contract=present" .github/workflows/release.yml
          grep -q "linux-package-required-target=x86_64-unknown-linux-gnu" .github/workflows/release.yml
          grep -q "Linux Package Archive Staging Contract" docs/architecture/linux-package-archive-staging-contract.md
          grep -q "linux-package-archive-staging-contract=present" .github/workflows/release.yml
          grep -Fq 'linux-package-required-staging-root=dist/linux/${target}/staging' .github/workflows/release.yml
          grep -q "Linux Package Checksum Manifest Contract" docs/architecture/linux-package-checksum-manifest-contract.md
          grep -q "linux-package-checksum-manifest-contract=present" .github/workflows/release.yml
          grep -q "linux-package-checksum-algorithm=sha256" .github/workflows/release.yml
          grep -Fq 'linux-package-required-archive-checksum-name=networkcore-linux-${version}-${target}.tar.gz.sha256' .github/workflows/release.yml
          grep -Fq 'linux-package-required-manifest-checksum-path=dist/linux/${target}/artifacts/networkcore-linux-${version}-${target}.manifest.json.sha256' .github/workflows/release.yml
          grep -q "linux-package-manifest-archive-checksum-field=checksum.value" .github/workflows/release.yml
          grep -q "Linux Package Publish Upload Boundary Contract" docs/architecture/linux-package-publish-upload-boundary-contract.md
          test "$(grep -Ec '^          echo "linux-package-publish-upload-boundary-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-workflow-artifact-upload=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-workflow-artifact-name=networkcore-linux-[$][{]version[}]-[$][{]target[}]-release-bundle'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-workflow-artifact-retention-days=14"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-job-name=publish-github-release"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-download-source=same-run-workflow-artifact"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-release-asset-overwrite-policy=forbidden"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-release-asset-upload=blocked"$' .github/workflows/release.yml)" -ge 3
          grep -q "Linux Package Signing Attestation Policy Binding Contract" docs/architecture/linux-package-signing-attestation-policy-binding-contract.md
          test "$(grep -Ec '^          echo "linux-package-signing-attestation-policy-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-signing-policy=unsigned-no-detached-signature"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-attestation-policy=github-artifact-attestation-required"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-attestation-status=blocked-not-attested"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-provenance-file=github-artifact-attestation"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-without-attestation=blocked"$' .github/workflows/release.yml)" -ge 3
          grep -q "Linux Package Release Notes Rollback Policy Binding Contract" docs/architecture/linux-package-release-notes-rollback-policy-binding-contract.md
          test "$(grep -Ec '^          echo "linux-package-release-notes-rollback-policy-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-release-notes-policy=required-before-publish"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-release-notes-status=blocked-not-generated"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-rollback-status=blocked-not-summarized"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-withdrawal-policy=withdrawal-not-overwrite"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-without-rollback=blocked"$' .github/workflows/release.yml)" -ge 3
          grep -q "Linux Package Publish Eligibility Aggregate Contract" docs/architecture/linux-package-publish-eligibility-aggregate-contract.md
          test "$(grep -Ec '^          echo "linux-package-publish-eligibility-aggregate-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-eligibility-status=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-eligibility-license-notice=blocked-pending"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-eligibility-ci=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-eligibility-release-asset=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-publish-eligibility-next-action=license-notice-confirmation-required"$' .github/workflows/release.yml)" -ge 3
          grep -q "linux-artifact-license-notice-status=pending" docs/manual-intervention.md
          grep -q "linux-artifact-license-notice-source-contract=docs/architecture/linux-artifact-license-notice-confirmation.md" docs/manual-intervention.md
          grep -q "networkcore-linux" apps/linux-cli/README.md
          grep -q "config-core" crates/config-core/README.md
          grep -q "\"crates/config-core\"" Cargo.toml
          grep -q "control-domain" crates/control-domain/README.md
          grep -q "control-runtime" crates/control-runtime/README.md
          grep -q "engine-native" crates/engine-native/README.md
          grep -q "\"crates/engine-native\"" Cargo.toml
          grep -q "platform-linux" crates/platform-linux/README.md
          grep -q "Release Strategy" docs/release-strategy.md
          grep -q "Control Kernel Domain Specification" docs/architecture/control-kernel-domain.md
          grep -q "Control Kernel Interface Draft" docs/architecture/control-kernel-interfaces.md
          grep -q "Proxy Engine Adapter Interface" docs/architecture/proxy-engine-adapter.md
          grep -q "Control Runtime Orchestration Design" docs/architecture/control-runtime-orchestration.md
          grep -q "iOS Platform Risk Assessment" docs/architecture/ios-platform-risk-assessment.md
          grep -q "Linux Artifact Pre-Release Design" docs/architecture/linux-artifact-pre-release-design.md
          grep -q "Linux Platform Adapter Design" docs/architecture/linux-platform-adapter.md
          grep -q "Linux CLI Entrypoint Design" docs/architecture/linux-cli-entrypoint.md
          grep -q "Linux CLI Runtime Wiring Design" docs/architecture/linux-cli-runtime-wiring.md
          grep -q "Native Engine Listener And Node Config Design" docs/architecture/native-engine-listener-node-config.md
          grep -q "Linux Native Proxy Engine Start Design" docs/architecture/linux-native-proxy-engine-start.md
          grep -q "Linux CLI Artifact Installation And Rollback Design" docs/architecture/linux-cli-artifact-installation-rollback.md
          grep -q "Linux Package Artifact Manifest Design" docs/architecture/linux-package-artifact-manifest.md
          grep -q "Linux Artifact License Notice Confirmation Design" docs/architecture/linux-artifact-license-notice-confirmation.md
          grep -q "Release CI Success Source Contract" docs/architecture/release-ci-success-source-contract.md
          grep -q "Linux Package Runner Toolchain Target Contract" docs/architecture/linux-package-runner-toolchain-target-contract.md
          grep -q "Linux Package Archive Staging Contract" docs/architecture/linux-package-archive-staging-contract.md
          grep -q "Linux Package Checksum Manifest Contract" docs/architecture/linux-package-checksum-manifest-contract.md
          grep -q "Linux Package Publish Upload Boundary Contract" docs/architecture/linux-package-publish-upload-boundary-contract.md
          grep -q "Linux Package Signing Attestation Policy Binding Contract" docs/architecture/linux-package-signing-attestation-policy-binding-contract.md
          grep -q "Linux Package Release Notes Rollback Policy Binding Contract" docs/architecture/linux-package-release-notes-rollback-policy-binding-contract.md
          grep -q "Linux Package Publish Eligibility Aggregate Contract" docs/architecture/linux-package-publish-eligibility-aggregate-contract.md
          grep -q "ADR 0001: Initial Core Stack" docs/architecture/adr-0001-initial-core-stack.md

  detect-projects:
    name: Detect project types
    runs-on: ubuntu-latest
    needs:
      - policy
    outputs:
      go: ${{ steps.detect.outputs.go }}
      rust: ${{ steps.detect.outputs.rust }}
      node: ${{ steps.detect.outputs.node }}
      swift: ${{ steps.detect.outputs.swift }}
      apple: ${{ steps.detect.outputs.apple }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect project manifests
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          has_file() {
            find . -path ./.git -prune -o "$@" -print -quit | grep -q .
          }

          if has_file -name go.mod; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

          if has_file -name Cargo.toml; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

          if has_file -name package.json; then
            echo "node=true" >> "$GITHUB_OUTPUT"
          else
            echo "node=false" >> "$GITHUB_OUTPUT"
          fi

          if has_file -name Package.swift; then
            echo "swift=true" >> "$GITHUB_OUTPUT"
          else
            echo "swift=false" >> "$GITHUB_OUTPUT"
          fi

          if has_file -name "*.xcodeproj" -o -name "*.xcworkspace"; then
            echo "apple=true" >> "$GITHUB_OUTPUT"
          else
            echo "apple=false" >> "$GITHUB_OUTPUT"
          fi

  workspace-smoke:
    name: Workspace smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - policy
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify workspace
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f AGENT.md
          find . -maxdepth 3 -type f | sort | sed -n '1,160p'

  go-build-test:
    name: Go build and test
    runs-on: ${{ matrix.os }}
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.go == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r module; do
            dir="$(dirname "$module")"
            echo "::group::go test $dir"
            (cd "$dir" && go test ./...)
            echo "::endgroup::"
          done < <(find . -name go.mod -not -path "*/vendor/*" | sort)

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r module; do
            dir="$(dirname "$module")"
            echo "::group::go build $dir"
            (cd "$dir" && go build ./...)
            echo "::endgroup::"
          done < <(find . -name go.mod -not -path "*/vendor/*" | sort)

  rust-build-test:
    name: Rust build and test
    runs-on: ${{ matrix.os }}
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.rust == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Format
        shell: bash
        run: cargo fmt --all -- --check

      - name: Lint
        shell: bash
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        shell: bash
        run: cargo test --workspace --all-targets

      - name: Build
        shell: bash
        run: cargo build --workspace --all-targets

  rust-security-audit:
    name: Rust dependency security audit
    runs-on: ubuntu-latest
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.rust == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-audit
        shell: bash
        run: cargo install cargo-audit

      - name: Generate lockfile
        shell: bash
        run: cargo generate-lockfile

      - name: Audit dependencies
        shell: bash
        run: cargo audit

  node-build-test:
    name: Node build and test
    runs-on: ${{ matrix.os }}
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.node == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No npm test script found; skipping."
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No npm build script found; skipping."
          fi

  swift-build-test:
    name: Swift build and test
    runs-on: macos-26
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.swift == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test
        shell: bash
        run: swift test

      - name: Build
        shell: bash
        run: swift build

  apple-project-smoke:
    name: Apple project smoke
    runs-on: macos-26
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.apple == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Inspect Xcode projects
        shell: bash
        run: |
          set -euo pipefail
          find . -maxdepth 4 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) -print

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - policy
      - detect-projects
      - workspace-smoke
      - go-build-test
      - rust-build-test
      - rust-security-audit
      - node-build-test
      - swift-build-test
      - apple-project-smoke
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### CI Summary"
            echo
            echo "| Project type | Detected | Job result |"
            echo "| --- | --- | --- |"
            echo "| Go | ${{ needs.detect-projects.outputs.go }} | ${{ needs.go-build-test.result }} |"
            echo "| Rust | ${{ needs.detect-projects.outputs.rust }} | build/test: ${{ needs.rust-build-test.result }}; audit: ${{ needs.rust-security-audit.result }} |"
            echo "| Node | ${{ needs.detect-projects.outputs.node }} | ${{ needs.node-build-test.result }} |"
            echo "| Swift | ${{ needs.detect-projects.outputs.swift }} | ${{ needs.swift-build-test.result }} |"
            echo "| Apple | ${{ needs.detect-projects.outputs.apple }} | ${{ needs.apple-project-smoke.result }} |"
            echo
            echo "| Required job | Result |"
            echo "| --- | --- |"
            echo "| Repository policy | ${{ needs.policy.result }} |"
            echo "| Detect project types | ${{ needs.detect-projects.result }} |"
            echo "| Workspace smoke | ${{ needs.workspace-smoke.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "detected-go=${{ needs.detect-projects.outputs.go }}"
          echo "detected-rust=${{ needs.detect-projects.outputs.rust }}"
          echo "detected-node=${{ needs.detect-projects.outputs.node }}"
          echo "detected-swift=${{ needs.detect-projects.outputs.swift }}"
          echo "detected-apple=${{ needs.detect-projects.outputs.apple }}"
          echo "policy=${{ needs.policy.result }}"
          echo "detect-projects=${{ needs.detect-projects.result }}"
          echo "workspace-smoke=${{ needs.workspace-smoke.result }}"
          echo "go-build-test=${{ needs.go-build-test.result }}"
          echo "rust-build-test=${{ needs.rust-build-test.result }}"
          echo "rust-security-audit=${{ needs.rust-security-audit.result }}"
          echo "node-build-test=${{ needs.node-build-test.result }}"
          echo "swift-build-test=${{ needs.swift-build-test.result }}"
          echo "apple-project-smoke=${{ needs.apple-project-smoke.result }}"
          test "${{ needs.policy.result }}" = "success"
          test "${{ needs.detect-projects.result }}" = "success"
          test "${{ needs.workspace-smoke.result }}" = "success"
          if [ "${{ needs.detect-projects.outputs.go }}" = "true" ]; then
            test "${{ needs.go-build-test.result }}" = "success"
          fi
          if [ "${{ needs.detect-projects.outputs.rust }}" = "true" ]; then
            test "${{ needs.rust-build-test.result }}" = "success"
            test "${{ needs.rust-security-audit.result }}" = "success"
          fi
          if [ "${{ needs.detect-projects.outputs.node }}" = "true" ]; then
            test "${{ needs.node-build-test.result }}" = "success"
          fi
          if [ "${{ needs.detect-projects.outputs.swift }}" = "true" ]; then
            test "${{ needs.swift-build-test.result }}" = "success"
          fi
          if [ "${{ needs.detect-projects.outputs.apple }}" = "true" ]; then
            test "${{ needs.apple-project-smoke.result }}" = "success"
          fi
