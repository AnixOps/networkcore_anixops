name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify governance and release contracts
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            AGENT.md
            AGENTS.md
            README.md
            CONTRIBUTING.md
            ROADMAP.md
            TODO.md
            CHANGELOG.md
            LICENSE
            Cargo.toml
            Cargo.lock
            docs/ci-cd-policy.md
            docs/manual-intervention.md
            docs/release-strategy.md
            docs/alpha-windows-smoke-test.md
            .github/workflows/release.yml
            apps/linux-cli/Cargo.toml
            apps/linux-cli/README.md
            apps/linux-cli/src/main.rs
            apps/linux-cli/src/lib.rs
            apps/linux-cli/tests/linux_cli_contracts.rs
            apps/windows-cli/Cargo.toml
            apps/windows-cli/src/main.rs
