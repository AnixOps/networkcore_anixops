name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify governance files
        shell: bash
        run: |
          set -euo pipefail
          test -f AGENT.md
          test -f AGENTS.md
          test -f README.md
          test -f CONTRIBUTING.md
          test -f ROADMAP.md
          test -f TODO.md
          test -f CHANGELOG.md
          test -f docs/ci-cd-policy.md
          test -f docs/manual-intervention.md
          test -f docs/release-strategy.md
          test -f .github/workflows/release.yml
          test -f apps/linux-cli/README.md
          test -f crates/config-core/README.md
          test -f crates/control-domain/README.md
          test -f crates/control-runtime/README.md
          test -f crates/engine-native/README.md
          test -f crates/platform-linux/README.md
          test -f docs/architecture/control-kernel-domain.md
          test -f docs/architecture/control-kernel-interfaces.md
          test -f docs/architecture/proxy-engine-adapter.md
          test -f docs/architecture/control-runtime-orchestration.md
          test -f docs/architecture/ios-platform-risk-assessment.md
          test -f docs/architecture/linux-artifact-pre-release-design.md
          test -f docs/architecture/linux-platform-adapter.md
          test -f docs/architecture/linux-cli-entrypoint.md
          test -f docs/architecture/linux-cli-runtime-wiring.md
          test -f docs/architecture/native-engine-listener-node-config.md
          test -f docs/architecture/linux-native-proxy-engine-start.md
          test -f docs/architecture/linux-cli-artifact-installation-rollback.md
          test -f docs/architecture/linux-package-artifact-manifest.md
          test -f docs/architecture/linux-artifact-license-notice-confirmation.md
          test -f docs/architecture/release-ci-success-source-contract.md
          test -f docs/architecture/linux-package-runner-toolchain-target-contract.md
          test -f docs/architecture/linux-package-archive-staging-contract.md
          test -f docs/architecture/linux-package-checksum-manifest-contract.md
          test -f docs/architecture/linux-package-publish-upload-boundary-contract.md
          test -f docs/architecture/linux-package-signing-attestation-policy-binding-contract.md
          test -f docs/architecture/linux-package-release-notes-rollback-policy-binding-contract.md
          test -f docs/architecture/linux-package-publish-eligibility-aggregate-contract.md
          test -f docs/architecture/linux-package-license-notice-transition-validation-contract.md
          test -f docs/architecture/linux-package-release-ci-gate-activation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          test -f docs/architecture/linux-package-artifact-build-command-validation-contract.md
          test -f docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          test -f docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          test -f docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          test -f docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          test -f docs/architecture/adr-0001-initial-core-stack.md
          grep -q "本机只负责代码" AGENT.md
          grep -q "GitHub Actions" docs/ci-cd-policy.md
          grep -q "Roadmap" ROADMAP.md
          grep -q "TODO" TODO.md
          grep -q "Changelog" CHANGELOG.md
          grep -q "linux-artifact-readiness" .github/workflows/release.yml
          grep -q "Linux artifact readiness" .github/workflows/release.yml
          grep -q "Linux Artifact Manifest Output Contract" .github/workflows/release.yml
          grep -q "linux-artifact-manifest-output-fields" .github/workflows/release.yml
          grep -q "Linux Artifact License/NOTICE Source Contract" .github/workflows/release.yml
          grep -q "linux-artifact-license-notice-source=docs/manual-intervention.md" .github/workflows/release.yml
          grep -q "Release CI Success Source Contract" docs/architecture/release-ci-success-source-contract.md
          grep -q "Linux Package Release CI Gate Activation Validation Contract" docs/architecture/linux-package-release-ci-gate-activation-validation-contract.md
          grep -q "Linux Package Artifact Job Preflight Validation Contract" docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          grep -q "package_artifact_job_preflight_status" docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          grep -q "package_artifact_job_preflight_required_needs" docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          grep -q "package_artifact_job_preflight_failure_mode" docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          grep -q "Linux Package Artifact Build Command Validation Contract" docs/architecture/linux-package-artifact-build-command-validation-contract.md
          grep -q "package_artifact_build_command_status" docs/architecture/linux-package-artifact-build-command-validation-contract.md
          grep -q "package_artifact_build_command_cargo_args" docs/architecture/linux-package-artifact-build-command-validation-contract.md
          grep -q "package_artifact_build_command_binary_path" docs/architecture/linux-package-artifact-build-command-validation-contract.md
          grep -q "Linux Package Artifact Staging File Validation Contract" docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          grep -q "package_artifact_staging_file_status" docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          grep -q "package_artifact_staging_file_binary_permission" docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          grep -q "package_artifact_staging_file_archive_creation" docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          grep -q "Linux Package Artifact Archive Creation Validation Contract" docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          grep -q "package_artifact_archive_creation_status" docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          grep -q "package_artifact_archive_creation_single_top_level_dir" docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          grep -q "package_artifact_archive_creation_archive_path" docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          grep -q "Linux Package Artifact Checksum Execution Validation Contract" docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          grep -q "package_artifact_checksum_execution_status" docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          grep -q "package_artifact_checksum_execution_record_format" docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          grep -q "package_artifact_checksum_execution_checksum_path" docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          grep -q "Future Checksum Command" docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          grep -q "Linux Package Artifact Manifest Generation Validation Contract" docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          grep -q "package_artifact_manifest_generation_status" docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          grep -q "package_artifact_manifest_generation_required_fields" docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          grep -q "package_artifact_manifest_generation_manifest_path" docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          grep -q "Future Manifest Generation" docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          grep -q "Linux Package Artifact Manifest Checksum Validation Contract" docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          grep -q "package_artifact_manifest_checksum_status" docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          grep -q "package_artifact_manifest_checksum_record_format" docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          grep -q "package_artifact_manifest_checksum_path" docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          grep -q "Future Manifest Checksum Command" docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          grep -q "Linux Package Workflow Artifact Bundle Upload Validation Contract" docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          grep -q "package_workflow_artifact_bundle_upload_status" docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          grep -q "package_workflow_artifact_bundle_upload_required_files" docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          grep -q "package_workflow_artifact_bundle_upload_source_dir" docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          grep -q "Future Workflow Artifact Upload" docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          grep -q "release-ci-success-source-contract=present" .github/workflows/release.yml
          test "$(grep -Ec '^          echo "linux-package-release-ci-gate-activation-contract=present"$' .github/workflows/release.yml)" -ge 4
          test "$(grep -Ec '^          echo "linux-package-release-ci-gate-activation-status=blocked-placeholder"$' .github/workflows/release.yml)" -ge 4
          test "$(grep -Ec '^          echo "linux-package-release-ci-gate-activation-required-permission=actions-read"$' .github/workflows/release.yml)" -ge 4
          test "$(grep -Ec '^          echo "linux-package-release-ci-gate-activation-permission-status=not-enabled"$' .github/workflows/release.yml)" -ge 4
          test "$(grep -Ec '^          echo "linux-package-release-ci-gate-activation-api-status=not-called"$' .github/workflows/release.yml)" -ge 4
          test "$(grep -Ec '^          echo "linux-package-release-ci-gate-activation-package-linux=not-defined"$' .github/workflows/release.yml)" -ge 4
          test "$(grep -Ec '^          echo "linux-package-release-ci-gate-activation-artifacts=blocked"$' .github/workflows/release.yml)" -ge 4
          test "$(grep -Ec '^          echo "linux-package-release-ci-gate-activation-next-action=ci-api-read-implementation-before-package-linux"$' .github/workflows/release.yml)" -ge 4
          grep -q "Linux Package Artifact Job Preflight Validation Contract" .github/workflows/release.yml
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-status=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-required-job=package-linux"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-job-status=not-defined"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-required-needs=release-policy,release-ci-gate,linux-artifact-readiness"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-license-notice=blocked-pending"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-ci-gate=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-checkout=blocked-before-gates"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-toolchain=blocked-before-gates"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-build=blocked-before-gates"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-staging=blocked-before-gates"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-upload=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-failure-mode=fail-before-checkout-toolchain-build-staging"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-job-preflight-next-action=license-notice-and-ci-gate-before-package-linux"$' .github/workflows/release.yml)" -ge 3
          grep -q "Linux Package Artifact Build Command Validation Contract" .github/workflows/release.yml
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-status=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-required-job=package-linux"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-preflight=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-target-install=blocked-before-preflight"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-cargo-args=build,--locked,--release,--package,networkcore-linux,--bin,networkcore-linux,--target,x86_64-unknown-linux-gnu"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-binary-path=target/x86_64-unknown-linux-gnu/release/networkcore-linux"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-binary-path-check=blocked-before-build"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-build-output=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-upload=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-build-command-next-action=license-notice-ci-preflight-before-build"$' .github/workflows/release.yml)" -ge 3
          grep -q "Linux Package Artifact Staging File Validation Contract" .github/workflows/release.yml
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-status=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-required-job=package-linux"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-preflight=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-build-command=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-staging-file-binary-source=target/[$][{]target[}]/release/networkcore-linux'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-binary-destination=bin/networkcore-linux"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-binary-permission=0755"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-install-doc=INSTALL.md"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-license-source=license-notice-confirmed"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-changelog-source=CHANGELOG.md"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-archive-creation=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-upload=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-staging-file-next-action=license-notice-ci-build-before-staging"$' .github/workflows/release.yml)" -ge 3
          grep -q "Linux Package Artifact Archive Creation Validation Contract" .github/workflows/release.yml
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-status=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-required-job=package-linux"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-staging-file=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-archive-creation-output-dir=dist/linux/[$][{]target[}]/artifacts'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-archive-creation-top-level-dir=networkcore-linux-[$][{]version[}]-[$][{]target[}]'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-archive-creation-archive-name=networkcore-linux-[$][{]version[}]-[$][{]target[}].tar.gz'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-archive-creation-archive-path=dist/linux/[$][{]target[}]/artifacts/networkcore-linux-[$][{]version[}]-[$][{]target[}].tar.gz'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-archive-format=tar.gz"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-single-top-level-dir=required"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-required-files=bin/networkcore-linux,INSTALL.md,LICENSE,CHANGELOG.md"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-checksum=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-manifest=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-upload=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-archive-creation-next-action=checksum-manifest-after-archive"$' .github/workflows/release.yml)" -ge 3
          grep -q "Linux Package Artifact Checksum Execution Validation Contract" .github/workflows/release.yml
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-status=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-required-job=package-linux"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-archive-creation=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-algorithm=sha256"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-checksum-execution-archive-name=networkcore-linux-[$][{]version[}]-[$][{]target[}].tar.gz'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-checksum-execution-archive-path=dist/linux/[$][{]target[}]/artifacts/networkcore-linux-[$][{]version[}]-[$][{]target[}].tar.gz'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-checksum-execution-checksum-name=networkcore-linux-[$][{]version[}]-[$][{]target[}].tar.gz.sha256'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-checksum-execution-checksum-path=dist/linux/[$][{]target[}]/artifacts/networkcore-linux-[$][{]version[}]-[$][{]target[}].tar.gz.sha256'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-record-format=sha256sum-two-space-file-name"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-checksum-value=blocked-before-archive"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-checksum-file-write=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-manifest=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-upload=blocked"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-checksum-execution-next-action=manifest-generation-after-checksum"$' .github/workflows/release.yml)" -ge 3
          grep -q "Linux Package Artifact Manifest Generation Validation Contract" .github/workflows/release.yml
          test "$(grep -Ec '^          echo "linux-package-artifact-manifest-generation-contract=present"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-manifest-generation-status=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-manifest-generation-required-job=package-linux"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-manifest-generation-checksum-execution=blocked-placeholder"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-manifest-generation-schema-version=1"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-manifest-generation-artifact-kind=linux-cli-tarball"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec '^          echo "linux-package-artifact-manifest-generation-package-format=tar.gz"$' .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-manifest-generation-manifest-name=networkcore-linux-[$][{]version[}]-[$][{]target[}].manifest.json'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-manifest-generation-manifest-path=dist/linux/[$][{]target[}]/artifacts/networkcore-linux-[$][{]version[}]-[$][{]target[}].manifest.json'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-manifest-generation-archive-name=networkcore-linux-[$][{]version[}]-[$][{]target[}].tar.gz'$" .github/workflows/release.yml)" -ge 3
          test "$(grep -Ec "^[[:space:]]+echo 'linux-package-artifact-manifest-generation-archive-path=dist/linux/[$][{]target[}]/artifacts/networkcore-linux-[$][{]version[}]-[$][{]target[}].tar.gz'$" .github/workflows/release.yml)" -ge 3
