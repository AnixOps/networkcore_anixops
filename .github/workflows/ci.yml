  detect-projects:
    name: Detect project types
    runs-on: ubuntu-latest
    needs:
      - policy
    outputs:
      go: ${{ steps.detect.outputs.go }}
      rust: ${{ steps.detect.outputs.rust }}
      node: ${{ steps.detect.outputs.node }}
      swift: ${{ steps.detect.outputs.swift }}
      apple: ${{ steps.detect.outputs.apple }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect project manifests
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          has_file() {
            find . -path ./.git -prune -o "$@" -print -quit | grep -q .
          }

          if has_file -name go.mod; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

          if has_file -name Cargo.toml; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

          if has_file -name package.json; then
            echo "node=true" >> "$GITHUB_OUTPUT"
          else
            echo "node=false" >> "$GITHUB_OUTPUT"
          fi

          if has_file -name Package.swift; then
            echo "swift=true" >> "$GITHUB_OUTPUT"
          else
            echo "swift=false" >> "$GITHUB_OUTPUT"
          fi

          if has_file -name "*.xcodeproj" -o -name "*.xcworkspace"; then
            echo "apple=true" >> "$GITHUB_OUTPUT"
          else
            echo "apple=false" >> "$GITHUB_OUTPUT"
          fi

  workspace-smoke:
    name: Workspace smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - policy
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify workspace
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f AGENT.md
          test -f LICENSE
          find . -maxdepth 3 -type f | sort | sed -n '1,160p'

  go-build-test:
    name: Go build and test
    runs-on: ${{ matrix.os }}
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.go == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r module; do
            dir="$(dirname "$module")"
            echo "::group::go test $dir"
            (cd "$dir" && go test ./...)
            echo "::endgroup::"
          done < <(find . -name go.mod -not -path "*/vendor/*" | sort)

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r module; do
            dir="$(dirname "$module")"
            echo "::group::go build $dir"
            (cd "$dir" && go build ./...)
            echo "::endgroup::"
          done < <(find . -name go.mod -not -path "*/vendor/*" | sort)

  rust-build-test:
    name: Rust build and test
    runs-on: ${{ matrix.os }}
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.rust == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Windows C toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libsystre

      - name: Configure Windows Rust GNU target
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $MsysRoot = "${{ steps.msys2.outputs.msys2-location }}"
          $MingwPrefix = Join-Path $MsysRoot "mingw64"
          "$MingwPrefix\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "MSYS2_LOCATION=$MsysRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MINGW_PREFIX=$MingwPrefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_BUILD_TARGET=x86_64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CC_x86_64_pc_windows_gnu=$MingwPrefix\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AR_x86_64_pc_windows_gnu=$MingwPrefix\bin\ar.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$MingwPrefix\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
          if [ "${RUNNER_OS}" = "Windows" ]; then
            rustup target add x86_64-pc-windows-gnu
          fi

      - name: Setup Node script runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Format
        shell: bash
        run: cargo fmt --all -- --check

      - name: Lint
        shell: bash
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test
        shell: bash
        run: cargo test --locked --workspace --all-targets

      - name: Build
        shell: bash
        run: cargo build --locked --workspace --all-targets

  windows-managed-client-installer:
    name: Windows managed client MSI
    runs-on: windows-latest
    needs:
      - policy
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Windows C toolchain
        uses: msys2/setup-msys2@v2
        id: windows-msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libsystre

      - name: Configure Windows Rust GNU target
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $MsysRoot = "${{ steps.windows-msys2.outputs.msys2-location }}"
          $MingwPrefix = Join-Path $MsysRoot "mingw64"
          "$MingwPrefix\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CARGO_BUILD_TARGET=x86_64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CC_x86_64_pc_windows_gnu=$MingwPrefix\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AR_x86_64_pc_windows_gnu=$MingwPrefix\bin\ar.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$MingwPrefix\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-gnu
          cargo build --locked `
            --package networkcore-windows `
            --package networkcore-windows-gui `
            --package networkcore-windows-service `
            --target x86_64-pc-windows-gnu

      - name: Build and validate WiX MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global wix --version 4.0.6
          wix extension add -g WixToolset.UI.wixext/4.0.6
          New-Item -ItemType Directory -Force -Path dist\windows-ci | Out-Null
          $releaseDir = (Resolve-Path "target\x86_64-pc-windows-gnu\debug").Path
          $defaultConfig = (Resolve-Path "installer\windows\default-managed-config.json").Path
          wix build installer/windows/Package.wxs `
            -ext WixToolset.UI.wixext `
            -arch x64 `
            -d "ProductVersion=0.2.1" `
            -d "CliExe=$releaseDir\networkcore-windows.exe" `
            -d "GuiExe=$releaseDir\networkcore-windows-gui.exe" `
            -d "ServiceExe=$releaseDir\networkcore-windows-service.exe" `
            -d "DefaultConfig=$defaultConfig" `
            -o dist\windows-ci\networkcore-windows-ci.msi
          wix msi validate dist\windows-ci\networkcore-windows-ci.msi
          if (-not (Test-Path dist\windows-ci\networkcore-windows-ci.msi -PathType Leaf)) {
            throw "Windows managed client MSI was not created."
          }
          if ((Get-Item dist\windows-ci\networkcore-windows-ci.msi).Length -le 0) {
            throw "Windows managed client MSI is empty."
          }

  rust-security-audit:
    name: Rust dependency security audit
    runs-on: ubuntu-latest
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.rust == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-audit
        shell: bash
        run: cargo install cargo-audit

      - name: Verify checked-in lockfile
        shell: bash
        run: cargo metadata --locked --offline --no-deps --format-version=1 > /dev/null

      - name: Audit dependencies
        shell: bash
        run: cargo audit

  node-build-test:
    name: Node build and test
    runs-on: ${{ matrix.os }}
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.node == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No npm test script found; skipping."
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No npm build script found; skipping."
          fi

  swift-build-test:
    name: Swift build and test
    runs-on: macos-26
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.swift == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test
        shell: bash
        run: swift test

      - name: Build
        shell: bash
        run: swift build

  apple-project-smoke:
    name: Apple project smoke
    runs-on: macos-26
    needs:
      - detect-projects
    if: ${{ needs.detect-projects.outputs.apple == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Inspect Xcode projects
        shell: bash
        run: |
          set -euo pipefail
          find . -maxdepth 4 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) -print

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - policy
      - detect-projects
      - workspace-smoke
      - go-build-test
      - rust-build-test
      - windows-managed-client-installer
      - rust-security-audit
      - node-build-test
      - swift-build-test
      - apple-project-smoke
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### CI Summary"
            echo
            echo "| Project type | Detected | Job result |"
            echo "| --- | --- | --- |"
            echo "| Go | ${{ needs.detect-projects.outputs.go }} | ${{ needs.go-build-test.result }} |"
            echo "| Rust | ${{ needs.detect-projects.outputs.rust }} | build/test: ${{ needs.rust-build-test.result }}; audit: ${{ needs.rust-security-audit.result }} |"
            echo "| Windows MSI | true | ${{ needs.windows-managed-client-installer.result }} |"
            echo "| Node | ${{ needs.detect-projects.outputs.node }} | ${{ needs.node-build-test.result }} |"
            echo "| Swift | ${{ needs.detect-projects.outputs.swift }} | ${{ needs.swift-build-test.result }} |"
            echo "| Apple | ${{ needs.detect-projects.outputs.apple }} | ${{ needs.apple-project-smoke.result }} |"
            echo
            echo "| Required job | Result |"
            echo "| --- | --- |"
            echo "| Repository policy | ${{ needs.policy.result }} |"
            echo "| Detect project types | ${{ needs.detect-projects.result }} |"
            echo "| Workspace smoke | ${{ needs.workspace-smoke.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "detected-go=${{ needs.detect-projects.outputs.go }}"
          echo "detected-rust=${{ needs.detect-projects.outputs.rust }}"
          echo "detected-node=${{ needs.detect-projects.outputs.node }}"
          echo "detected-swift=${{ needs.detect-projects.outputs.swift }}"
          echo "detected-apple=${{ needs.detect-projects.outputs.apple }}"
          echo "policy=${{ needs.policy.result }}"
          echo "detect-projects=${{ needs.detect-projects.result }}"
          echo "workspace-smoke=${{ needs.workspace-smoke.result }}"
          echo "go-build-test=${{ needs.go-build-test.result }}"
          echo "rust-build-test=${{ needs.rust-build-test.result }}"
          echo "windows-managed-client-installer=${{ needs.windows-managed-client-installer.result }}"
          echo "rust-security-audit=${{ needs.rust-security-audit.result }}"
          echo "node-build-test=${{ needs.node-build-test.result }}"
          echo "swift-build-test=${{ needs.swift-build-test.result }}"
          echo "apple-project-smoke=${{ needs.apple-project-smoke.result }}"
          test "${{ needs.policy.result }}" = "success"
          test "${{ needs.detect-projects.result }}" = "success"
          test "${{ needs.workspace-smoke.result }}" = "success"
          if [ "${{ needs.detect-projects.outputs.go }}" = "true" ]; then
            test "${{ needs.go-build-test.result }}" = "success"
          fi
          if [ "${{ needs.detect-projects.outputs.rust }}" = "true" ]; then
            test "${{ needs.rust-build-test.result }}" = "success"
            test "${{ needs.rust-security-audit.result }}" = "success"
          fi
          test "${{ needs.windows-managed-client-installer.result }}" = "success"
          if [ "${{ needs.detect-projects.outputs.node }}" = "true" ]; then
            test "${{ needs.node-build-test.result }}" = "success"
          fi
          if [ "${{ needs.detect-projects.outputs.swift }}" = "true" ]; then
            test "${{ needs.swift-build-test.result }}" = "success"
          fi
          if [ "${{ needs.detect-projects.outputs.apple }}" = "true" ]; then
            test "${{ needs.apple-project-smoke.result }}" = "success"
          fi
