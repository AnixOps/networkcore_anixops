name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-policy:
    name: Release policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify release is CI/CD controlled
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          RELEASE_EVENT: ${{ github.event_name }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test -f AGENT.md
          test -f docs/release-strategy.md
          grep -q "发布验证都必须在 GitHub Actions" AGENT.md
          grep -q "Release Strategy" docs/release-strategy.md

          version_pattern='^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'
          if [[ ! "${RELEASE_VERSION}" =~ ${version_pattern} ]]; then
            echo "::error::Release version must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-rc.N."
            exit 1
          fi

          case "${RELEASE_EVENT}" in
            workflow_dispatch)
              if [ "${RELEASE_REF_TYPE}" != "branch" ]; then
                echo "::error::workflow_dispatch releases must run from a branch ref."
                exit 1
              fi
              if [ "${RELEASE_REF_NAME}" != "main" ]; then
                echo "::error::workflow_dispatch placeholder releases must run from main."
                exit 1
              fi
              ;;
            push)
              if [ "${RELEASE_REF_TYPE}" != "tag" ]; then
                echo "::error::push releases must be triggered by a tag ref."
                exit 1
              fi
              if [ "${RELEASE_VERSION}" != "${RELEASE_REF_NAME}" ]; then
                echo "::error::Tag-triggered release version must match the tag name."
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported release event: ${RELEASE_EVENT}."
              exit 1
              ;;
          esac

          echo "release-source-gate=passed"
          echo "release-version=${RELEASE_VERSION}"
          echo "release-event=${RELEASE_EVENT}"
          echo "release-ref=${RELEASE_REF}"
          echo "Release artifacts must be produced by GitHub Actions jobs."

  release-ci-gate:
    name: Release CI gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Record CI gate requirement
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
          RELEASE_EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          test -f docs/architecture/release-ci-success-source-contract.md
          grep -q "Release CI Success Source Contract" docs/architecture/release-ci-success-source-contract.md
          {
            echo "### Release CI Gate"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current release mode | placeholder |"
            echo "| Current commit | ${RELEASE_SHA} |"
            echo "| Current ref | ${RELEASE_REF} |"
            echo "| Current ref name | ${RELEASE_REF_NAME} |"
            echo "| Trigger event | ${RELEASE_EVENT} |"
            echo "| Artifact CI gate | not enforced until real artifact jobs exist |"
            echo "| Required future gate | successful CI run on main for the same commit before packaging or publishing |"
            echo "| CI source contract | docs/architecture/release-ci-success-source-contract.md |"
            echo "| Required CI workflow | CI |"
            echo "| Required CI workflow file | .github/workflows/ci.yml |"
            echo "| Required CI branch | main |"
            echo "| Required CI conclusion | success |"
            echo "| Required CI status | completed |"
            echo "| Required CI source fields | ci_workflow_name, ci_workflow_file, ci_run_id, ci_run_attempt, ci_run_url, ci_run_status, ci_run_conclusion, ci_head_sha, ci_head_branch, ci_event, ci_repository, ci_checked_at |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-ci-gate=placeholder"
          echo "release-ci-success-source-contract=present"
          echo "release-ci-source-contract=docs/architecture/release-ci-success-source-contract.md"
          echo "release-ci-required-before-artifacts=true"
          echo "release-ci-required-ref=main"
          echo "release-ci-required-sha=${RELEASE_SHA}"
          echo "release-ci-required-workflow=CI"
          echo "release-ci-required-workflow-file=.github/workflows/ci.yml"
          echo "release-ci-required-status=completed"
          echo "release-ci-required-conclusion=success"
          echo "release-ci-required-fields=ci_workflow_name,ci_workflow_file,ci_run_id,ci_run_attempt,ci_run_url,ci_run_status,ci_run_conclusion,ci_head_sha,ci_head_branch,ci_event,ci_repository,ci_checked_at"

  release-artifact-contract:
    name: Release artifact contract
    runs-on: ubuntu-latest
    needs:
      - release-ci-gate
    steps:
      - name: Record artifact checksum contract
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Release Artifact Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current artifacts | not defined |"
            echo "| Required checksum algorithm | sha256 |"
            echo "| Required job outputs | artifact_name, artifact_path, checksum_algorithm, checksum_file, checksum_value |"
            echo "| Required checksum timing | before upload or publish |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-artifact-contract=placeholder"
          echo "release-checksum-required=true"
          echo "release-checksum-algorithm=sha256"
          echo "release-artifact-output-fields=artifact_name,artifact_path,checksum_algorithm,checksum_file,checksum_value"

  release-signing-contract:
    name: Release signing contract
    runs-on: ubuntu-latest
    needs:
      - release-artifact-contract
    steps:
      - name: Record signing and attestation contract
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Release Signing Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current signing mode | not configured |"
            echo "| Required future gate | platform artifacts must declare signing or attestation policy before publish |"
            echo "| Credential handling | GitHub Secrets, Environments, or official platform only |"
            echo "| Required job outputs | signing_policy, signing_status, attestation_status, provenance_file |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-signing-contract=placeholder"
          echo "release-signing-required-before-publish=true"
          echo "release-attestation-required-when-supported=true"
          echo "release-signing-output-fields=signing_policy,signing_status,attestation_status,provenance_file"

  release-rollback-contract:
    name: Release rollback contract
    runs-on: ubuntu-latest
    needs:
      - release-signing-contract
    steps:
      - name: Record rollback contract
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Release Rollback Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current rollback mode | not configured |"
            echo "| Required future gate | release notes must include rollback plan before publish |"
            echo "| Public asset handling | replace with a new version or publish a withdrawal notice; do not overwrite tags |"
            echo "| Required release note fields | rollback_scope, rollback_trigger, rollback_steps, replacement_version, rollback_owner |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-rollback-contract=placeholder"
          echo "release-rollback-required-before-publish=true"
          echo "release-rollback-output-fields=rollback_scope,rollback_trigger,rollback_steps,replacement_version,rollback_owner"

  linux-artifact-readiness:
    name: Linux artifact readiness
    runs-on: ubuntu-latest
    needs:
      - release-rollback-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Linux CLI artifact readiness inputs
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/linux-cli/Cargo.toml
          test -f apps/linux-cli/README.md
          test -f apps/linux-cli/src/main.rs
          test -f apps/linux-cli/src/lib.rs
          test -f apps/linux-cli/tests/linux_cli_contracts.rs
          test -f crates/engine-native/src/lib.rs
          test -f crates/platform-linux/Cargo.toml
          test -f docs/architecture/linux-artifact-pre-release-design.md
          test -f docs/architecture/linux-platform-adapter.md
          test -f docs/architecture/linux-cli-entrypoint.md
          test -f docs/architecture/linux-cli-runtime-wiring.md
          test -f docs/architecture/native-engine-listener-node-config.md
          test -f docs/architecture/linux-native-proxy-engine-start.md
          test -f docs/architecture/linux-cli-artifact-installation-rollback.md
          test -f docs/architecture/linux-package-artifact-manifest.md
          test -f docs/architecture/linux-artifact-license-notice-confirmation.md
          test -f docs/architecture/release-ci-success-source-contract.md
          test -f docs/architecture/linux-package-runner-toolchain-target-contract.md
          test -f docs/manual-intervention.md
          grep -q "networkcore-linux" apps/linux-cli/README.md
          grep -q "handle_foreground_lifecycle_with_runtime_stop" apps/linux-cli/src/lib.rs
          grep -q "orchestrator.stop_runtime(&engine_id)" apps/linux-cli/src/lib.rs
          grep -q "cli.linux.start.runtime_stop_failed" apps/linux-cli/src/lib.rs
          grep -q "foreground_interruption_stops_native_runtime_and_aggregates_release_diagnostics" apps/linux-cli/tests/linux_cli_contracts.rs
          grep -q "foreground_interruption_stop_failure_adds_stable_cli_diagnostic" apps/linux-cli/tests/linux_cli_contracts.rs
          grep -q "engine.native.runtime.accept_loop_stopped" crates/engine-native/src/lib.rs
          grep -q "engine.native.runtime.released" crates/engine-native/src/lib.rs
          grep -q "Linux Artifact Pre-Release Design" docs/architecture/linux-artifact-pre-release-design.md
          grep -q "Linux Platform Adapter Design" docs/architecture/linux-platform-adapter.md
          grep -q "Linux CLI Entrypoint Design" docs/architecture/linux-cli-entrypoint.md
          grep -q "Linux CLI Runtime Wiring Design" docs/architecture/linux-cli-runtime-wiring.md
          grep -q "Native Engine Listener And Node Config Design" docs/architecture/native-engine-listener-node-config.md
          grep -q "Linux Native Proxy Engine Start Design" docs/architecture/linux-native-proxy-engine-start.md
          grep -q "Linux CLI Artifact Installation And Rollback Design" docs/architecture/linux-cli-artifact-installation-rollback.md
          grep -q "Linux Package Artifact Manifest Design" docs/architecture/linux-package-artifact-manifest.md
          grep -q "Linux Artifact License Notice Confirmation Design" docs/architecture/linux-artifact-license-notice-confirmation.md
          grep -q "Release CI Success Source Contract" docs/architecture/release-ci-success-source-contract.md
          grep -q "Linux Package Runner Toolchain Target Contract" docs/architecture/linux-package-runner-toolchain-target-contract.md
          grep -q "artifact_manifest_path" docs/architecture/linux-package-artifact-manifest.md
          grep -q "artifact_manifest_checksum_value" docs/architecture/linux-package-artifact-manifest.md
          grep -q "rust_target_triple" docs/architecture/linux-package-runner-toolchain-target-contract.md
          grep -q "x86_64-unknown-linux-gnu" docs/architecture/linux-package-runner-toolchain-target-contract.md
          grep -q "Linux Artifact Manifest Output Contract" .github/workflows/release.yml
          grep -q "linux-artifact-manifest-output-fields" .github/workflows/release.yml
          grep -q "Linux Artifact License/NOTICE Source Contract" .github/workflows/release.yml
          grep -q "linux-artifact-license-notice-source=docs/manual-intervention.md" .github/workflows/release.yml
          grep -q "release-ci-success-source-contract=present" .github/workflows/release.yml
          grep -q "release-ci-required-fields" .github/workflows/release.yml
          grep -q "Linux Package Platform Input Contract" .github/workflows/release.yml
          grep -q "linux-package-platform-input-contract=present" .github/workflows/release.yml
          grep -q "linux-package-required-target=x86_64-unknown-linux-gnu" .github/workflows/release.yml
          grep -q "linux-artifact-license-notice-status=pending" docs/manual-intervention.md
          grep -q "linux-artifact-license-notice-source-contract=docs/architecture/linux-artifact-license-notice-confirmation.md" docs/manual-intervention.md
          grep -q "linux-artifact-license-notice-package-linux=blocked" docs/manual-intervention.md
          grep -q "linux-artifact-license-notice-release-assets=blocked" docs/manual-intervention.md
          grep -q "package-linux" docs/architecture/linux-cli-artifact-installation-rollback.md
          grep -q "license 或 artifact 内置许可/NOTICE" docs/manual-intervention.md
          if grep -Eq '^  package-linux:' .github/workflows/release.yml; then
            echo "::error::package-linux must stay undefined until license/NOTICE and artifact gates are complete."
            exit 1
          fi
          {
            echo "### Linux Artifact Readiness"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | readiness gate only |"
            echo "| CLI source | apps/linux-cli present |"
            echo "| Platform adapter source | crates/platform-linux present |"
            echo "| Native listener/node config design | present |"
            echo "| Foreground stop/release source contract | checked |"
            echo "| Foreground stop/release contract tests | checked |"
            echo "| Artifact manifest contract design | present |"
            echo "| License/NOTICE confirmation source contract | present |"
            echo "| Package runner/toolchain/target contract | present |"
            echo "| Install and rollback design | present |"
            echo "| License or NOTICE confirmation | pending in docs/manual-intervention.md |"
            echo "| Release asset upload | blocked until package-linux, checksum, signing/attestation, rollback, and license/NOTICE gates are complete |"
            echo "| Current artifact job | not defined |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "linux-artifact-readiness=passed"
          echo "linux-artifact-mode=readiness-gate-only"
          echo "linux-artifact-cli-source=present"
          echo "linux-artifact-native-listener-node-design=present"
          echo "linux-artifact-foreground-stop-release-contract=checked"
          echo "linux-artifact-manifest-contract=present"
          echo "linux-artifact-license-notice-contract=present"
          echo "linux-artifact-license-notice-source=docs/manual-intervention.md"
          echo "linux-artifact-license-notice-status=pending"
          echo "linux-artifact-license-notice-package-linux=blocked"
          echo "linux-package-platform-input-contract=present"
          echo "linux-package-platform-contract=docs/architecture/linux-package-runner-toolchain-target-contract.md"
          echo "linux-package-required-runner=ubuntu-latest"
          echo "linux-package-required-runner-kind=github-hosted"
          echo "linux-package-required-rust-toolchain=stable"
          echo "linux-package-required-rust-profile=minimal"
          echo "linux-package-required-target=x86_64-unknown-linux-gnu"
          echo "linux-package-required-crate=apps/linux-cli"
          echo "linux-package-required-binary=networkcore-linux"
          echo "linux-package-required-format=tar.gz"
          echo "linux-package-required-install-model=manual-extract"
          echo "linux-package-required-system-mutation-policy=none"
          echo "linux-artifact-install-rollback-design=present"
          echo "linux-artifact-license-notice=manual-confirmation-required"
          echo "linux-artifact-release-assets=blocked"

  release-placeholder:
    name: Release placeholder
    runs-on: ubuntu-latest
    needs:
      - linux-artifact-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Explain current release state
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/manual-intervention.md
          grep -q "linux-artifact-license-notice-status=pending" docs/manual-intervention.md
          grep -q "linux-artifact-license-notice-source-contract=docs/architecture/linux-artifact-license-notice-confirmation.md" docs/manual-intervention.md
          grep -q "linux-artifact-license-notice-package-linux=blocked" docs/manual-intervention.md
          grep -q "linux-artifact-license-notice-release-assets=blocked" docs/manual-intervention.md
          if grep -Eq '^  package-linux:' .github/workflows/release.yml; then
            echo "::error::package-linux must stay undefined until license/NOTICE and artifact gates are complete."
            exit 1
          fi
          echo "No release artifacts are defined yet."
          echo "Linux artifact readiness is checked, but package-linux is not defined yet."
          echo "Add platform-specific packaging jobs only after all artifact gates are complete."
          {
            echo "### Linux Artifact Manifest Output Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | placeholder summary only |"
            echo "| Required manifest outputs | artifact_manifest_name, artifact_manifest_path, artifact_manifest_checksum_file, artifact_manifest_checksum_value |"
            echo "| Required archive outputs | artifact_name, artifact_path, checksum_algorithm, checksum_file, checksum_value |"
            echo "| Manifest checksum algorithm | sha256 |"
            echo "| Release summary requirement | archive checksum and manifest checksum must both be visible before upload |"
            echo "| License or NOTICE confirmation | manual confirmation required before real artifact packaging |"
            echo "| Current package-linux job | not defined |"
            echo "| Current release asset upload | blocked |"
            echo
            echo "### Linux Package Platform Input Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | placeholder summary only |"
            echo "| Source contract | docs/architecture/linux-package-runner-toolchain-target-contract.md |"
            echo "| Required runner | ubuntu-latest |"
            echo "| Required runner kind | github-hosted |"
            echo "| Required Rust toolchain | stable |"
            echo "| Required Rust profile | minimal |"
            echo "| Required target triple | x86_64-unknown-linux-gnu |"
            echo "| Required crate | apps/linux-cli |"
            echo "| Required binary | networkcore-linux |"
            echo "| Required package format | tar.gz |"
            echo "| Required install model | manual-extract |"
            echo "| System mutation policy | none |"
            echo "| Current package-linux job | not defined |"
            echo "| Current release asset upload | blocked |"
            echo
            echo "### Linux Artifact License/NOTICE Source Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | placeholder summary only |"
            echo "| Source contract | docs/architecture/linux-artifact-license-notice-confirmation.md |"
            echo "| Source of truth | docs/manual-intervention.md |"
            echo "| Current marker | linux-artifact-license-notice-status=pending |"
            echo "| Package job gate | linux-artifact-license-notice-package-linux=blocked |"
            echo "| Release asset gate | linux-artifact-license-notice-release-assets=blocked |"
            echo "| Required future marker | linux-artifact-license-notice-status=confirmed |"
            echo "| Current package-linux job | not defined |"
            echo "| Current release asset upload | blocked |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "linux-artifact-manifest-output-contract=placeholder"
          echo "linux-artifact-manifest-output-fields=artifact_manifest_name,artifact_manifest_path,artifact_manifest_checksum_file,artifact_manifest_checksum_value"
          echo "linux-artifact-manifest-checksum-algorithm=sha256"
          echo "linux-artifact-manifest-upload=blocked"
          echo "linux-package-platform-input-contract=present"
          echo "linux-package-platform-contract=docs/architecture/linux-package-runner-toolchain-target-contract.md"
          echo "linux-package-required-runner=ubuntu-latest"
          echo "linux-package-required-runner-kind=github-hosted"
          echo "linux-package-required-rust-toolchain=stable"
          echo "linux-package-required-rust-profile=minimal"
          echo "linux-package-required-target=x86_64-unknown-linux-gnu"
          echo "linux-package-required-crate=apps/linux-cli"
          echo "linux-package-required-binary=networkcore-linux"
          echo "linux-package-required-format=tar.gz"
          echo "linux-package-required-install-model=manual-extract"
          echo "linux-package-required-system-mutation-policy=none"
          echo "linux-artifact-license-notice-contract=present"
          echo "linux-artifact-license-notice-source=docs/manual-intervention.md"
          echo "linux-artifact-license-notice-status=pending"
          echo "linux-artifact-license-notice-package-linux=blocked"
          echo "linux-artifact-license-notice-release-assets=blocked"

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - release-policy
      - release-ci-gate
      - release-artifact-contract
      - release-signing-contract
      - release-rollback-contract
      - linux-artifact-readiness
      - release-placeholder
    steps:
      - name: Summarize release state
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          RELEASE_EVENT: ${{ github.event_name }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          {
            echo "### Release Summary"
            echo
            echo "| Source | Value |"
            echo "| --- | --- |"
            echo "| Release version | ${RELEASE_VERSION} |"
            echo "| Trigger event | ${RELEASE_EVENT} |"
            echo "| Trigger ref | ${RELEASE_REF} |"
            echo "| Trigger ref name | ${RELEASE_REF_NAME} |"
            echo "| Commit SHA | ${RELEASE_SHA} |"
            echo "| Actor | ${RELEASE_ACTOR} |"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Release policy | ${{ needs.release-policy.result }} |"
            echo "| Release CI gate | ${{ needs.release-ci-gate.result }} |"
            echo "| Release CI source contract | checked in release-ci-gate |"
            echo "| Release CI required workflow | CI |"
            echo "| Release CI required fields | ci_workflow_name, ci_workflow_file, ci_run_id, ci_run_attempt, ci_run_url, ci_run_status, ci_run_conclusion, ci_head_sha, ci_head_branch, ci_event, ci_repository, ci_checked_at |"
            echo "| Release artifact contract | ${{ needs.release-artifact-contract.result }} |"
            echo "| Release signing contract | ${{ needs.release-signing-contract.result }} |"
            echo "| Release rollback contract | ${{ needs.release-rollback-contract.result }} |"
            echo "| Linux artifact readiness | ${{ needs.linux-artifact-readiness.result }} |"
            echo "| Linux foreground stop/release contract | checked in linux-artifact-readiness |"
            echo "| Linux artifact manifest contract | checked in linux-artifact-readiness |"
            echo "| Linux artifact manifest output contract | summarized in release-placeholder |"
            echo "| Linux artifact manifest output fields | artifact_manifest_name, artifact_manifest_path, artifact_manifest_checksum_file, artifact_manifest_checksum_value |"
            echo "| Linux package platform input contract | summarized in release-placeholder |"
            echo "| Linux package required runner | ubuntu-latest |"
            echo "| Linux package required Rust toolchain | stable |"
            echo "| Linux package required target | x86_64-unknown-linux-gnu |"
            echo "| Linux package required crate | apps/linux-cli |"
            echo "| Linux package required binary | networkcore-linux |"
            echo "| Linux artifact license/NOTICE contract | checked in linux-artifact-readiness |"
            echo "| Linux artifact license/NOTICE status | pending in docs/manual-intervention.md |"
            echo "| Release placeholder | ${{ needs.release-placeholder.result }} |"
            echo "| Release artifacts | not defined |"
            echo "| Artifact checksum | sha256 required before upload or publish |"
            echo "| Artifact signing/attestation | required before platform artifact publish |"
            echo "| Artifact rollback | rollback plan fields required before publish |"
            echo "| Linux artifact upload | blocked until package-linux, checksum, signing/attestation, rollback, and license/NOTICE gates are complete |"
            echo "| Artifact gate | readiness only; no package or release asset is produced |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-version=${RELEASE_VERSION}"
          echo "release-event=${RELEASE_EVENT}"
          echo "release-ref=${RELEASE_REF}"
          echo "release-ref-name=${RELEASE_REF_NAME}"
          echo "release-sha=${RELEASE_SHA}"
          echo "release-actor=${RELEASE_ACTOR}"
          echo "release-policy=${{ needs.release-policy.result }}"
          echo "release-ci-gate=${{ needs.release-ci-gate.result }}"
          echo "release-ci-success-source-contract=present"
          echo "release-ci-source-contract=docs/architecture/release-ci-success-source-contract.md"
          echo "release-ci-required-workflow=CI"
          echo "release-ci-required-fields=ci_workflow_name,ci_workflow_file,ci_run_id,ci_run_attempt,ci_run_url,ci_run_status,ci_run_conclusion,ci_head_sha,ci_head_branch,ci_event,ci_repository,ci_checked_at"
          echo "release-artifact-contract=${{ needs.release-artifact-contract.result }}"
          echo "release-signing-contract=${{ needs.release-signing-contract.result }}"
          echo "release-rollback-contract=${{ needs.release-rollback-contract.result }}"
          echo "linux-artifact-readiness=${{ needs.linux-artifact-readiness.result }}"
          echo "linux-artifact-foreground-stop-release-contract=checked"
          echo "linux-artifact-manifest-contract=present"
          echo "linux-artifact-manifest-output-contract=placeholder"
          echo "linux-artifact-manifest-output-fields=artifact_manifest_name,artifact_manifest_path,artifact_manifest_checksum_file,artifact_manifest_checksum_value"
          echo "linux-package-platform-input-contract=present"
