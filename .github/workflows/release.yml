name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0-alpha.2
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  LINUX_TARGET: x86_64-unknown-linux-gnu
  LINUX_PACKAGE: networkcore-linux
  LINUX_BINARY: networkcore-linux
  LINUX_RUST_TOOLCHAIN: stable
  LINUX_RUST_PROFILE: minimal
  WINDOWS_TARGET: x86_64-pc-windows-gnu
  WINDOWS_RUST_TOOLCHAIN: stable
  WINDOWS_RUST_PROFILE: minimal
  WINDOWS_INSTALLER_FORMAT: msi
  WINDOWS_WIX_VERSION: 4.0.6

jobs:
  release-policy:
    name: Release policy
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.policy.outputs.version }}
      is_tag_release: ${{ steps.policy.outputs.is_tag_release }}
      release_kind: ${{ steps.policy.outputs.release_kind }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify release source
        id: policy
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          RELEASE_EVENT: ${{ github.event_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test -f AGENT.md
          test -f docs/release-strategy.md
          test -f docs/ci-cd-policy.md
          grep -q "GitHub Actions" AGENT.md
          grep -q "Release Strategy" docs/release-strategy.md

          version_pattern='^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|rc)\.[0-9]+)?$'
          if [[ ! "${RELEASE_VERSION}" =~ ${version_pattern} ]]; then
            echo "::error::Release version must match vMAJOR.MINOR.PATCH, vMAJOR.MINOR.PATCH-alpha.N, or vMAJOR.MINOR.PATCH-rc.N."
            exit 1
          fi

          release_kind=stable
          if [[ "${RELEASE_VERSION}" =~ -(alpha|rc)\. ]]; then
            release_kind=prerelease
          fi

          case "${RELEASE_EVENT}" in
            workflow_dispatch)
              if [ "${RELEASE_REF_TYPE}" != "branch" ] || [ "${RELEASE_REF_NAME}" != "main" ]; then
                echo "::error::workflow_dispatch release validation must run from main."
                exit 1
              fi
              echo "is_tag_release=false" >> "${GITHUB_OUTPUT}"
              ;;
            push)
              if [ "${RELEASE_REF_TYPE}" != "tag" ]; then
                echo "::error::push releases must be triggered by a tag ref."
                exit 1
              fi
              if [ "${RELEASE_VERSION}" != "${RELEASE_REF_NAME}" ]; then
                echo "::error::Tag-triggered release version must match the tag name."
                exit 1
              fi
              echo "is_tag_release=true" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "::error::Unsupported release event: ${RELEASE_EVENT}."
              exit 1
              ;;
          esac

          echo "version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_kind=${release_kind}" >> "${GITHUB_OUTPUT}"
          {
            echo "### Release Policy"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Version | ${RELEASE_VERSION} |"
            echo "| Event | ${RELEASE_EVENT} |"
            echo "| Ref type | ${RELEASE_REF_TYPE} |"
            echo "| Ref name | ${RELEASE_REF_NAME} |"
            echo "| Release kind | ${release_kind} |"
          } >> "${GITHUB_STEP_SUMMARY}"

  release-ci-gate:
    name: Release CI gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
    permissions:
      contents: read
      actions: read
    outputs:
      ci_workflow_name: ${{ steps.validate.outputs.ci_workflow_name }}
      ci_workflow_file: ${{ steps.validate.outputs.ci_workflow_file }}
      ci_run_id: ${{ steps.validate.outputs.ci_run_id }}
      ci_run_attempt: ${{ steps.validate.outputs.ci_run_attempt }}
      ci_run_url: ${{ steps.validate.outputs.ci_run_url }}
      ci_run_status: ${{ steps.validate.outputs.ci_run_status }}
      ci_run_conclusion: ${{ steps.validate.outputs.ci_run_conclusion }}
      ci_head_sha: ${{ steps.validate.outputs.ci_head_sha }}
      ci_head_branch: ${{ steps.validate.outputs.ci_head_branch }}
      ci_event: ${{ steps.validate.outputs.ci_event }}
      ci_repository: ${{ steps.validate.outputs.ci_repository }}
      ci_checked_at: ${{ steps.validate.outputs.ci_checked_at }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate same-commit CI success
        id: validate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test -f docs/architecture/release-ci-success-source-contract.md
          test -f docs/architecture/release-ci-gate-execution-validation-contract.md

          runs_json="$(gh api --method GET "repos/${RELEASE_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f branch=main \
            -f status=completed \
            -f head_sha="${RELEASE_SHA}" \
            -f per_page=20)"
          run_total="$(jq -r '.total_count // 0' <<< "${runs_json}")"
          run_count="$(jq -r '.workflow_runs | length' <<< "${runs_json}")"
          if [ "${run_total}" -gt "${run_count}" ]; then
            echo "::error::CI workflow runs query returned paginated results."
            exit 1
          fi

          ci_run_json="$(jq -c --arg sha "${RELEASE_SHA}" --arg repo "${RELEASE_REPOSITORY}" '
            [
              .workflow_runs[]
              | select(.name == "CI")
              | select(.path == ".github/workflows/ci.yml")
              | select(.head_branch == "main")
              | select(.head_sha == $sha)
              | select(.status == "completed")
              | select(.conclusion == "success")
              | select(.event == "push" or .event == "workflow_dispatch")
              | select(.repository.full_name == $repo)
            ]
            | sort_by(.created_at, .run_attempt)
            | last // empty
          ' <<< "${runs_json}")"
          if [ -z "${ci_run_json}" ]; then
            echo "::error::No successful completed CI run on main was found for ${RELEASE_REPOSITORY}@${RELEASE_SHA}."
            exit 1
          fi

          ci_run_id="$(jq -r '.id' <<< "${ci_run_json}")"
          ci_run_attempt="$(jq -r '.run_attempt' <<< "${ci_run_json}")"
          ci_run_url="$(jq -r '.html_url' <<< "${ci_run_json}")"
          ci_run_status="$(jq -r '.status' <<< "${ci_run_json}")"
          ci_run_conclusion="$(jq -r '.conclusion' <<< "${ci_run_json}")"
          ci_head_sha="$(jq -r '.head_sha' <<< "${ci_run_json}")"
          ci_head_branch="$(jq -r '.head_branch' <<< "${ci_run_json}")"
          ci_event="$(jq -r '.event' <<< "${ci_run_json}")"
          ci_repository="$(jq -r '.repository.full_name' <<< "${ci_run_json}")"

          jobs_json="$(gh api --method GET "repos/${RELEASE_REPOSITORY}/actions/runs/${ci_run_id}/jobs" \
            -f filter=latest \
            -f per_page=100)"
          job_total="$(jq -r '.total_count // 0' <<< "${jobs_json}")"
          job_count="$(jq -r '.jobs | length' <<< "${jobs_json}")"
          if [ "${job_total}" -gt "${job_count}" ]; then
            echo "::error::CI workflow jobs query returned paginated results."
            exit 1
          fi
          if ! jq -e '[.jobs[] | select(.name == "CI summary") | select(.status == "completed") | select(.conclusion == "success")] | length > 0' <<< "${jobs_json}" >/dev/null; then
            echo "::error::Selected CI run does not contain a successful CI summary job."
            exit 1
          fi

          ci_checked_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          {
            echo "ci_workflow_name=CI"
            echo "ci_workflow_file=.github/workflows/ci.yml"
            echo "ci_run_id=${ci_run_id}"
            echo "ci_run_attempt=${ci_run_attempt}"
            echo "ci_run_url=${ci_run_url}"
            echo "ci_run_status=${ci_run_status}"
            echo "ci_run_conclusion=${ci_run_conclusion}"
            echo "ci_head_sha=${ci_head_sha}"
            echo "ci_head_branch=${ci_head_branch}"
            echo "ci_event=${ci_event}"
            echo "ci_repository=${ci_repository}"
            echo "ci_checked_at=${ci_checked_at}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Release CI Gate"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| CI run | ${ci_run_id} |"
            echo "| CI URL | ${ci_run_url} |"
            echo "| CI branch | ${ci_head_branch} |"
            echo "| CI commit | ${ci_head_sha} |"
            echo "| CI conclusion | ${ci_run_conclusion} |"
            echo "| CI summary job | success |"
          } >> "${GITHUB_STEP_SUMMARY}"

  release-artifact-contract:
    name: Release artifact contract
    runs-on: ubuntu-latest
    needs:
      - release-ci-gate
    steps:
      - name: Record artifact contract
        shell: bash
        run: |
          set -euo pipefail
          echo "release-artifact-contract=active"
          echo "release-checksum-algorithm=sha256"
          echo "release-artifact-output-fields=artifact_name,artifact_path,checksum_algorithm,checksum_file,checksum_value,artifact_manifest_name,artifact_manifest_path,artifact_manifest_checksum_file,artifact_manifest_checksum_value"

  release-signing-contract:
    name: Release signing contract
    runs-on: ubuntu-latest
    needs:
      - release-artifact-contract
    steps:
      - name: Record signing and attestation contract
        shell: bash
        run: |
          set -euo pipefail
          echo "release-signing-contract=active"
          echo "release-signing-policy=unsigned-no-detached-signature"
          echo "release-attestation-policy=github-artifact-attestation-required"
          echo "release-provenance-policy=github-build-provenance-required"

  release-rollback-contract:
    name: Release rollback contract
    runs-on: ubuntu-latest
    needs:
      - release-signing-contract
    steps:
      - name: Record rollback contract
        shell: bash
        run: |
          set -euo pipefail
          echo "release-rollback-contract=active"
          echo "rollback_scope=linux-cli-artifact"
          echo "rollback_trigger=checksum-install-runtime-security-or-provenance-defect"
          echo "rollback_steps=withdraw-release-asset-and-publish-replacement-version"
          echo "replacement_version=next-version-required"
          echo "rollback_owner=maintainer"

  linux-artifact-readiness:
    name: Linux artifact readiness
    runs-on: ubuntu-latest
    needs:
      - release-rollback-contract
    outputs:
      release_state: ${{ steps.license.outputs.release_state }}
      license_status: ${{ steps.license.outputs.license_status }}
      license_source: ${{ steps.license.outputs.license_source }}
      notice_source: ${{ steps.license.outputs.notice_source }}
      artifact_files: ${{ steps.license.outputs.artifact_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Linux artifact readiness
        id: license
        shell: bash
        run: |
          set -euo pipefail
          test -f LICENSE
          test -f CHANGELOG.md
          test -f docs/release-strategy.md
          test -f apps/linux-cli/Cargo.toml
          test -f apps/linux-cli/src/main.rs
          test -f apps/linux-cli/src/lib.rs
          test -f docs/manual-intervention.md
          test -f docs/architecture/linux-artifact-license-notice-confirmation.md
          test -f docs/architecture/linux-package-license-notice-transition-validation-contract.md
          test -f docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          test -f docs/architecture/linux-package-artifact-build-command-validation-contract.md
          test -f docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          test -f docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          test -f docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          test -f docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          test -f docs/architecture/linux-package-artifact-attestation-execution-validation-contract.md
          test -f docs/architecture/linux-package-release-notes-rollback-execution-validation-contract.md
          test -f docs/architecture/linux-package-publish-eligibility-execution-validation-contract.md
          test -f docs/architecture/linux-cli-artifact-installation-rollback.md

          grep -q '^linux-artifact-release-state=confirmed-release-path$' docs/release-strategy.md
          grep -q '^linux-artifact-release-state=confirmed-release-path$' docs/architecture/linux-artifact-license-notice-confirmation.md
          grep -q '^linux-artifact-release-state=confirmed-release-path$' docs/architecture/linux-package-license-notice-transition-validation-contract.md
          grep -q '^linux-artifact-release-state=confirmed-release-path$' docs/architecture/linux-artifact-pre-release-design.md

          grep -q '^name = "networkcore-linux"$' apps/linux-cli/Cargo.toml
          grep -q '^\[\[bin\]\]$' apps/linux-cli/Cargo.toml
          grep -q '^path = "src/main.rs"$' apps/linux-cli/Cargo.toml

          if grep -q '^linux-artifact-license-notice-status=pending$' docs/manual-intervention.md; then
            echo "::error::linux-artifact-license-notice-status is pending. Confirm Apache-2.0 LICENSE and NOTICE=not-required in docs/manual-intervention.md before packaging."
            exit 1
          fi

          grep -q '^linux-artifact-release-state=confirmed-release-path$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-status=confirmed$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-source-contract=docs/architecture/linux-artifact-license-notice-confirmation.md$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-transition-contract=docs/architecture/linux-package-license-notice-transition-validation-contract.md$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-transition-commit=independent-manual-confirmation-commit$' docs/manual-intervention.md
          grep -Eq '^linux-artifact-license-notice-confirmed-at=[0-9]{4}-[0-9]{2}-[0-9]{2}$' docs/manual-intervention.md
          grep -Eq '^linux-artifact-license-notice-confirmed-by=[A-Za-z0-9_.-]+$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-scope=networkcore-linux$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-license-source=LICENSE$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-notice-source=not-required$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-artifact-files=LICENSE$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-package-linux=eligible-after-ci-and-release-gates$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-release-assets=eligible-after-package-signing-checksum-and-rollback-gates$' docs/manual-intervention.md

          echo "release_state=confirmed-release-path" >> "${GITHUB_OUTPUT}"
          echo "license_status=confirmed" >> "${GITHUB_OUTPUT}"
          echo "license_source=LICENSE" >> "${GITHUB_OUTPUT}"
          echo "notice_source=not-required" >> "${GITHUB_OUTPUT}"
          echo "artifact_files=LICENSE" >> "${GITHUB_OUTPUT}"

  ios-upload-readiness:
    name: iOS upload readiness
    runs-on: ubuntu-latest
    needs:
      - release-rollback-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Keep iOS upload blocked until source and signing gates exist
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/ios/README.md
          test -f docs/manual-intervention.md
          grep -q '^ios-upload-workflow-status=pending$' docs/manual-intervention.md
          grep -q '^ios-upload-workflow-release-assets=blocked$' docs/manual-intervention.md
          if find . -path ./.git -prune -o \( -type f \( -name "Package.swift" -o -name "*.swift" -o -name "PrivacyInfo.xcprivacy" -o -name "*.entitlements" -o -name "*.mobileprovision" -o -name "*.provisionprofile" -o -name "*.p12" -o -name "*.cer" -o -name "*.key" -o -name "*.pem" -o -name "*.xcframework" -o -name "*.a" -o -name "ExportOptions.plist" -o -name "*.ipa" \) -o -type d \( -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "*.xcarchive" -o -name "*.xcresult" -o -name "*.dSYM" \) \) -print -quit | grep -q .; then
            echo "::error::iOS source, signing, archive/export, upload, or release material must stay blocked."
            exit 1
          fi
          echo "ios-upload-readiness=blocked-placeholder"

  windows-cli-artifact-readiness:
    name: Windows managed client package/release readiness
    runs-on: ubuntu-latest
    needs:
      - release-rollback-contract
    outputs:
      source_contract_status: ${{ steps.windows.outputs.source_contract_status }}
      artifact_gate: ${{ steps.windows.outputs.artifact_gate }}
      source_identity: ${{ steps.windows.outputs.source_identity }}
      package_windows_status: ${{ steps.windows.outputs.package_windows_status }}
      release_assets_status: ${{ steps.windows.outputs.release_assets_status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Windows artifact package/release contract
        id: windows
        shell: bash
        env:
          WINDOWS_TARGET: ${{ env.WINDOWS_TARGET }}
          WINDOWS_INSTALLER_FORMAT: ${{ env.WINDOWS_INSTALLER_FORMAT }}
        run: |
          set -euo pipefail
          test -f docs/architecture/windows-managed-client-source-release-contract.md
          test -f docs/release-strategy.md
          test -f docs/alpha-release-feature-matrix.md
          test -f apps/linux-cli/Cargo.toml
          test -f apps/windows-cli/Cargo.toml
          test -f apps/windows-cli/src/main.rs
          test -f apps/windows-cli/src/lib.rs
          test -f apps/windows-cli/tests/windows_cli_contracts.rs
          test -f apps/windows-gui/Cargo.toml
          test -f apps/windows-gui/src/main.rs
          test -f apps/windows-service/Cargo.toml
          test -f apps/windows-service/src/main.rs
          test -f apps/windows-service/src/lib.rs
          test -f crates/platform-windows/Cargo.toml
          test -f crates/platform-windows/src/lib.rs
          test -f crates/platform-windows/src/managed.rs
          test -f crates/platform-windows/src/system_integration.rs
          test -f crates/platform-windows/tests/platform_windows_contracts.rs
          test -f installer/windows/Package.wxs
          test -f installer/windows/default-managed-config.json
          test -f installer/windows/PORTABLE-README.txt
          test -f .github/workflows/release.yml

          contract=docs/architecture/windows-managed-client-source-release-contract.md
          grep -q '^windows-managed-client-source-release-contract=present$' "${contract}"
          grep -q '^windows-managed-client-release-state=implementation-active$' "${contract}"
          grep -q '^windows-managed-client-version-scope=v0.2.0-alpha.13$' "${contract}"
          grep -q '^WINDOWS_CLI_ARTIFACT_GATE=windows-managed-client-active$' "${contract}"
          grep -q '^windows-managed-client-runner=windows-latest$' "${contract}"
          grep -q '^windows-managed-client-target-triple=x86_64-pc-windows-gnu$' "${contract}"
          grep -q '^windows-managed-client-package-format=msi$' "${contract}"
          grep -q '^windows-managed-client-wix-version=4.0.6$' "${contract}"
          grep -q '^windows-managed-client-checksum-algorithm=sha256$' "${contract}"
          grep -q '^windows-managed-client-manifest-schema-version=2$' "${contract}"
          grep -q '^windows-managed-client-install-model=wix-per-machine-msi$' "${contract}"
          grep -q '^windows-managed-client-system-mutation-policy=managed-apply-and-rollback$' "${contract}"
          grep -q '^windows-managed-client-service=active$' "${contract}"
          grep -q '^windows-managed-client-driver-package-lifecycle=active$' "${contract}"
          grep -q '^windows-managed-client-installer=active$' "${contract}"
          grep -q '^windows-managed-client-msi-service-start=asynchronous-on-install$' "${contract}"
          grep -q '^windows-managed-client-service-start-handoff=immediate-scm-running-then-managed-runtime$' "${contract}"
          grep -q '^windows-managed-client-diagnostics=gui-config-preflight-and-local-report-active$' "${contract}"
          grep -q '^windows-managed-client-system-proxy-mutation=active$' "${contract}"
          grep -q '^windows-managed-client-trust-store-mutation=active$' "${contract}"
          grep -q '^windows-managed-client-managed-lifecycle=active$' "${contract}"
          grep -q '^windows-managed-client-sing-box-managed-process=active$' "${contract}"
          grep -q '^windows-managed-client-sing-box-bundled=blocked$' "${contract}"
          grep -q '^windows-managed-client-sing-box-gui-install=active$' "${contract}"
          grep -q '^windows-managed-client-local-profile-import=active$' "${contract}"
          grep -q '^windows-managed-client-sing-box-native-json-import=active$' "${contract}"
          grep -q '^windows-managed-client-sing-box-native-json-mitm=controlled-mixed-in-snapshot-restore-active$' "${contract}"
          grep -q '^windows-managed-client-remote-subscription-fetch=operator-initiated-http-s-profile-import-and-update-active$' "${contract}"
          grep -q '^windows-managed-client-remote-subscription-update=single-saved-url-explicit-only$' "${contract}"
          grep -q '^windows-managed-client-sing-box-basic-protocols=shadowsocks-trojan-vless-vmess-hysteria2-tuic$' "${contract}"
          grep -q '^windows-managed-client-sing-box-quic-share-link-import=hysteria2-tuic-local-file-active$' "${contract}"
          grep -q '^windows-managed-client-sing-box-v2ray-share-link-compatibility=tls-reality-ws-grpc-http-httpupgrade-quic-local-file-active$' "${contract}"
          grep -q '^windows-managed-client-sing-box-advanced-transport-rendering=v2ray-share-link-subset-active$' "${contract}"
          grep -q '^windows-managed-client-mitm-data-plane=active$' "${contract}"
          grep -q '^windows-managed-client-mitm-certificate-lifecycle=active$' "${contract}"
          grep -q '^windows-managed-client-mitm-protocol=http1-controlled-tls$' "${contract}"
          grep -q '^windows-managed-client-gui=active$' "${contract}"
          grep -q '^windows-managed-client-script-dispatch=blocked$' "${contract}"
          grep -q '^windows-managed-client-attestation-policy=github-artifact-attestation-required$' "${contract}"
          grep -q '^windows-managed-client-release-assets=enabled-after-attestation-and-publish-gate$' "${contract}"
          grep -q '^windows-managed-client-portable-zip=active$' "${contract}"
          grep -q '^windows-managed-client-portable-release-assets=enabled-after-attestation-and-publish-gate$' "${contract}"
          grep -q 'networkcore-windows-gui.exe' "${contract}"
          grep -q 'networkcore-windows-service.exe' "${contract}"
          grep -q 'networkcore-windows.exe' "${contract}"
          grep -q "${WINDOWS_TARGET}" "${contract}"
          grep -q "${WINDOWS_INSTALLER_FORMAT}" "${contract}"
          grep -Fq '`v0.1.1-alpha.1`：Windows CLI artifact source/release contract' docs/alpha-release-feature-matrix.md
          grep -Fq '`v0.1.1-alpha.2`：Windows CLI package/publish path' docs/alpha-release-feature-matrix.md
          grep -q "Windows CLI package/publish path" docs/release-strategy.md
          grep -q '^name = "networkcore-linux"$' apps/linux-cli/Cargo.toml
          grep -q 'platform-linux' apps/linux-cli/Cargo.toml
          grep -q '^name = "networkcore-windows"$' apps/windows-cli/Cargo.toml
          grep -q 'platform-windows' apps/windows-cli/Cargo.toml
          grep -q '^name = "networkcore-windows-gui"$' apps/windows-gui/Cargo.toml
          grep -q '^name = "networkcore-windows-service"$' apps/windows-service/Cargo.toml
          grep -q '^  package-windows:' .github/workflows/release.yml

          echo "source_contract_status=present" >> "${GITHUB_OUTPUT}"
          echo "artifact_gate=windows-managed-client-active" >> "${GITHUB_OUTPUT}"
          echo "source_identity=apps/windows-gui+apps/windows-service+apps/windows-cli+platform-windows+installer/windows" >> "${GITHUB_OUTPUT}"
          echo "package_windows_status=defined" >> "${GITHUB_OUTPUT}"
          echo "release_assets_status=enabled-after-attestation-and-publish-gate" >> "${GITHUB_OUTPUT}"

  package-linux:
    name: Package Linux CLI
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - linux-artifact-readiness
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      artifact_path: ${{ steps.package.outputs.artifact_path }}
      checksum_algorithm: ${{ steps.package.outputs.checksum_algorithm }}
      checksum_file: ${{ steps.package.outputs.checksum_file }}
      checksum_value: ${{ steps.package.outputs.checksum_value }}
      artifact_manifest_name: ${{ steps.package.outputs.artifact_manifest_name }}
      artifact_manifest_path: ${{ steps.package.outputs.artifact_manifest_path }}
      artifact_manifest_checksum_file: ${{ steps.package.outputs.artifact_manifest_checksum_file }}
      artifact_manifest_checksum_value: ${{ steps.package.outputs.artifact_manifest_checksum_value }}
      bundle_name: ${{ steps.package.outputs.bundle_name }}
      output_dir: ${{ steps.package.outputs.output_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Build, package, checksum, and manifest Linux CLI
        id: package
        shell: bash
        env:
          VERSION: ${{ needs.release-policy.outputs.version }}
          TARGET: ${{ env.LINUX_TARGET }}
          PACKAGE: ${{ env.LINUX_PACKAGE }}
          BINARY: ${{ env.LINUX_BINARY }}
          RUST_TOOLCHAIN: ${{ env.LINUX_RUST_TOOLCHAIN }}
          RUST_PROFILE: ${{ env.LINUX_RUST_PROFILE }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          RELEASE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          checkout_sha="$(git rev-parse HEAD)"
          if [ "${checkout_sha}" != "${RELEASE_SHA}" ]; then
            echo "::error::Checkout SHA ${checkout_sha} does not match release SHA ${RELEASE_SHA}."
            exit 1
          fi

          rustup toolchain install "${RUST_TOOLCHAIN}" --profile "${RUST_PROFILE}"
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add "${TARGET}" --toolchain "${RUST_TOOLCHAIN}"

          test -f Cargo.lock
          cargo build --locked --release --package "${PACKAGE}" --bin "${BINARY}" --target "${TARGET}"

          binary_path="target/${TARGET}/release/${BINARY}"
          test -f "${binary_path}"
          test -x "${binary_path}"
          if [ -L "${binary_path}" ]; then
            echo "::error::Release binary must not be a symlink."
            exit 1
          fi

          version="${VERSION}"
          target="${TARGET}"
          top_level_dir="networkcore-linux-${version}-${target}"
          dist_dir="dist/linux/${target}"
          staging_root="${dist_dir}/staging"
          staging_dir="${staging_root}/${top_level_dir}"
          output_dir="${dist_dir}/artifacts"
          archive_name="${top_level_dir}.tar.gz"
          archive_path="${output_dir}/${archive_name}"
          archive_checksum_name="${archive_name}.sha256"
          archive_checksum_path="${output_dir}/${archive_checksum_name}"
          manifest_name="${top_level_dir}.manifest.json"
          manifest_path="${output_dir}/${manifest_name}"
          manifest_checksum_name="${manifest_name}.sha256"
          manifest_checksum_path="${output_dir}/${manifest_checksum_name}"
          bundle_name="${top_level_dir}-release-bundle"

          rm -rf "${dist_dir}"
          mkdir -p "${staging_dir}/bin" "${staging_dir}/libexec" "${output_dir}"
          install -m 0755 "${binary_path}" "${staging_dir}/bin/${BINARY}"
          script_runner_source="third_party/mitm_anixops/mitm_anixops/e2e/script_runtime/anixops_runner.js"
          test -f "${script_runner_source}"
          install -m 0755 "${script_runner_source}" "${staging_dir}/libexec/anixops-runner.js"
          install -m 0644 LICENSE "${staging_dir}/LICENSE"
          install -m 0644 CHANGELOG.md "${staging_dir}/CHANGELOG.md"
          cat > "${staging_dir}/INSTALL.md" <<EOF
          # networkcore-linux ${version}

          This archive is generated by GitHub Actions for ${version}.

          ## Install

          1. Verify ${archive_checksum_name}.
          2. Extract ${archive_name} into a versioned directory you control.
          3. Run bin/networkcore-linux directly or add that bin directory to PATH.

          This artifact does not install a system service, grant capabilities, modify DNS,
          routes, firewall rules, certificate trust stores, or background daemon state.

          ## Optional local script runtime

          The archive includes libexec/anixops-runner.js for explicitly enabled local plugin
          scripts. It requires a locally installed Node.js runtime (CI validates Node 22).
          NetworkCore never downloads a script: provide --enable-script-runtime --confirm,
          --script-runner <extract-dir>/libexec/anixops-runner.js, and one or more
          --script-map <script-url>=<local-file> values when starting the CLI.

          ## Uninstall

          Stop any foreground networkcore-linux process, remove the extracted directory,
          and remove any user-created symlink, alias, or PATH entry.

          ## Rollback

          Stop the current foreground process, switch PATH or symlink back to a previous
          extracted version, verify that older version's checksum, and run
          networkcore-linux version.
          EOF

          actual_files="$(find "${staging_dir}" -type f -printf '%P\n' | sort | paste -sd ',')"
          expected_files="CHANGELOG.md,INSTALL.md,LICENSE,bin/${BINARY},libexec/anixops-runner.js"
          if [ "${actual_files}" != "${expected_files}" ]; then
            echo "::error::Unexpected archive staging files: ${actual_files}"
            exit 1
          fi

          tar -czf "${archive_path}" -C "${staging_root}" "${top_level_dir}"
          top_level_count="$(tar -tzf "${archive_path}" | awk -F/ 'NF {print $1}' | sort -u | wc -l | tr -d ' ')"
          if [ "${top_level_count}" != "1" ]; then
            echo "::error::Archive must contain exactly one top-level directory."
            exit 1
          fi
          if [ "$(tar -tzf "${archive_path}" | awk -F/ 'NF {print $1}' | sort -u)" != "${top_level_dir}" ]; then
            echo "::error::Archive top-level directory mismatch."
            exit 1
          fi

          (
            cd "${output_dir}"
            sha256sum "${archive_name}" > "${archive_checksum_name}"
          )
          checksum_value="$(cut -d' ' -f1 "${archive_checksum_path}")"
          if ! [[ "${checksum_value}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Archive checksum is not a sha256 digest."
            exit 1
          fi

          archive_size="$(wc -c < "${archive_path}" | tr -d ' ')"
          jq -n \
            --arg artifact_name "${archive_name}" \
            --arg target_triple "${target}" \
            --arg version "${version}" \
            --arg commit_sha "${RELEASE_SHA}" \
            --arg source_ref "${SOURCE_REF}" \
            --arg ci_run_url "${CI_RUN_URL}" \
            --arg release_run_url "${RELEASE_RUN_URL}" \
            --arg runner "ubuntu-latest" \
            --arg rust_toolchain "${RUST_TOOLCHAIN}" \
            --arg archive_relative_path "${archive_path}" \
            --arg archive_checksum_name "${archive_checksum_name}" \
            --arg checksum_value "${checksum_value}" \
            --argjson archive_size "${archive_size}" \
            '{
              schema_version: 1,
              artifact_kind: "linux-cli-tarball",
              package_format: "tar.gz",
              artifact_name: $artifact_name,
              target_triple: $target_triple,
              version: $version,
              commit_sha: $commit_sha,
              source_ref: $source_ref,
              ci_run_url: $ci_run_url,
              release_run_url: $release_run_url,
              runner: $runner,
              rust_toolchain: $rust_toolchain,
              archive: {
                file_name: $artifact_name,
                relative_path: $archive_relative_path,
                size_bytes: $archive_size
              },
              checksum: {
                algorithm: "sha256",
                file_name: $archive_checksum_name,
                value: $checksum_value
              },
              included_files: [
                {path: "bin/networkcore-linux", kind: "binary", required: true, source: "apps/linux-cli"},
                {path: "libexec/anixops-runner.js", kind: "script-runner", required: true, source: "third_party/mitm_anixops"},
                {path: "INSTALL.md", kind: "documentation", required: true, source: "generated-from-linux-cli-artifact-installation-rollback"},
                {path: "LICENSE", kind: "license", required: true, source: "LICENSE"},
                {path: "CHANGELOG.md", kind: "changelog", required: true, source: "CHANGELOG.md"}
              ],
              install_model: "manual-extract",
              system_mutation_policy: "none",
              license_notice_status: "confirmed",
              signing: {
                signing_policy: "unsigned-no-detached-signature",
                signing_status: "not-signed-by-policy",
                attestation_policy: "github-artifact-attestation-required",
                attestation_status: "required-before-publish",
                provenance_policy: "github-build-provenance-required",
                provenance_file: "github-artifact-attestation"
              },
              release_notes: {
                release_notes_policy: "required-before-publish",
                release_notes_status: "generated-before-publish",
                release_notes_source: "CHANGELOG.md-and-release-summary",
                withdrawal_policy: "withdrawal-not-overwrite",
                replacement_policy: "new-version-tag-required"
              },
              rollback: {
                rollback_policy: "manual-extract-version-switch",
                rollback_status: "summarized-before-publish",
                rollback_scope: "linux-cli-artifact",
                rollback_trigger: "checksum-install-runtime-security-or-provenance-defect",
                rollback_steps: "withdraw-release-asset-and-publish-replacement-version",
                replacement_version: "next-version-required",
                rollback_owner: "maintainer"
              },
              publish_eligibility: {
                status: "eligible-after-attestation-release-notes-and-publish-gate",
                required_gates: [
                  "license_notice",
                  "ci",
                  "runner_toolchain",
                  "archive_staging",
                  "checksum_manifest",
                  "artifact_manifest",
                  "publish_upload",
                  "signing_attestation",
                  "release_notes_rollback"
                ],
                license_notice: "confirmed",
                ci: "success",
                runner_toolchain: "matched",
                archive_staging: "matched",
                checksum_manifest: "verified",
                artifact_manifest: "generated",
                publish_upload: "ready",
                signing_attestation: "required-before-publish",
                release_notes_rollback: "summarized-before-publish"
              }
            }' > "${manifest_path}"

          if [ "$(jq -r '.archive.file_name' "${manifest_path}")" != "${archive_name}" ]; then
            echo "::error::Manifest archive file name mismatch."
            exit 1
          fi
          if [ "$(jq -r '.checksum.value' "${manifest_path}")" != "${checksum_value}" ]; then
            echo "::error::Manifest checksum value mismatch."
            exit 1
          fi

          (
            cd "${output_dir}"
            sha256sum "${manifest_name}" > "${manifest_checksum_name}"
            sha256sum -c "${archive_checksum_name}"
            sha256sum -c "${manifest_checksum_name}"
          )
          manifest_checksum_value="$(cut -d' ' -f1 "${manifest_checksum_path}")"

          for file in "${archive_path}" "${archive_checksum_path}" "${manifest_path}" "${manifest_checksum_path}"; do
            test -f "${file}"
            test -s "${file}"
          done
          file_count="$(find "${output_dir}" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [ "${file_count}" != "4" ]; then
            echo "::error::Artifact output dir must contain exactly four files."
            find "${output_dir}" -maxdepth 1 -type f -print
            exit 1
          fi

          {
            echo "artifact_name=${archive_name}"
            echo "artifact_path=${archive_path}"
            echo "checksum_algorithm=sha256"
            echo "checksum_file=${archive_checksum_path}"
            echo "checksum_value=${checksum_value}"
            echo "artifact_manifest_name=${manifest_name}"
            echo "artifact_manifest_path=${manifest_path}"
            echo "artifact_manifest_checksum_file=${manifest_checksum_path}"
            echo "artifact_manifest_checksum_value=${manifest_checksum_value}"
            echo "bundle_name=${bundle_name}"
            echo "output_dir=${output_dir}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Linux CLI Artifact"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Archive | ${archive_name} |"
            echo "| Archive sha256 | ${checksum_value} |"
            echo "| Manifest | ${manifest_name} |"
            echo "| Manifest sha256 | ${manifest_checksum_value} |"
            echo "| Target | ${target} |"
            echo "| Install model | manual-extract |"
            echo "| System mutation policy | none |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Linux release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.bundle_name }}
          path: |
            ${{ steps.package.outputs.artifact_path }}
            ${{ steps.package.outputs.checksum_file }}
            ${{ steps.package.outputs.artifact_manifest_path }}
            ${{ steps.package.outputs.artifact_manifest_checksum_file }}
          retention-days: 14
          if-no-files-found: error

  package-windows:
    name: Package Windows managed client
    runs-on: windows-latest
    needs:
      - release-policy
      - release-ci-gate
      - windows-cli-artifact-readiness
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      artifact_path: ${{ steps.package.outputs.artifact_path }}
      checksum_algorithm: ${{ steps.package.outputs.checksum_algorithm }}
      checksum_file: ${{ steps.package.outputs.checksum_file }}
      checksum_value: ${{ steps.package.outputs.checksum_value }}
      artifact_manifest_name: ${{ steps.package.outputs.artifact_manifest_name }}
      artifact_manifest_path: ${{ steps.package.outputs.artifact_manifest_path }}
      artifact_manifest_checksum_file: ${{ steps.package.outputs.artifact_manifest_checksum_file }}
      artifact_manifest_checksum_value: ${{ steps.package.outputs.artifact_manifest_checksum_value }}
      portable_artifact_name: ${{ steps.package.outputs.portable_artifact_name }}
      portable_artifact_path: ${{ steps.package.outputs.portable_artifact_path }}
      portable_checksum_file: ${{ steps.package.outputs.portable_checksum_file }}
      portable_checksum_value: ${{ steps.package.outputs.portable_checksum_value }}
      portable_manifest_name: ${{ steps.package.outputs.portable_manifest_name }}
      portable_manifest_path: ${{ steps.package.outputs.portable_manifest_path }}
      portable_manifest_checksum_file: ${{ steps.package.outputs.portable_manifest_checksum_file }}
      portable_manifest_checksum_value: ${{ steps.package.outputs.portable_manifest_checksum_value }}
      bundle_name: ${{ steps.package.outputs.bundle_name }}
      output_dir: ${{ steps.package.outputs.output_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Windows C toolchain
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libsystre

      - name: Configure Windows Rust GNU target
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $MsysRoot = "${{ steps.msys2.outputs.msys2-location }}"
          $MingwPrefix = Join-Path $MsysRoot "mingw64"
          "$MingwPrefix\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "MSYS2_LOCATION=$MsysRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MINGW_PREFIX=$MingwPrefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_BUILD_TARGET=${{ env.WINDOWS_TARGET }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CC_x86_64_pc_windows_gnu=$MingwPrefix\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AR_x86_64_pc_windows_gnu=$MingwPrefix\bin\ar.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$MingwPrefix\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install pinned WiX toolset
        shell: pwsh
        env:
          WIX_VERSION: ${{ env.WINDOWS_WIX_VERSION }}
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global wix --version $env:WIX_VERSION
          wix extension add -g "WixToolset.UI.wixext/$env:WIX_VERSION"
          wix --version

      - name: Build, validate, checksum, and manifest Windows managed client
        id: package
        shell: pwsh
        env:
          VERSION: ${{ needs.release-policy.outputs.version }}
          TARGET: ${{ env.WINDOWS_TARGET }}
          RUST_TOOLCHAIN: ${{ env.WINDOWS_RUST_TOOLCHAIN }}
          RUST_PROFILE: ${{ env.WINDOWS_RUST_PROFILE }}
          WIX_VERSION: ${{ env.WINDOWS_WIX_VERSION }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          RELEASE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          $ErrorActionPreference = "Stop"
          $checkoutSha = (git rev-parse HEAD).Trim()
          if ($checkoutSha -ne $env:RELEASE_SHA) {
            throw "Checkout SHA $checkoutSha does not match release SHA $env:RELEASE_SHA."
          }

          rustup toolchain install $env:RUST_TOOLCHAIN --profile $env:RUST_PROFILE
          rustup default $env:RUST_TOOLCHAIN
          rustup target add $env:TARGET --toolchain $env:RUST_TOOLCHAIN

          if (-not (Test-Path -Path Cargo.lock -PathType Leaf)) {
            throw "Cargo.lock must be checked in before creating release artifacts."
          }
          cargo build --locked --release `
            --package networkcore-windows `
            --package networkcore-windows-gui `
            --package networkcore-windows-service `
            --target $env:TARGET

          $releaseDir = "target\$env:TARGET\release"
          $cliPath = Join-Path $releaseDir "networkcore-windows.exe"
          $guiPath = Join-Path $releaseDir "networkcore-windows-gui.exe"
          $servicePath = Join-Path $releaseDir "networkcore-windows-service.exe"
          foreach ($binaryPath in @($cliPath, $guiPath, $servicePath)) {
            if (-not (Test-Path -Path $binaryPath -PathType Leaf)) {
              throw "Windows release binary not found: $binaryPath"
            }
          }
          $cliPath = (Resolve-Path $cliPath).Path
          $guiPath = (Resolve-Path $guiPath).Path
          $servicePath = (Resolve-Path $servicePath).Path
          $defaultConfigPath = (Resolve-Path "installer\windows\default-managed-config.json").Path
          $portableReadmePath = (Resolve-Path "installer\windows\PORTABLE-README.txt").Path

          $version = $env:VERSION
          $target = $env:TARGET
          if ($version -notmatch '^v([0-9]+)\.([0-9]+)\.([0-9]+)(?:-(alpha|rc)\.([0-9]+))?$') {
            throw "Windows MSI version source is invalid: $version"
          }
          $major = [int]$Matches[1]
          $minor = [int]$Matches[2]
          $patch = [int]$Matches[3]
          $channel = $Matches[4]
          $sequence = if ($Matches[5]) { [int]$Matches[5] } else { 0 }
          $msiBuild = $patch * 1000
          if ($channel -eq "alpha") {
            $msiBuild += $sequence
          } elseif ($channel -eq "rc") {
            $msiBuild += 900 + $sequence
          } else {
            $msiBuild += 999
          }
          if ($major -gt 255 -or $minor -gt 255 -or $msiBuild -gt 65535) {
            throw "Mapped MSI product version exceeds Windows Installer limits."
          }
          $productVersion = "$major.$minor.$msiBuild"
          $artifactStem = "networkcore-windows-$version-$target"
          $distDir = "dist\windows\$target"
          $outputDir = Join-Path $distDir "artifacts"
          $archiveName = "$artifactStem.msi"
          $archivePath = Join-Path $outputDir $archiveName
          $archiveChecksumName = "$archiveName.sha256"
          $archiveChecksumPath = Join-Path $outputDir $archiveChecksumName
          $manifestName = "$artifactStem.manifest.json"
          $manifestPath = Join-Path $outputDir $manifestName
          $manifestChecksumName = "$manifestName.sha256"
          $manifestChecksumPath = Join-Path $outputDir $manifestChecksumName
          $portableStem = "networkcore-windows-portable-$version-$target"
          $portableArchiveName = "$portableStem.zip"
          $portableArchivePath = Join-Path $outputDir $portableArchiveName
          $portableChecksumName = "$portableArchiveName.sha256"
          $portableChecksumPath = Join-Path $outputDir $portableChecksumName
          $portableManifestName = "$portableStem.manifest.json"
          $portableManifestPath = Join-Path $outputDir $portableManifestName
          $portableManifestChecksumName = "$portableManifestName.sha256"
          $portableManifestChecksumPath = Join-Path $outputDir $portableManifestChecksumName
          $portableStageDir = Join-Path $distDir "portable\$portableStem"
          $bundleName = "$artifactStem-release-bundle"

          Remove-Item -Recurse -Force $distDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          wix build installer/windows/Package.wxs `
            -ext WixToolset.UI.wixext `
            -arch x64 `
            -d "ProductVersion=$productVersion" `
            -d "CliExe=$cliPath" `
            -d "GuiExe=$guiPath" `
            -d "ServiceExe=$servicePath" `
            -d "DefaultConfig=$defaultConfigPath" `
            -o $archivePath
          wix msi validate $archivePath
          # WiX emits a .wixpdb beside the MSI; it is a build symbol, not a release asset.
          $wixPdbPath = [System.IO.Path]::ChangeExtension($archivePath, ".wixpdb")
          Remove-Item -Force $wixPdbPath -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Force -Path $portableStageDir | Out-Null
          Copy-Item -Path $cliPath -Destination (Join-Path $portableStageDir "networkcore-windows.exe")
          Copy-Item -Path $guiPath -Destination (Join-Path $portableStageDir "networkcore-windows-gui.exe")
          Copy-Item -Path $servicePath -Destination (Join-Path $portableStageDir "networkcore-windows-service.exe")
          Copy-Item -Path $defaultConfigPath -Destination (Join-Path $portableStageDir "managed-config.json")
          Copy-Item -Path $portableReadmePath -Destination (Join-Path $portableStageDir "README.txt")
          Compress-Archive -Path $portableStageDir -DestinationPath $portableArchivePath -CompressionLevel Optimal

          $checksumValue = (Get-FileHash -Algorithm SHA256 -Path $archivePath).Hash.ToLowerInvariant()
          if ($checksumValue -notmatch '^[0-9a-f]{64}$') {
            throw "MSI checksum is not a sha256 digest."
          }
          "$checksumValue  $archiveName" | Set-Content -Path $archiveChecksumPath -Encoding ascii
          $archiveSize = (Get-Item $archivePath).Length
          $manifest = [ordered]@{
            schema_version = 2
            artifact_kind = "windows-managed-client-msi"
            package_format = "msi"
            artifact_name = $archiveName
            target_triple = $target
            version = $version
            commit_sha = $env:RELEASE_SHA
            source_ref = $env:SOURCE_REF
            ci_run_url = $env:CI_RUN_URL
            release_run_url = $env:RELEASE_RUN_URL
            runner = "windows-latest"
            rust_toolchain = $env:RUST_TOOLCHAIN
            wix_version = $env:WIX_VERSION
            product_version = $productVersion
            installer = [ordered]@{
              file_name = $archiveName
              relative_path = "dist/windows/$target/artifacts/$archiveName"
              size_bytes = $archiveSize
            }
            checksum = [ordered]@{
              algorithm = "sha256"
              file_name = $archiveChecksumName
              value = $checksumValue
            }
            included_files = @(
              [ordered]@{ path = "networkcore-windows-gui.exe"; kind = "binary"; required = $true; source = "apps/windows-gui" },
              [ordered]@{ path = "networkcore-windows-service.exe"; kind = "binary"; required = $true; source = "apps/windows-service" },
              [ordered]@{ path = "networkcore-windows.exe"; kind = "binary"; required = $true; source = "apps/windows-cli" },
              [ordered]@{ path = "managed-config.json"; kind = "configuration"; required = $true; source = "installer/windows/default-managed-config.json" }
            )
            install_model = "wix-per-machine-msi"
            system_mutation_policy = "managed-apply-and-rollback"
            source_identity = "apps/windows-gui+apps/windows-service+apps/windows-cli+platform-windows+installer/windows"
            capability_anchor = "windows-release-assets"
            subscription_compatibility = "parser-gates-active-run-compat-deferred"
            active_operations = @(
              "install-windows-service",
              "install-signed-inf-driver-package",
              "run-wix-installer",
              "mutate-system-proxy",
              "mutate-system-trust-store",
              "managed-daemon-lifecycle"
            )
            blocked_operations = @(
              "execute-javascript-dispatch"
            )
            signing = [ordered]@{
              signing_policy = "unsigned-alpha-msi-with-github-attestation"
              signing_status = "not-signed-by-policy"
              attestation_policy = "github-artifact-attestation-required"
              attestation_status = "required-before-publish"
              provenance_policy = "github-build-provenance-required"
              provenance_file = "github-artifact-attestation"
            }
            rollback = [ordered]@{
              rollback_policy = "msi-uninstall-purge-and-version-reinstall"
              rollback_status = "summarized-before-publish"
              rollback_scope = "windows-managed-client"
              rollback_trigger = "checksum-install-runtime-security-or-provenance-defect"
              rollback_steps = "withdraw-release-asset-and-publish-replacement-version"
              replacement_version = "next-version-required"
              rollback_owner = "maintainer"
            }
          }
          $manifest | ConvertTo-Json -Depth 20 | Set-Content -Path $manifestPath -Encoding utf8
          $manifestChecksumValue = (Get-FileHash -Algorithm SHA256 -Path $manifestPath).Hash.ToLowerInvariant()
          "$manifestChecksumValue  $manifestName" | Set-Content -Path $manifestChecksumPath -Encoding ascii

          $portableChecksumValue = (Get-FileHash -Algorithm SHA256 -Path $portableArchivePath).Hash.ToLowerInvariant()
          if ($portableChecksumValue -notmatch '^[0-9a-f]{64}$') {
            throw "Portable ZIP checksum is not a sha256 digest."
          }
          "$portableChecksumValue  $portableArchiveName" | Set-Content -Path $portableChecksumPath -Encoding ascii
          $portableArchiveSize = (Get-Item $portableArchivePath).Length
          $portableManifest = [ordered]@{
            schema_version = 2
            artifact_kind = "windows-managed-client-portable-zip"
            package_format = "zip"
            artifact_name = $portableArchiveName
            target_triple = $target
            version = $version
            commit_sha = $env:RELEASE_SHA
            source_ref = $env:SOURCE_REF
            ci_run_url = $env:CI_RUN_URL
            release_run_url = $env:RELEASE_RUN_URL
            runner = "windows-latest"
            rust_toolchain = $env:RUST_TOOLCHAIN
            archive = [ordered]@{
              file_name = $portableArchiveName
              relative_path = "dist/windows/$target/artifacts/$portableArchiveName"
              size_bytes = $portableArchiveSize
            }
            checksum = [ordered]@{
              algorithm = "sha256"
              file_name = $portableChecksumName
              value = $portableChecksumValue
            }
            included_files = @(
              [ordered]@{ path = "$portableStem/networkcore-windows-gui.exe"; kind = "binary"; required = $true; source = "apps/windows-gui" },
              [ordered]@{ path = "$portableStem/networkcore-windows-service.exe"; kind = "binary"; required = $true; source = "apps/windows-service" },
              [ordered]@{ path = "$portableStem/networkcore-windows.exe"; kind = "binary"; required = $true; source = "apps/windows-cli" },
              [ordered]@{ path = "$portableStem/managed-config.json"; kind = "configuration"; required = $true; source = "installer/windows/default-managed-config.json" },
              [ordered]@{ path = "$portableStem/README.txt"; kind = "documentation"; required = $true; source = "installer/windows/PORTABLE-README.txt" }
            )
            install_model = "manual-extract"
            system_mutation_policy = "explicit-gui-or-service-command-only"
            source_identity = "apps/windows-gui+apps/windows-service+apps/windows-cli+platform-windows+installer/windows"
            capability_anchor = "windows-portable-release-assets"
            active_operations = @(
              "run-native-gui",
              "explicit-install-windows-service",
              "explicit-system-proxy-mutation",
              "explicit-system-trust-store-mutation",
              "explicit-managed-daemon-lifecycle"
            )
            blocked_operations = @(
              "automatic-service-registration-on-extract",
              "automatic-service-start-on-extract",
              "execute-javascript-dispatch"
            )
            signing = [ordered]@{
              signing_policy = "unsigned-alpha-portable-zip-with-github-attestation"
              signing_status = "not-signed-by-policy"
              attestation_policy = "github-artifact-attestation-required"
              attestation_status = "required-before-publish"
              provenance_policy = "github-build-provenance-required"
              provenance_file = "github-artifact-attestation"
            }
            rollback = [ordered]@{
              rollback_policy = "purge-uninstall-service-delete-extracted-directory"
              rollback_status = "summarized-before-publish"
              rollback_scope = "windows-managed-client-portable"
              rollback_trigger = "checksum-runtime-security-or-provenance-defect"
              rollback_steps = "purge-uninstall-delete-and-publish-replacement-version"
              replacement_version = "next-version-required"
              rollback_owner = "maintainer"
            }
          }
          $portableManifest | ConvertTo-Json -Depth 20 | Set-Content -Path $portableManifestPath -Encoding utf8
          $portableManifestChecksumValue = (Get-FileHash -Algorithm SHA256 -Path $portableManifestPath).Hash.ToLowerInvariant()
          "$portableManifestChecksumValue  $portableManifestName" | Set-Content -Path $portableManifestChecksumPath -Encoding ascii

          foreach ($file in @(
            $archivePath,
            $archiveChecksumPath,
            $manifestPath,
            $manifestChecksumPath,
            $portableArchivePath,
            $portableChecksumPath,
            $portableManifestPath,
            $portableManifestChecksumPath
          )) {
            if (-not (Test-Path -Path $file -PathType Leaf)) {
              throw "Missing Windows artifact output file: $file"
            }
            if ((Get-Item $file).Length -le 0) {
              throw "Empty Windows artifact output file: $file"
            }
          }
          $fileCount = @(Get-ChildItem -Path $outputDir -File).Count
          if ($fileCount -ne 8) {
            $fileNames = @(Get-ChildItem -Path $outputDir -File | Select-Object -ExpandProperty Name) -join ", "
            throw "Windows artifact output dir must contain exactly eight files. Found: $fileNames"
          }

          @(
            "artifact_name=$archiveName",
            "artifact_path=$archivePath",
            "checksum_algorithm=sha256",
            "checksum_file=$archiveChecksumPath",
            "checksum_value=$checksumValue",
            "artifact_manifest_name=$manifestName",
            "artifact_manifest_path=$manifestPath",
            "artifact_manifest_checksum_file=$manifestChecksumPath",
            "artifact_manifest_checksum_value=$manifestChecksumValue",
            "portable_artifact_name=$portableArchiveName",
            "portable_artifact_path=$portableArchivePath",
            "portable_checksum_file=$portableChecksumPath",
            "portable_checksum_value=$portableChecksumValue",
            "portable_manifest_name=$portableManifestName",
            "portable_manifest_path=$portableManifestPath",
            "portable_manifest_checksum_file=$portableManifestChecksumPath",
            "portable_manifest_checksum_value=$portableManifestChecksumValue",
            "bundle_name=$bundleName",
            "output_dir=$outputDir"
          ) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          @(
            "### Windows Managed Client MSI",
            "",
            "| Item | Value |",
            "| --- | --- |",
            "| Installer | $archiveName |",
            "| Installer sha256 | $checksumValue |",
            "| Manifest | $manifestName |",
            "| Manifest sha256 | $manifestChecksumValue |",
            "| Target | $target |",
            "| Source identity | GUI + service + CLI + platform + WiX |",
            "| Install model | wix-per-machine-msi |",
            "| System mutation policy | managed-apply-and-rollback |",
            "",
            "### Windows Portable ZIP",
            "",
            "| Item | Value |",
            "| --- | --- |",
            "| Archive | $portableArchiveName |",
            "| Archive sha256 | $portableChecksumValue |",
            "| Manifest | $portableManifestName |",
            "| Manifest sha256 | $portableManifestChecksumValue |",
            "| Install model | manual-extract |",
            "| System mutation policy | explicit-gui-or-service-command-only |"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload Windows release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.bundle_name }}
          path: |
            ${{ steps.package.outputs.artifact_path }}
            ${{ steps.package.outputs.checksum_file }}
            ${{ steps.package.outputs.artifact_manifest_path }}
            ${{ steps.package.outputs.artifact_manifest_checksum_file }}
            ${{ steps.package.outputs.portable_artifact_path }}
            ${{ steps.package.outputs.portable_checksum_file }}
            ${{ steps.package.outputs.portable_manifest_path }}
            ${{ steps.package.outputs.portable_manifest_checksum_file }}
          retention-days: 14
          if-no-files-found: error

  attest-linux:
    name: Attest Linux CLI bundle
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - package-linux
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      attestation_status: ${{ steps.attestation-output.outputs.attestation_status }}
      provenance_file: ${{ steps.attestation-output.outputs.provenance_file }}
    steps:
      - name: Download Linux release bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package-linux.outputs.bundle_name }}
          path: dist/linux-attestation

      - name: Validate attestation subjects
        shell: bash
        env:
          ARCHIVE_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          ARCHIVE_CHECKSUM_NAME: ${{ needs.package-linux.outputs.artifact_name }}.sha256
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}.sha256
        run: |
          set -euo pipefail
          for file in "${ARCHIVE_NAME}" "${ARCHIVE_CHECKSUM_NAME}" "${MANIFEST_NAME}" "${MANIFEST_CHECKSUM_NAME}"; do
            test -f "dist/linux-attestation/${file}"
            test -s "dist/linux-attestation/${file}"
          done
          test "$(find dist/linux-attestation -maxdepth 1 -type f | wc -l | tr -d ' ')" = "4"
          (
            cd dist/linux-attestation
            sha256sum -c "${ARCHIVE_CHECKSUM_NAME}"
            sha256sum -c "${MANIFEST_CHECKSUM_NAME}"
          )

      - name: Generate Linux artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/linux-attestation/${{ needs.package-linux.outputs.artifact_name }}
            dist/linux-attestation/${{ needs.package-linux.outputs.artifact_name }}.sha256
            dist/linux-attestation/${{ needs.package-linux.outputs.artifact_manifest_name }}
            dist/linux-attestation/${{ needs.package-linux.outputs.artifact_manifest_name }}.sha256

      - name: Emit attestation status
        id: attestation-output
        shell: bash
        run: |
          set -euo pipefail
          echo "attestation_status=attested" >> "${GITHUB_OUTPUT}"
          echo "provenance_file=github-artifact-attestation" >> "${GITHUB_OUTPUT}"
          echo "linux-package-artifact-attestation-execution-status=attested"

  attest-windows:
    name: Attest Windows managed client bundle
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - package-windows
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      attestation_status: ${{ steps.attestation-output.outputs.attestation_status }}
      provenance_file: ${{ steps.attestation-output.outputs.provenance_file }}
    steps:
      - name: Download Windows release bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package-windows.outputs.bundle_name }}
          path: dist/windows-attestation

      - name: Validate Windows attestation subjects
        shell: bash
        env:
          ARCHIVE_NAME: ${{ needs.package-windows.outputs.artifact_name }}
          ARCHIVE_CHECKSUM_NAME: ${{ needs.package-windows.outputs.artifact_name }}.sha256
          MANIFEST_NAME: ${{ needs.package-windows.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_NAME: ${{ needs.package-windows.outputs.artifact_manifest_name }}.sha256
          PORTABLE_ARCHIVE_NAME: ${{ needs.package-windows.outputs.portable_artifact_name }}
          PORTABLE_ARCHIVE_CHECKSUM_NAME: ${{ needs.package-windows.outputs.portable_artifact_name }}.sha256
          PORTABLE_MANIFEST_NAME: ${{ needs.package-windows.outputs.portable_manifest_name }}
          PORTABLE_MANIFEST_CHECKSUM_NAME: ${{ needs.package-windows.outputs.portable_manifest_name }}.sha256
        run: |
          set -euo pipefail
          for file in \
            "${ARCHIVE_NAME}" \
            "${ARCHIVE_CHECKSUM_NAME}" \
            "${MANIFEST_NAME}" \
            "${MANIFEST_CHECKSUM_NAME}" \
            "${PORTABLE_ARCHIVE_NAME}" \
            "${PORTABLE_ARCHIVE_CHECKSUM_NAME}" \
            "${PORTABLE_MANIFEST_NAME}" \
            "${PORTABLE_MANIFEST_CHECKSUM_NAME}"; do
            test -f "dist/windows-attestation/${file}"
            test -s "dist/windows-attestation/${file}"
          done
          test "$(find dist/windows-attestation -maxdepth 1 -type f | wc -l | tr -d ' ')" = "8"
          (
            cd dist/windows-attestation
            sha256sum -c "${ARCHIVE_CHECKSUM_NAME}"
            sha256sum -c "${MANIFEST_CHECKSUM_NAME}"
            sha256sum -c "${PORTABLE_ARCHIVE_CHECKSUM_NAME}"
            sha256sum -c "${PORTABLE_MANIFEST_CHECKSUM_NAME}"
          )

      - name: Generate Windows artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/windows-attestation/${{ needs.package-windows.outputs.artifact_name }}
            dist/windows-attestation/${{ needs.package-windows.outputs.artifact_name }}.sha256
            dist/windows-attestation/${{ needs.package-windows.outputs.artifact_manifest_name }}
            dist/windows-attestation/${{ needs.package-windows.outputs.artifact_manifest_name }}.sha256
            dist/windows-attestation/${{ needs.package-windows.outputs.portable_artifact_name }}
            dist/windows-attestation/${{ needs.package-windows.outputs.portable_artifact_name }}.sha256
            dist/windows-attestation/${{ needs.package-windows.outputs.portable_manifest_name }}
            dist/windows-attestation/${{ needs.package-windows.outputs.portable_manifest_name }}.sha256

      - name: Emit Windows attestation status
        id: attestation-output
        shell: bash
        run: |
          set -euo pipefail
          echo "attestation_status=attested" >> "${GITHUB_OUTPUT}"
          echo "provenance_file=github-artifact-attestation" >> "${GITHUB_OUTPUT}"
          echo "windows-package-artifact-attestation-execution-status=attested"

  post-release-summary:
    name: Linux release notes and rollback gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - package-linux
      - attest-linux
    outputs:
      release_notes_status: ${{ steps.notes.outputs.release_notes_status }}
      rollback_status: ${{ steps.notes.outputs.rollback_status }}
      withdrawal_policy: ${{ steps.notes.outputs.withdrawal_policy }}
      replacement_policy: ${{ steps.notes.outputs.replacement_policy }}
    steps:
      - name: Validate release notes and rollback fields
        id: notes
        shell: bash
        env:
          VERSION: ${{ needs.release-policy.outputs.version }}
          ARTIFACT_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-linux.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-linux.outputs.artifact_manifest_checksum_value }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          ATTESTATION_STATUS: ${{ needs.attest-linux.outputs.attestation_status }}
        run: |
          set -euo pipefail
          test -n "${VERSION}"
          test -n "${ARTIFACT_NAME}"
          test -n "${CHECKSUM_VALUE}"
          test -n "${MANIFEST_NAME}"
          test -n "${MANIFEST_CHECKSUM_VALUE}"
          test -n "${CI_RUN_URL}"
          test "${ATTESTATION_STATUS}" = "attested"
          echo "release_notes_status=ready" >> "${GITHUB_OUTPUT}"
          echo "rollback_status=summarized" >> "${GITHUB_OUTPUT}"
          echo "withdrawal_policy=withdrawal-not-overwrite" >> "${GITHUB_OUTPUT}"
          echo "replacement_policy=new-version-tag-required" >> "${GITHUB_OUTPUT}"

  windows-release-summary:
    name: Windows release notes and rollback gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - package-windows
      - attest-windows
      - windows-cli-artifact-readiness
    outputs:
      release_notes_status: ${{ steps.notes.outputs.release_notes_status }}
      rollback_status: ${{ steps.notes.outputs.rollback_status }}
      withdrawal_policy: ${{ steps.notes.outputs.withdrawal_policy }}
      replacement_policy: ${{ steps.notes.outputs.replacement_policy }}
    steps:
      - name: Validate Windows release notes and rollback fields
        id: notes
        shell: bash
        env:
          VERSION: ${{ needs.release-policy.outputs.version }}
          ARTIFACT_NAME: ${{ needs.package-windows.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-windows.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-windows.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.artifact_manifest_checksum_value }}
          PORTABLE_ARTIFACT_NAME: ${{ needs.package-windows.outputs.portable_artifact_name }}
          PORTABLE_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.portable_checksum_value }}
          PORTABLE_MANIFEST_NAME: ${{ needs.package-windows.outputs.portable_manifest_name }}
          PORTABLE_MANIFEST_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.portable_manifest_checksum_value }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          ATTESTATION_STATUS: ${{ needs.attest-windows.outputs.attestation_status }}
          WINDOWS_ARTIFACT_GATE: ${{ needs.windows-cli-artifact-readiness.outputs.artifact_gate }}
          WINDOWS_SOURCE_IDENTITY: ${{ needs.windows-cli-artifact-readiness.outputs.source_identity }}
          PACKAGE_WINDOWS_STATUS: ${{ needs.windows-cli-artifact-readiness.outputs.package_windows_status }}
          WINDOWS_RELEASE_ASSETS_STATUS: ${{ needs.windows-cli-artifact-readiness.outputs.release_assets_status }}
        run: |
          set -euo pipefail
          test -n "${VERSION}"
          test -n "${ARTIFACT_NAME}"
          test -n "${CHECKSUM_VALUE}"
          test -n "${MANIFEST_NAME}"
          test -n "${MANIFEST_CHECKSUM_VALUE}"
          test -n "${PORTABLE_ARTIFACT_NAME}"
          test -n "${PORTABLE_CHECKSUM_VALUE}"
          test -n "${PORTABLE_MANIFEST_NAME}"
          test -n "${PORTABLE_MANIFEST_CHECKSUM_VALUE}"
          test -n "${CI_RUN_URL}"
          test "${ATTESTATION_STATUS}" = "attested"
          test "${WINDOWS_ARTIFACT_GATE}" = "windows-managed-client-active"
          test "${WINDOWS_SOURCE_IDENTITY}" = "apps/windows-gui+apps/windows-service+apps/windows-cli+platform-windows+installer/windows"
          test "${PACKAGE_WINDOWS_STATUS}" = "defined"
          test "${WINDOWS_RELEASE_ASSETS_STATUS}" = "enabled-after-attestation-and-publish-gate"
          echo "release_notes_status=ready" >> "${GITHUB_OUTPUT}"
          echo "rollback_status=summarized" >> "${GITHUB_OUTPUT}"
          echo "withdrawal_policy=withdrawal-not-overwrite" >> "${GITHUB_OUTPUT}"
          echo "replacement_policy=new-version-tag-required" >> "${GITHUB_OUTPUT}"

  publish-eligibility-gate:
    name: Linux publish eligibility gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - linux-artifact-readiness
      - package-linux
      - attest-linux
      - post-release-summary
    outputs:
      package_publish_eligibility_status: ${{ steps.eligibility.outputs.package_publish_eligibility_status }}
      package_publish_eligibility_required_gates: ${{ steps.eligibility.outputs.package_publish_eligibility_required_gates }}
    steps:
      - name: Validate Linux publish eligibility
        id: eligibility
        shell: bash
        env:
          CI_CONCLUSION: ${{ needs.release-ci-gate.outputs.ci_run_conclusion }}
          LICENSE_STATUS: ${{ needs.linux-artifact-readiness.outputs.license_status }}
          ARTIFACT_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-linux.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-linux.outputs.artifact_manifest_checksum_value }}
          ATTESTATION_STATUS: ${{ needs.attest-linux.outputs.attestation_status }}
          RELEASE_NOTES_STATUS: ${{ needs.post-release-summary.outputs.release_notes_status }}
          ROLLBACK_STATUS: ${{ needs.post-release-summary.outputs.rollback_status }}
        run: |
          set -euo pipefail
          test "${CI_CONCLUSION}" = "success"
          test "${LICENSE_STATUS}" = "confirmed"
          test -n "${ARTIFACT_NAME}"
          test -n "${CHECKSUM_VALUE}"
          test -n "${MANIFEST_NAME}"
          test -n "${MANIFEST_CHECKSUM_VALUE}"
          test "${ATTESTATION_STATUS}" = "attested"
          test "${RELEASE_NOTES_STATUS}" = "ready"
          test "${ROLLBACK_STATUS}" = "summarized"
          echo "package_publish_eligibility_status=eligible" >> "${GITHUB_OUTPUT}"
          echo "package_publish_eligibility_required_gates=license_notice,ci,runner_toolchain,archive_staging,checksum_manifest,artifact_manifest,publish_upload,signing_attestation,release_notes_rollback" >> "${GITHUB_OUTPUT}"

  windows-publish-eligibility-gate:
    name: Windows publish eligibility gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - windows-cli-artifact-readiness
      - package-windows
      - attest-windows
      - windows-release-summary
    outputs:
      package_publish_eligibility_status: ${{ steps.eligibility.outputs.package_publish_eligibility_status }}
      package_publish_eligibility_required_gates: ${{ steps.eligibility.outputs.package_publish_eligibility_required_gates }}
    steps:
      - name: Validate Windows publish eligibility
        id: eligibility
        shell: bash
        env:
          CI_CONCLUSION: ${{ needs.release-ci-gate.outputs.ci_run_conclusion }}
          WINDOWS_ARTIFACT_GATE: ${{ needs.windows-cli-artifact-readiness.outputs.artifact_gate }}
          WINDOWS_SOURCE_IDENTITY: ${{ needs.windows-cli-artifact-readiness.outputs.source_identity }}
          PACKAGE_WINDOWS_STATUS: ${{ needs.windows-cli-artifact-readiness.outputs.package_windows_status }}
          WINDOWS_RELEASE_ASSETS_STATUS: ${{ needs.windows-cli-artifact-readiness.outputs.release_assets_status }}
          ARTIFACT_NAME: ${{ needs.package-windows.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-windows.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-windows.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.artifact_manifest_checksum_value }}
          PORTABLE_ARTIFACT_NAME: ${{ needs.package-windows.outputs.portable_artifact_name }}
          PORTABLE_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.portable_checksum_value }}
          PORTABLE_MANIFEST_NAME: ${{ needs.package-windows.outputs.portable_manifest_name }}
          PORTABLE_MANIFEST_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.portable_manifest_checksum_value }}
          ATTESTATION_STATUS: ${{ needs.attest-windows.outputs.attestation_status }}
          RELEASE_NOTES_STATUS: ${{ needs.windows-release-summary.outputs.release_notes_status }}
          ROLLBACK_STATUS: ${{ needs.windows-release-summary.outputs.rollback_status }}
        run: |
          set -euo pipefail
          test "${CI_CONCLUSION}" = "success"
          test "${WINDOWS_ARTIFACT_GATE}" = "windows-managed-client-active"
          test "${WINDOWS_SOURCE_IDENTITY}" = "apps/windows-gui+apps/windows-service+apps/windows-cli+platform-windows+installer/windows"
          test "${PACKAGE_WINDOWS_STATUS}" = "defined"
          test "${WINDOWS_RELEASE_ASSETS_STATUS}" = "enabled-after-attestation-and-publish-gate"
          test -n "${ARTIFACT_NAME}"
          test -n "${CHECKSUM_VALUE}"
          test -n "${MANIFEST_NAME}"
          test -n "${MANIFEST_CHECKSUM_VALUE}"
          test -n "${PORTABLE_ARTIFACT_NAME}"
          test -n "${PORTABLE_CHECKSUM_VALUE}"
          test -n "${PORTABLE_MANIFEST_NAME}"
          test -n "${PORTABLE_MANIFEST_CHECKSUM_VALUE}"
          test "${ATTESTATION_STATUS}" = "attested"
          test "${RELEASE_NOTES_STATUS}" = "ready"
          test "${ROLLBACK_STATUS}" = "summarized"
          echo "package_publish_eligibility_status=eligible" >> "${GITHUB_OUTPUT}"
          echo "package_publish_eligibility_required_gates=source_identity,ci,runner_toolchain,wix_validation,checksum_manifest,artifact_manifest,publish_upload,signing_attestation,release_notes_rollback,managed_system_mutation" >> "${GITHUB_OUTPUT}"

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - package-linux
      - package-windows
      - attest-linux
      - attest-windows
      - post-release-summary
      - windows-release-summary
      - publish-eligibility-gate
      - windows-publish-eligibility-gate
      - windows-cli-artifact-readiness
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    permissions:
      contents: write
    outputs:
      release_url: ${{ steps.publish.outputs.release_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux release bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package-linux.outputs.bundle_name }}
          path: dist/linux-release

      - name: Download Windows release bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package-windows.outputs.bundle_name }}
          path: dist/windows-release

      - name: Create GitHub Release with Linux and Windows assets
        id: publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.release-policy.outputs.version }}
          RELEASE_KIND: ${{ needs.release-policy.outputs.release_kind }}
          ELIGIBILITY_STATUS: ${{ needs.publish-eligibility-gate.outputs.package_publish_eligibility_status }}
          WINDOWS_ELIGIBILITY_STATUS: ${{ needs.windows-publish-eligibility-gate.outputs.package_publish_eligibility_status }}
          ARTIFACT_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-linux.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-linux.outputs.artifact_manifest_checksum_value }}
          WINDOWS_ARTIFACT_NAME: ${{ needs.package-windows.outputs.artifact_name }}
          WINDOWS_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.checksum_value }}
          WINDOWS_MANIFEST_NAME: ${{ needs.package-windows.outputs.artifact_manifest_name }}
          WINDOWS_MANIFEST_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.artifact_manifest_checksum_value }}
          WINDOWS_PORTABLE_ARTIFACT_NAME: ${{ needs.package-windows.outputs.portable_artifact_name }}
          WINDOWS_PORTABLE_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.portable_checksum_value }}
          WINDOWS_PORTABLE_MANIFEST_NAME: ${{ needs.package-windows.outputs.portable_manifest_name }}
          WINDOWS_PORTABLE_MANIFEST_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.portable_manifest_checksum_value }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          ATTESTATION_STATUS: ${{ needs.attest-linux.outputs.attestation_status }}
          WINDOWS_ATTESTATION_STATUS: ${{ needs.attest-windows.outputs.attestation_status }}
          RELEASE_NOTES_STATUS: ${{ needs.post-release-summary.outputs.release_notes_status }}
          WINDOWS_RELEASE_NOTES_STATUS: ${{ needs.windows-release-summary.outputs.release_notes_status }}
          ROLLBACK_STATUS: ${{ needs.post-release-summary.outputs.rollback_status }}
          WINDOWS_ROLLBACK_STATUS: ${{ needs.windows-release-summary.outputs.rollback_status }}
          WITHDRAWAL_POLICY: ${{ needs.post-release-summary.outputs.withdrawal_policy }}
          REPLACEMENT_POLICY: ${{ needs.post-release-summary.outputs.replacement_policy }}
          WINDOWS_WITHDRAWAL_POLICY: ${{ needs.windows-release-summary.outputs.withdrawal_policy }}
          WINDOWS_REPLACEMENT_POLICY: ${{ needs.windows-release-summary.outputs.replacement_policy }}
          WINDOWS_ARTIFACT_GATE: ${{ needs.windows-cli-artifact-readiness.outputs.artifact_gate }}
          WINDOWS_SOURCE_IDENTITY: ${{ needs.windows-cli-artifact-readiness.outputs.source_identity }}
          PACKAGE_WINDOWS_STATUS: ${{ needs.windows-cli-artifact-readiness.outputs.package_windows_status }}
          WINDOWS_RELEASE_ASSETS_STATUS: ${{ needs.windows-cli-artifact-readiness.outputs.release_assets_status }}
        run: |
          set -euo pipefail
          test "${ELIGIBILITY_STATUS}" = "eligible"
          test "${WINDOWS_ELIGIBILITY_STATUS}" = "eligible"
          archive_path="dist/linux-release/${ARTIFACT_NAME}"
          archive_checksum_path="${archive_path}.sha256"
          manifest_path="dist/linux-release/${MANIFEST_NAME}"
          manifest_checksum_path="${manifest_path}.sha256"
          windows_archive_path="dist/windows-release/${WINDOWS_ARTIFACT_NAME}"
          windows_archive_checksum_path="${windows_archive_path}.sha256"
          windows_manifest_path="dist/windows-release/${WINDOWS_MANIFEST_NAME}"
          windows_manifest_checksum_path="${windows_manifest_path}.sha256"
          windows_portable_archive_path="dist/windows-release/${WINDOWS_PORTABLE_ARTIFACT_NAME}"
          windows_portable_archive_checksum_path="${windows_portable_archive_path}.sha256"
          windows_portable_manifest_path="dist/windows-release/${WINDOWS_PORTABLE_MANIFEST_NAME}"
          windows_portable_manifest_checksum_path="${windows_portable_manifest_path}.sha256"
          for file in "${archive_path}" "${archive_checksum_path}" "${manifest_path}" "${manifest_checksum_path}"; do
            test -f "${file}"
            test -s "${file}"
          done
          for file in "${windows_archive_path}" "${windows_archive_checksum_path}" "${windows_manifest_path}" "${windows_manifest_checksum_path}"; do
            test -f "${file}"
            test -s "${file}"
          done
          for file in "${windows_portable_archive_path}" "${windows_portable_archive_checksum_path}" "${windows_portable_manifest_path}" "${windows_portable_manifest_checksum_path}"; do
            test -f "${file}"
            test -s "${file}"
          done
          (
            cd dist/linux-release
            sha256sum -c "${ARTIFACT_NAME}.sha256"
            sha256sum -c "${MANIFEST_NAME}.sha256"
          )
          (
            cd dist/windows-release
            sha256sum -c "${WINDOWS_ARTIFACT_NAME}.sha256"
            sha256sum -c "${WINDOWS_MANIFEST_NAME}.sha256"
            sha256sum -c "${WINDOWS_PORTABLE_ARTIFACT_NAME}.sha256"
            sha256sum -c "${WINDOWS_PORTABLE_MANIFEST_NAME}.sha256"
          )
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "::error::Release ${VERSION} already exists. Asset overwrite is forbidden."
            exit 1
          fi

          body_path="release-body.md"
          cat > "${body_path}" <<EOF
          # ${VERSION}

          ## Linux CLI

          - Artifact: ${ARTIFACT_NAME}
          - Archive sha256: ${CHECKSUM_VALUE}
          - Manifest: ${MANIFEST_NAME}
          - Manifest sha256: ${MANIFEST_CHECKSUM_VALUE}
          - CI: ${CI_RUN_URL}
          - Attestation: ${ATTESTATION_STATUS} via GitHub artifact attestation
          - Install model: manual-extract
          - System mutation policy: none

          ## Windows Managed Client

          - Artifact: ${WINDOWS_ARTIFACT_NAME}
          - Archive sha256: ${WINDOWS_CHECKSUM_VALUE}
          - Manifest: ${WINDOWS_MANIFEST_NAME}
          - Manifest sha256: ${WINDOWS_MANIFEST_CHECKSUM_VALUE}
          - CI: ${CI_RUN_URL}
          - Attestation: ${WINDOWS_ATTESTATION_STATUS} via GitHub artifact attestation
          - Artifact gate: ${WINDOWS_ARTIFACT_GATE}
          - Source identity: ${WINDOWS_SOURCE_IDENTITY}
          - Package Windows: ${PACKAGE_WINDOWS_STATUS}
          - Windows release assets: ${WINDOWS_RELEASE_ASSETS_STATUS}
          - Install model: wix-per-machine-msi
          - System mutation policy: managed-apply-and-rollback
          - Subscription compatibility: explicit-local-and-operator-initiated-http-s-profile-import-v2ray-tls-reality-ws-grpc-http-httpupgrade-quic-hysteria2-tuic-active
          - Active: native GUI, Windows service, signed INF driver package lifecycle, MSI installer, system proxy mutation, system trust store mutation, managed daemon lifecycle, explicit GUI sing-box core install, local and operator-initiated HTTP(S) profile import, sing-box check/run/PID/exit/log lifecycle, explicit controlled HTTP/1.1 HTTPS MITM with service-owned CA lifecycle and sing-box SOCKS upstream
          - External core boundary: sing-box is not bundled or silently downloaded by the MSI; GUI installation is an explicit operator action
          - Blocked: scheduled remote subscription refresh, persistent subscription catalog/group, remote route/rule fetch, XHTTP/ECH/multiplex transport inference, HTTP/2 and HTTP/3/QUIC MITM, chunked or streaming exchanges, multi-request CONNECT sessions, remote scripts, and JavaScript script dispatch

          ## Windows Portable Client

          - Artifact: ${WINDOWS_PORTABLE_ARTIFACT_NAME}
          - Archive sha256: ${WINDOWS_PORTABLE_CHECKSUM_VALUE}
          - Manifest: ${WINDOWS_PORTABLE_MANIFEST_NAME}
          - Manifest sha256: ${WINDOWS_PORTABLE_MANIFEST_CHECKSUM_VALUE}
          - CI: ${CI_RUN_URL}
          - Attestation: ${WINDOWS_ATTESTATION_STATUS} via GitHub artifact attestation
          - Install model: manual-extract; no service registration or start occurs on extraction
          - System mutation policy: explicit GUI or service command only

          ## Rollback

          - Linux scope: linux-cli-artifact
          - Windows scope: windows-managed-client
          - Trigger: checksum-install-runtime-security-or-provenance-defect
          - Steps: withdraw-release-asset-and-publish-replacement-version
          - Replacement version: next-version-required
          - Owner: maintainer
          - Linux withdrawal policy: ${WITHDRAWAL_POLICY}
          - Linux replacement policy: ${REPLACEMENT_POLICY}
          - Windows withdrawal policy: ${WINDOWS_WITHDRAWAL_POLICY}
          - Windows replacement policy: ${WINDOWS_REPLACEMENT_POLICY}

          No local build, test, package, or release verification was used.
          EOF

          prerelease_args=()
          if [ "${RELEASE_KIND}" = "prerelease" ]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "${VERSION}" \
            "${archive_path}" \
            "${archive_checksum_path}" \
            "${manifest_path}" \
            "${manifest_checksum_path}" \
            "${windows_archive_path}" \
            "${windows_archive_checksum_path}" \
            "${windows_manifest_path}" \
            "${windows_manifest_checksum_path}" \
            "${windows_portable_archive_path}" \
            "${windows_portable_archive_checksum_path}" \
            "${windows_portable_manifest_path}" \
            "${windows_portable_manifest_checksum_path}" \
            --title "${VERSION}" \
            --notes-file "${body_path}" \
            --verify-tag \
            "${prerelease_args[@]}"

          release_url="$(gh release view "${VERSION}" --json url -q '.url')"
          echo "release_url=${release_url}" >> "${GITHUB_OUTPUT}"
          echo "Published ${release_url}"

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - release-policy
      - release-ci-gate
      - release-artifact-contract
      - release-signing-contract
      - release-rollback-contract
      - linux-artifact-readiness
      - ios-upload-readiness
      - windows-cli-artifact-readiness
      - package-linux
      - package-windows
      - attest-linux
      - attest-windows
      - post-release-summary
      - windows-release-summary
      - publish-eligibility-gate
      - windows-publish-eligibility-gate
      - publish-github-release
    steps:
      - name: Summarize release state
        shell: bash
        env:
          VERSION: ${{ needs.release-policy.outputs.version }}
          RELEASE_POLICY_RESULT: ${{ needs.release-policy.result }}
          RELEASE_CI_GATE_RESULT: ${{ needs.release-ci-gate.result }}
          LINUX_READINESS_RESULT: ${{ needs.linux-artifact-readiness.result }}
          IOS_READINESS_RESULT: ${{ needs.ios-upload-readiness.result }}
          WINDOWS_READINESS_RESULT: ${{ needs.windows-cli-artifact-readiness.result }}
          PACKAGE_LINUX_RESULT: ${{ needs.package-linux.result }}
          PACKAGE_WINDOWS_RESULT: ${{ needs.package-windows.result }}
          ATTEST_LINUX_RESULT: ${{ needs.attest-linux.result }}
          ATTEST_WINDOWS_RESULT: ${{ needs.attest-windows.result }}
          RELEASE_NOTES_RESULT: ${{ needs.post-release-summary.result }}
          WINDOWS_RELEASE_NOTES_RESULT: ${{ needs.windows-release-summary.result }}
          ELIGIBILITY_RESULT: ${{ needs.publish-eligibility-gate.result }}
          WINDOWS_ELIGIBILITY_RESULT: ${{ needs.windows-publish-eligibility-gate.result }}
          PUBLISH_RESULT: ${{ needs.publish-github-release.result }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          LINUX_RELEASE_STATE: ${{ needs.linux-artifact-readiness.outputs.release_state }}
          WINDOWS_ARTIFACT_GATE: ${{ needs.windows-cli-artifact-readiness.outputs.artifact_gate }}
          WINDOWS_SOURCE_IDENTITY: ${{ needs.windows-cli-artifact-readiness.outputs.source_identity }}
          PACKAGE_WINDOWS_STATUS: ${{ needs.windows-cli-artifact-readiness.outputs.package_windows_status }}
          WINDOWS_RELEASE_ASSETS_STATUS: ${{ needs.windows-cli-artifact-readiness.outputs.release_assets_status }}
          ARTIFACT_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-linux.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-linux.outputs.artifact_manifest_checksum_value }}
          WINDOWS_ARTIFACT_NAME: ${{ needs.package-windows.outputs.artifact_name }}
          WINDOWS_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.checksum_value }}
          WINDOWS_MANIFEST_NAME: ${{ needs.package-windows.outputs.artifact_manifest_name }}
          WINDOWS_MANIFEST_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.artifact_manifest_checksum_value }}
          WINDOWS_PORTABLE_ARTIFACT_NAME: ${{ needs.package-windows.outputs.portable_artifact_name }}
          WINDOWS_PORTABLE_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.portable_checksum_value }}
          WINDOWS_PORTABLE_MANIFEST_NAME: ${{ needs.package-windows.outputs.portable_manifest_name }}
          WINDOWS_PORTABLE_MANIFEST_CHECKSUM_VALUE: ${{ needs.package-windows.outputs.portable_manifest_checksum_value }}
          RELEASE_URL: ${{ needs.publish-github-release.outputs.release_url }}
        run: |
          set -euo pipefail
          {
            echo "### Release Summary"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Version | ${VERSION} |"
            echo "| Release policy | ${RELEASE_POLICY_RESULT} |"
            echo "| Release CI gate | ${RELEASE_CI_GATE_RESULT} |"
            echo "| Linux readiness | ${LINUX_READINESS_RESULT} |"
            echo "| iOS readiness | ${IOS_READINESS_RESULT} |"
            echo "| Windows readiness | ${WINDOWS_READINESS_RESULT} |"
            echo "| Package Linux | ${PACKAGE_LINUX_RESULT} |"
            echo "| Package Windows | ${PACKAGE_WINDOWS_RESULT} |"
            echo "| Attest Linux | ${ATTEST_LINUX_RESULT} |"
            echo "| Attest Windows | ${ATTEST_WINDOWS_RESULT} |"
            echo "| Release notes/rollback | ${RELEASE_NOTES_RESULT} |"
            echo "| Windows release notes/rollback | ${WINDOWS_RELEASE_NOTES_RESULT} |"
            echo "| Publish eligibility | ${ELIGIBILITY_RESULT} |"
            echo "| Windows publish eligibility | ${WINDOWS_ELIGIBILITY_RESULT} |"
            echo "| Publish GitHub Release | ${PUBLISH_RESULT} |"
            echo "| CI run | ${CI_RUN_URL} |"
            echo "| Linux release state | ${LINUX_RELEASE_STATE} |"
            echo "| Windows artifact gate | ${WINDOWS_ARTIFACT_GATE} |"
            echo "| Windows source identity | ${WINDOWS_SOURCE_IDENTITY} |"
            echo "| Package Windows | ${PACKAGE_WINDOWS_STATUS} |"
            echo "| Windows release assets | ${WINDOWS_RELEASE_ASSETS_STATUS} |"
            echo "| Artifact | ${ARTIFACT_NAME} |"
            echo "| Artifact sha256 | ${CHECKSUM_VALUE} |"
            echo "| Manifest | ${MANIFEST_NAME} |"
            echo "| Manifest sha256 | ${MANIFEST_CHECKSUM_VALUE} |"
            echo "| Windows artifact | ${WINDOWS_ARTIFACT_NAME} |"
            echo "| Windows artifact sha256 | ${WINDOWS_CHECKSUM_VALUE} |"
            echo "| Windows manifest | ${WINDOWS_MANIFEST_NAME} |"
            echo "| Windows manifest sha256 | ${WINDOWS_MANIFEST_CHECKSUM_VALUE} |"
            echo "| Windows portable archive | ${WINDOWS_PORTABLE_ARTIFACT_NAME} |"
            echo "| Windows portable archive sha256 | ${WINDOWS_PORTABLE_CHECKSUM_VALUE} |"
            echo "| Windows portable manifest | ${WINDOWS_PORTABLE_MANIFEST_NAME} |"
            echo "| Windows portable manifest sha256 | ${WINDOWS_PORTABLE_MANIFEST_CHECKSUM_VALUE} |"
            echo "| GitHub Release | ${RELEASE_URL} |"
          } >> "${GITHUB_STEP_SUMMARY}"
