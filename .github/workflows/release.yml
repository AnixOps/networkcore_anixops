name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-policy:
    name: Release policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify release is CI/CD controlled
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          RELEASE_EVENT: ${{ github.event_name }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test -f AGENT.md
          test -f docs/release-strategy.md
          grep -q "发布验证都必须在 GitHub Actions" AGENT.md
          grep -q "Release Strategy" docs/release-strategy.md

          version_pattern='^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'
          if [[ ! "${RELEASE_VERSION}" =~ ${version_pattern} ]]; then
            echo "::error::Release version must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-rc.N."
            exit 1
          fi

          case "${RELEASE_EVENT}" in
            workflow_dispatch)
              if [ "${RELEASE_REF_TYPE}" != "branch" ]; then
                echo "::error::workflow_dispatch releases must run from a branch ref."
                exit 1
              fi
              if [ "${RELEASE_REF_NAME}" != "main" ]; then
                echo "::error::workflow_dispatch placeholder releases must run from main."
                exit 1
              fi
              ;;
            push)
              if [ "${RELEASE_REF_TYPE}" != "tag" ]; then
                echo "::error::push releases must be triggered by a tag ref."
                exit 1
              fi
              if [ "${RELEASE_VERSION}" != "${RELEASE_REF_NAME}" ]; then
                echo "::error::Tag-triggered release version must match the tag name."
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported release event: ${RELEASE_EVENT}."
              exit 1
              ;;
          esac

          echo "release-source-gate=passed"
          echo "release-version=${RELEASE_VERSION}"
          echo "release-event=${RELEASE_EVENT}"
          echo "release-ref=${RELEASE_REF}"
          echo "Release artifacts must be produced by GitHub Actions jobs."

  release-ci-gate:
    name: Release CI gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
    permissions:
      contents: read
      actions: read
    outputs:
      ci_workflow_name: ${{ steps.validate-ci.outputs.ci_workflow_name }}
      ci_workflow_file: ${{ steps.validate-ci.outputs.ci_workflow_file }}
      ci_run_id: ${{ steps.validate-ci.outputs.ci_run_id }}
      ci_run_attempt: ${{ steps.validate-ci.outputs.ci_run_attempt }}
      ci_run_url: ${{ steps.validate-ci.outputs.ci_run_url }}
      ci_run_status: ${{ steps.validate-ci.outputs.ci_run_status }}
      ci_run_conclusion: ${{ steps.validate-ci.outputs.ci_run_conclusion }}
      ci_head_sha: ${{ steps.validate-ci.outputs.ci_head_sha }}
      ci_head_branch: ${{ steps.validate-ci.outputs.ci_head_branch }}
      ci_event: ${{ steps.validate-ci.outputs.ci_event }}
      ci_repository: ${{ steps.validate-ci.outputs.ci_repository }}
      ci_checked_at: ${{ steps.validate-ci.outputs.ci_checked_at }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate same-commit CI success
        id: validate-ci
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
          RELEASE_EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          test -f docs/architecture/release-ci-success-source-contract.md
          test -f docs/architecture/linux-package-release-ci-gate-activation-validation-contract.md
          test -f docs/architecture/release-ci-gate-execution-validation-contract.md
          test -f docs/architecture/release-ci-gate-api-implementation-plan.md
          grep -q "Release CI Success Source Contract" docs/architecture/release-ci-success-source-contract.md
          grep -q "Linux Package Release CI Gate Activation Validation Contract" docs/architecture/linux-package-release-ci-gate-activation-validation-contract.md
          grep -q "Release CI Gate Execution Validation Contract" docs/architecture/release-ci-gate-execution-validation-contract.md
          grep -q "Release CI Gate API Implementation Plan" docs/architecture/release-ci-gate-api-implementation-plan.md
          if ! grep -Eq '^[[:space:]]+actions:[[:space:]]+read$' .github/workflows/release.yml; then
            echo "::error::release-ci-gate API read requires actions: read."
            exit 1
          fi

          runs_json="$(gh api --method GET "repos/${RELEASE_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f branch=main \
            -f status=completed \
            -f head_sha="${RELEASE_SHA}" \
            -f per_page=20)"
          run_total="$(jq -r '.total_count // 0' <<< "${runs_json}")"
          run_count="$(jq -r '.workflow_runs | length' <<< "${runs_json}")"
          if [ "${run_total}" -gt "${run_count}" ]; then
            echo "::error::CI workflow runs query returned paginated results; release-ci-gate must not choose from an incomplete page."
            exit 1
          fi
          ci_run_json="$(jq -c --arg sha "${RELEASE_SHA}" --arg repo "${RELEASE_REPOSITORY}" '
            [
              .workflow_runs[]
              | select(.name == "CI")
              | select(.path == ".github/workflows/ci.yml")
              | select(.head_branch == "main")
              | select(.head_sha == $sha)
              | select(.status == "completed")
              | select(.conclusion == "success")
              | select(.event == "push" or .event == "workflow_dispatch")
              | select(.repository.full_name == $repo)
            ]
            | sort_by(.created_at, .run_attempt)
            | last // empty
          ' <<< "${runs_json}")"
          if [ -z "${ci_run_json}" ]; then
            echo "::error::No successful completed CI run on main was found for ${RELEASE_REPOSITORY}@${RELEASE_SHA}."
            exit 1
          fi

          ci_run_id="$(jq -r '.id' <<< "${ci_run_json}")"
          ci_run_attempt="$(jq -r '.run_attempt' <<< "${ci_run_json}")"
          ci_run_url="$(jq -r '.html_url' <<< "${ci_run_json}")"
          ci_run_status="$(jq -r '.status' <<< "${ci_run_json}")"
          ci_run_conclusion="$(jq -r '.conclusion' <<< "${ci_run_json}")"
          ci_head_sha="$(jq -r '.head_sha' <<< "${ci_run_json}")"
          ci_head_branch="$(jq -r '.head_branch' <<< "${ci_run_json}")"
          ci_event="$(jq -r '.event' <<< "${ci_run_json}")"
          ci_repository="$(jq -r '.repository.full_name' <<< "${ci_run_json}")"

          require_value() {
            if [ -z "$2" ] || [ "$2" = "null" ]; then
              echo "::error::Selected CI run is missing required field: $1."
              exit 1
            fi
          }
          require_value ci_run_id "${ci_run_id}"
          require_value ci_run_attempt "${ci_run_attempt}"
          require_value ci_run_url "${ci_run_url}"
          require_value ci_run_status "${ci_run_status}"
          require_value ci_run_conclusion "${ci_run_conclusion}"
          require_value ci_head_sha "${ci_head_sha}"
          require_value ci_head_branch "${ci_head_branch}"
          require_value ci_event "${ci_event}"
          require_value ci_repository "${ci_repository}"

          if [ "${ci_run_status}" != "completed" ] || [ "${ci_run_conclusion}" != "success" ]; then
            echo "::error::Selected CI run must be completed/success."
            exit 1
          fi
          if [ "${ci_head_sha}" != "${RELEASE_SHA}" ] || [ "${ci_head_branch}" != "main" ]; then
            echo "::error::Selected CI run must match the release SHA and main branch."
            exit 1
          fi
          if [ "${ci_repository}" != "${RELEASE_REPOSITORY}" ]; then
            echo "::error::Selected CI run repository does not match the release repository."
            exit 1
          fi
          case "${ci_event}" in
            push|workflow_dispatch) ;;
            *)
              echo "::error::Selected CI run event is not allowed: ${ci_event}."
              exit 1
              ;;
          esac

          jobs_json="$(gh api --method GET "repos/${RELEASE_REPOSITORY}/actions/runs/${ci_run_id}/jobs" \
            -f filter=latest \
            -f per_page=100)"
          job_total="$(jq -r '.total_count // 0' <<< "${jobs_json}")"
          job_count="$(jq -r '.jobs | length' <<< "${jobs_json}")"
          if [ "${job_total}" -gt "${job_count}" ]; then
            echo "::error::CI workflow jobs query returned paginated results; release-ci-gate must not choose from an incomplete page."
            exit 1
          fi
          ci_summary_job_json="$(jq -c '
            [
              .jobs[]
              | select(.name == "CI summary")
              | select(.status == "completed")
              | select(.conclusion == "success")
            ]
            | last // empty
          ' <<< "${jobs_json}")"
          if [ -z "${ci_summary_job_json}" ]; then
            echo "::error::Selected CI run does not contain a successful CI summary job."
            exit 1
          fi

          ci_checked_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          write_output() {
            echo "$1=$2" >> "${GITHUB_OUTPUT}"
          }
          write_output ci_workflow_name "CI"
          write_output ci_workflow_file ".github/workflows/ci.yml"
          write_output ci_run_id "${ci_run_id}"
          write_output ci_run_attempt "${ci_run_attempt}"
          write_output ci_run_url "${ci_run_url}"
          write_output ci_run_status "${ci_run_status}"
          write_output ci_run_conclusion "${ci_run_conclusion}"
          write_output ci_head_sha "${ci_head_sha}"
          write_output ci_head_branch "${ci_head_branch}"
          write_output ci_event "${ci_event}"
          write_output ci_repository "${ci_repository}"
          write_output ci_checked_at "${ci_checked_at}"

          {
            echo "### Release CI Gate"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current release mode | placeholder with active CI gate |"
            echo "| Current commit | ${RELEASE_SHA} |"
            echo "| Current ref | ${RELEASE_REF} |"
            echo "| Current ref name | ${RELEASE_REF_NAME} |"
            echo "| Trigger event | ${RELEASE_EVENT} |"
            echo "| Artifact CI gate | enforced before any future packaging or publishing job |"
            echo "| CI source contract | docs/architecture/release-ci-success-source-contract.md |"
            echo "| CI workflow | CI |"
            echo "| CI workflow file | .github/workflows/ci.yml |"
            echo "| CI run id | ${ci_run_id} |"
            echo "| CI run attempt | ${ci_run_attempt} |"
            echo "| CI run URL | ${ci_run_url} |"
            echo "| CI branch | ${ci_head_branch} |"
            echo "| CI conclusion | ${ci_run_conclusion} |"
            echo "| CI status | ${ci_run_status} |"
            echo "| CI summary job | success |"
            echo "| CI checked at | ${ci_checked_at} |"
            echo "| Required CI source fields | ci_workflow_name, ci_workflow_file, ci_run_id, ci_run_attempt, ci_run_url, ci_run_status, ci_run_conclusion, ci_head_sha, ci_head_branch, ci_event, ci_repository, ci_checked_at |"
            echo
            echo "### Linux Package Release CI Gate Activation Validation Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | api-read-active |"
            echo "| Source contract | docs/architecture/linux-package-release-ci-gate-activation-validation-contract.md |"
            echo "| Activation status | active |"
            echo "| Required permission | actions-read |"
            echo "| Permission status | enabled |"
            echo "| API source | github-actions-runs-api |"
            echo "| API status | queried |"
            echo "| Required workflow | CI |"
            echo "| Required workflow file | .github/workflows/ci.yml |"
            echo "| Required branch | main |"
            echo "| Required status | completed |"
            echo "| Required conclusion | success |"
            echo "| Required head SHA | ${RELEASE_SHA} |"
            echo "| Failure mode | fail-before-package-linux |"
            echo "| Current package-linux job | not defined |"
            echo "| Current artifacts | blocked |"
            echo "| Next action | license-notice-and-package-linux-preflight-after-ci-gate |"
            echo
            echo "### Release CI Gate Execution Validation Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | api-read-active |"
            echo "| Source contract | docs/architecture/release-ci-gate-execution-validation-contract.md |"
            echo "| Execution status | active |"
            echo "| Required job | release-ci-gate |"
            echo "| Current job status | active |"
            echo "| Required permission | actions-read |"
            echo "| Permission status | enabled |"
            echo "| API source | github-actions-runs-api |"
            echo "| API status | queried |"
            echo "| Query workflow | CI |"
            echo "| Query workflow file | .github/workflows/ci.yml |"
            echo "| Query branch | main |"
            echo "| Query head SHA | ${RELEASE_SHA} |"
            echo "| Query status | completed |"
            echo "| Required conclusion | success |"
            echo "| Allowed events | push,workflow_dispatch |"
            echo "| Required fields | ci_workflow_name,ci_workflow_file,ci_run_id,ci_run_attempt,ci_run_url,ci_run_status,ci_run_conclusion,ci_head_sha,ci_head_branch,ci_event,ci_repository,ci_checked_at |"
            echo "| CI summary | success |"
            echo "| Manual input | blocked |"
            echo "| Current package-linux job | not defined |"
            echo "| Current workflow artifact | blocked |"
            echo "| Current release asset | blocked |"
            echo "| Next action | license-notice-and-package-linux-preflight-after-ci-gate |"
            echo
            echo "### Release CI Gate API Implementation Plan"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | api-read-active |"
            echo "| Source plan | docs/architecture/release-ci-gate-api-implementation-plan.md |"
            echo "| Implementation status | active |"
            echo "| Required permission | actions-read |"
            echo "| Permission status | enabled |"
            echo "| Workflow runs endpoint | GET /repos/{owner}/{repo}/actions/workflows/ci.yml/runs |"
            echo "| Workflow jobs endpoint | GET /repos/{owner}/{repo}/actions/runs/{run_id}/jobs |"
            echo "| Query filters | branch=main,status=completed,head_sha=${RELEASE_SHA} |"
            echo "| Selection rule | latest-successful-same-sha-main-ci |"
            echo "| Summary job | CI summary |"
            echo "| Summary status | success |"
            echo "| Manual input | blocked |"
            echo "| Current package-linux job | not defined |"
            echo "| Current workflow artifact | blocked |"
            echo "| Current release asset | blocked |"
            echo "| Next action | license-notice-and-package-linux-preflight-after-ci-gate |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-ci-gate=active"
          echo "release-ci-success-source-contract=present"
          echo "release-ci-source-contract=docs/architecture/release-ci-success-source-contract.md"
          echo "release-ci-required-before-artifacts=true"
          echo "release-ci-required-ref=main"
          echo "release-ci-required-sha=${RELEASE_SHA}"
          echo "release-ci-required-workflow=CI"
          echo "release-ci-required-workflow-file=.github/workflows/ci.yml"
          echo "release-ci-required-status=completed"
          echo "release-ci-required-conclusion=success"
          echo "release-ci-required-fields=ci_workflow_name,ci_workflow_file,ci_run_id,ci_run_attempt,ci_run_url,ci_run_status,ci_run_conclusion,ci_head_sha,ci_head_branch,ci_event,ci_repository,ci_checked_at"
          echo "linux-package-release-ci-gate-activation-contract=present"
          echo "linux-package-release-ci-gate-activation-source=release-ci-gate"
          echo "linux-package-release-ci-gate-activation-status=active"
          echo "linux-package-release-ci-gate-activation-current-mode=api-read-active"
          echo "linux-package-release-ci-gate-activation-required-permission=actions-read"
          echo "linux-package-release-ci-gate-activation-permission-status=enabled"
          echo "linux-package-release-ci-gate-activation-api-source=github-actions-runs-api"
          echo "linux-package-release-ci-gate-activation-api-status=queried"
          echo "linux-package-release-ci-gate-activation-required-workflow=CI"
          echo "linux-package-release-ci-gate-activation-required-workflow-file=.github/workflows/ci.yml"
          echo "linux-package-release-ci-gate-activation-required-branch=main"
          echo "linux-package-release-ci-gate-activation-required-status=completed"
          echo "linux-package-release-ci-gate-activation-required-conclusion=success"
          echo "linux-package-release-ci-gate-activation-required-head-sha=same-release-sha"
          echo "linux-package-release-ci-gate-activation-allowed-events=push,workflow_dispatch"
          echo "linux-package-release-ci-gate-activation-failure-mode=fail-before-package-linux"
          echo "linux-package-release-ci-gate-activation-package-linux=not-defined"
          echo "linux-package-release-ci-gate-activation-artifacts=blocked"
          echo "linux-package-release-ci-gate-activation-next-action=license-notice-and-package-linux-preflight-after-ci-gate"
          echo "release-ci-gate-execution-contract=present"
          echo "release-ci-gate-execution-source=release-ci-gate"
          echo "release-ci-gate-execution-status=active"
          echo "release-ci-gate-execution-current-mode=api-read-active"
          echo "release-ci-gate-execution-required-job=release-ci-gate"
          echo "release-ci-gate-execution-job-status=active"
          echo "release-ci-gate-execution-required-permission=actions-read"
          echo "release-ci-gate-execution-permission-status=enabled"
          echo "release-ci-gate-execution-api-source=github-actions-runs-api"
          echo "release-ci-gate-execution-api-status=queried"
          echo "release-ci-gate-execution-query-workflow=CI"
          echo "release-ci-gate-execution-query-workflow-file=.github/workflows/ci.yml"
          echo "release-ci-gate-execution-query-branch=main"
          echo "release-ci-gate-execution-query-head-sha=same-release-sha"
          echo "release-ci-gate-execution-query-status=completed"
          echo "release-ci-gate-execution-required-conclusion=success"
          echo "release-ci-gate-execution-allowed-events=push,workflow_dispatch"
          echo "release-ci-gate-execution-required-fields=ci_workflow_name,ci_workflow_file,ci_run_id,ci_run_attempt,ci_run_url,ci_run_status,ci_run_conclusion,ci_head_sha,ci_head_branch,ci_event,ci_repository,ci_checked_at"
          echo "release-ci-gate-execution-ci-summary=success"
          echo "release-ci-gate-execution-manual-input=blocked"
          echo "release-ci-gate-execution-package-linux=not-defined"
          echo "release-ci-gate-execution-workflow-artifact=blocked"
          echo "release-ci-gate-execution-release-asset=blocked"
          echo "release-ci-gate-execution-next-action=license-notice-and-package-linux-preflight-after-ci-gate"
          echo "release-ci-gate-api-implementation-plan=docs/architecture/release-ci-gate-api-implementation-plan.md"
          echo "release-ci-gate-api-implementation-source=release-ci-gate"
          echo "release-ci-gate-api-implementation-status=active"
          echo "release-ci-gate-api-implementation-current-mode=api-read-active"
          echo "release-ci-gate-api-implementation-required-permission=actions-read"
          echo "release-ci-gate-api-implementation-permission=actions-read"
          echo "release-ci-gate-api-implementation-permission-status=enabled"
          echo "release-ci-gate-api-implementation-runs-endpoint=GET /repos/{owner}/{repo}/actions/workflows/ci.yml/runs"
          echo "release-ci-gate-api-implementation-jobs-endpoint=GET /repos/{owner}/{repo}/actions/runs/{run_id}/jobs"
          echo "release-ci-gate-api-implementation-query-filters=branch=main,status=completed,head_sha=${RELEASE_SHA}"
          echo "release-ci-gate-api-implementation-selection-rule=latest-successful-same-sha-main-ci"
          echo "release-ci-gate-api-implementation-summary-job=CI summary"
          echo "release-ci-gate-api-implementation-summary-status=success"
          echo "release-ci-gate-api-implementation-output-fields=ci_workflow_name,ci_workflow_file,ci_run_id,ci_run_attempt,ci_run_url,ci_run_status,ci_run_conclusion,ci_head_sha,ci_head_branch,ci_event,ci_repository,ci_checked_at"
          echo "release-ci-gate-api-implementation-manual-input=blocked"
          echo "release-ci-gate-api-implementation-package-linux=not-defined"
          echo "release-ci-gate-api-implementation-workflow-artifact=blocked"
          echo "release-ci-gate-api-implementation-release-asset=blocked"
          echo "release-ci-gate-api-implementation-next-action=license-notice-and-package-linux-preflight-after-ci-gate"
          echo "ci_workflow_name=CI"
          echo "ci_workflow_file=.github/workflows/ci.yml"
          echo "ci_run_id=${ci_run_id}"
          echo "ci_run_attempt=${ci_run_attempt}"
          echo "ci_run_url=${ci_run_url}"
          echo "ci_run_status=${ci_run_status}"
          echo "ci_run_conclusion=${ci_run_conclusion}"
          echo "ci_head_sha=${ci_head_sha}"
          echo "ci_head_branch=${ci_head_branch}"
          echo "ci_event=${ci_event}"
          echo "ci_repository=${ci_repository}"
          echo "ci_checked_at=${ci_checked_at}"

  release-artifact-contract:
    name: Release artifact contract
    runs-on: ubuntu-latest
    needs:
      - release-ci-gate
    steps:
      - name: Record artifact checksum contract
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Release Artifact Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current artifacts | not defined |"
            echo "| Required checksum algorithm | sha256 |"
            echo "| Required job outputs | artifact_name, artifact_path, checksum_algorithm, checksum_file, checksum_value |"
            echo "| Required checksum timing | before upload or publish |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-artifact-contract=placeholder"
          echo "release-checksum-required=true"
          echo "release-checksum-algorithm=sha256"
          echo "release-artifact-output-fields=artifact_name,artifact_path,checksum_algorithm,checksum_file,checksum_value"

  release-signing-contract:
    name: Release signing contract
    runs-on: ubuntu-latest
    needs:
      - release-artifact-contract
    steps:
      - name: Record signing and attestation contract
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Release Signing Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current signing mode | not configured |"
            echo "| Required future gate | platform artifacts must declare signing or attestation policy before publish |"
            echo "| Credential handling | GitHub Secrets, Environments, or official platform only |"
            echo "| Required job outputs | signing_policy, signing_status, attestation_policy, attestation_status, provenance_policy, provenance_file |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-signing-contract=placeholder"
          echo "release-signing-required-before-publish=true"
          echo "release-attestation-required-when-supported=true"
          echo "release-signing-output-fields=signing_policy,signing_status,attestation_policy,attestation_status,provenance_policy,provenance_file"

  release-rollback-contract:
    name: Release rollback contract
    runs-on: ubuntu-latest
    needs:
      - release-signing-contract
    steps:
      - name: Record rollback contract
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Release Rollback Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current rollback mode | not configured |"
            echo "| Required future gate | release notes must include rollback plan before publish |"
            echo "| Public asset handling | replace with a new version or publish a withdrawal notice; do not overwrite tags |"
            echo "| Required release note fields | rollback_scope, rollback_trigger, rollback_steps, replacement_version, rollback_owner |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release-rollback-contract=placeholder"
          echo "release-rollback-required-before-publish=true"
          echo "release-rollback-output-fields=rollback_scope,rollback_trigger,rollback_steps,replacement_version,rollback_owner"

  linux-artifact-readiness:
    name: Linux artifact readiness
    runs-on: ubuntu-latest
    needs:
      - release-rollback-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Linux CLI artifact readiness inputs
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/linux-cli/Cargo.toml
          test -f apps/linux-cli/README.md
          test -f apps/linux-cli/src/main.rs
          test -f apps/linux-cli/src/lib.rs
