name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0-alpha.2
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  LINUX_TARGET: x86_64-unknown-linux-gnu
  LINUX_PACKAGE: networkcore-linux
  LINUX_BINARY: networkcore-linux
  LINUX_RUST_TOOLCHAIN: stable
  LINUX_RUST_PROFILE: minimal

jobs:
  release-policy:
    name: Release policy
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.policy.outputs.version }}
      is_tag_release: ${{ steps.policy.outputs.is_tag_release }}
      release_kind: ${{ steps.policy.outputs.release_kind }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify release source
        id: policy
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          RELEASE_EVENT: ${{ github.event_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test -f AGENT.md
          test -f docs/release-strategy.md
          test -f docs/ci-cd-policy.md
          grep -q "GitHub Actions" AGENT.md
          grep -q "Release Strategy" docs/release-strategy.md

          version_pattern='^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|rc)\.[0-9]+)?$'
          if [[ ! "${RELEASE_VERSION}" =~ ${version_pattern} ]]; then
            echo "::error::Release version must match vMAJOR.MINOR.PATCH, vMAJOR.MINOR.PATCH-alpha.N, or vMAJOR.MINOR.PATCH-rc.N."
            exit 1
          fi

          release_kind=stable
          if [[ "${RELEASE_VERSION}" =~ -(alpha|rc)\. ]]; then
            release_kind=prerelease
          fi

          case "${RELEASE_EVENT}" in
            workflow_dispatch)
              if [ "${RELEASE_REF_TYPE}" != "branch" ] || [ "${RELEASE_REF_NAME}" != "main" ]; then
                echo "::error::workflow_dispatch release validation must run from main."
                exit 1
              fi
              echo "is_tag_release=false" >> "${GITHUB_OUTPUT}"
              ;;
            push)
              if [ "${RELEASE_REF_TYPE}" != "tag" ]; then
                echo "::error::push releases must be triggered by a tag ref."
                exit 1
              fi
              if [ "${RELEASE_VERSION}" != "${RELEASE_REF_NAME}" ]; then
                echo "::error::Tag-triggered release version must match the tag name."
                exit 1
              fi
              echo "is_tag_release=true" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "::error::Unsupported release event: ${RELEASE_EVENT}."
              exit 1
              ;;
          esac

          echo "version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_kind=${release_kind}" >> "${GITHUB_OUTPUT}"
          {
            echo "### Release Policy"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Version | ${RELEASE_VERSION} |"
            echo "| Event | ${RELEASE_EVENT} |"
            echo "| Ref type | ${RELEASE_REF_TYPE} |"
            echo "| Ref name | ${RELEASE_REF_NAME} |"
            echo "| Release kind | ${release_kind} |"
          } >> "${GITHUB_STEP_SUMMARY}"

  release-ci-gate:
    name: Release CI gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
    permissions:
      contents: read
      actions: read
    outputs:
      ci_workflow_name: ${{ steps.validate.outputs.ci_workflow_name }}
      ci_workflow_file: ${{ steps.validate.outputs.ci_workflow_file }}
      ci_run_id: ${{ steps.validate.outputs.ci_run_id }}
      ci_run_attempt: ${{ steps.validate.outputs.ci_run_attempt }}
      ci_run_url: ${{ steps.validate.outputs.ci_run_url }}
      ci_run_status: ${{ steps.validate.outputs.ci_run_status }}
      ci_run_conclusion: ${{ steps.validate.outputs.ci_run_conclusion }}
      ci_head_sha: ${{ steps.validate.outputs.ci_head_sha }}
      ci_head_branch: ${{ steps.validate.outputs.ci_head_branch }}
      ci_event: ${{ steps.validate.outputs.ci_event }}
      ci_repository: ${{ steps.validate.outputs.ci_repository }}
      ci_checked_at: ${{ steps.validate.outputs.ci_checked_at }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate same-commit CI success
        id: validate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test -f docs/architecture/release-ci-success-source-contract.md
          test -f docs/architecture/release-ci-gate-execution-validation-contract.md

          runs_json="$(gh api --method GET "repos/${RELEASE_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f branch=main \
            -f status=completed \
            -f head_sha="${RELEASE_SHA}" \
            -f per_page=20)"
          run_total="$(jq -r '.total_count // 0' <<< "${runs_json}")"
          run_count="$(jq -r '.workflow_runs | length' <<< "${runs_json}")"
          if [ "${run_total}" -gt "${run_count}" ]; then
            echo "::error::CI workflow runs query returned paginated results."
            exit 1
          fi

          ci_run_json="$(jq -c --arg sha "${RELEASE_SHA}" --arg repo "${RELEASE_REPOSITORY}" '
            [
              .workflow_runs[]
              | select(.name == "CI")
              | select(.path == ".github/workflows/ci.yml")
              | select(.head_branch == "main")
              | select(.head_sha == $sha)
              | select(.status == "completed")
              | select(.conclusion == "success")
              | select(.event == "push" or .event == "workflow_dispatch")
              | select(.repository.full_name == $repo)
            ]
            | sort_by(.created_at, .run_attempt)
            | last // empty
          ' <<< "${runs_json}")"
          if [ -z "${ci_run_json}" ]; then
            echo "::error::No successful completed CI run on main was found for ${RELEASE_REPOSITORY}@${RELEASE_SHA}."
            exit 1
          fi

          ci_run_id="$(jq -r '.id' <<< "${ci_run_json}")"
          ci_run_attempt="$(jq -r '.run_attempt' <<< "${ci_run_json}")"
          ci_run_url="$(jq -r '.html_url' <<< "${ci_run_json}")"
          ci_run_status="$(jq -r '.status' <<< "${ci_run_json}")"
          ci_run_conclusion="$(jq -r '.conclusion' <<< "${ci_run_json}")"
          ci_head_sha="$(jq -r '.head_sha' <<< "${ci_run_json}")"
          ci_head_branch="$(jq -r '.head_branch' <<< "${ci_run_json}")"
          ci_event="$(jq -r '.event' <<< "${ci_run_json}")"
          ci_repository="$(jq -r '.repository.full_name' <<< "${ci_run_json}")"

          jobs_json="$(gh api --method GET "repos/${RELEASE_REPOSITORY}/actions/runs/${ci_run_id}/jobs" \
            -f filter=latest \
            -f per_page=100)"
          job_total="$(jq -r '.total_count // 0' <<< "${jobs_json}")"
          job_count="$(jq -r '.jobs | length' <<< "${jobs_json}")"
          if [ "${job_total}" -gt "${job_count}" ]; then
            echo "::error::CI workflow jobs query returned paginated results."
            exit 1
          fi
          if ! jq -e '[.jobs[] | select(.name == "CI summary") | select(.status == "completed") | select(.conclusion == "success")] | length > 0' <<< "${jobs_json}" >/dev/null; then
            echo "::error::Selected CI run does not contain a successful CI summary job."
            exit 1
          fi

          ci_checked_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          {
            echo "ci_workflow_name=CI"
            echo "ci_workflow_file=.github/workflows/ci.yml"
            echo "ci_run_id=${ci_run_id}"
            echo "ci_run_attempt=${ci_run_attempt}"
            echo "ci_run_url=${ci_run_url}"
            echo "ci_run_status=${ci_run_status}"
            echo "ci_run_conclusion=${ci_run_conclusion}"
            echo "ci_head_sha=${ci_head_sha}"
            echo "ci_head_branch=${ci_head_branch}"
            echo "ci_event=${ci_event}"
            echo "ci_repository=${ci_repository}"
            echo "ci_checked_at=${ci_checked_at}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Release CI Gate"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| CI run | ${ci_run_id} |"
            echo "| CI URL | ${ci_run_url} |"
            echo "| CI branch | ${ci_head_branch} |"
            echo "| CI commit | ${ci_head_sha} |"
            echo "| CI conclusion | ${ci_run_conclusion} |"
            echo "| CI summary job | success |"
          } >> "${GITHUB_STEP_SUMMARY}"

  release-artifact-contract:
    name: Release artifact contract
    runs-on: ubuntu-latest
    needs:
      - release-ci-gate
    steps:
      - name: Record artifact contract
        shell: bash
        run: |
          set -euo pipefail
          echo "release-artifact-contract=active"
          echo "release-checksum-algorithm=sha256"
          echo "release-artifact-output-fields=artifact_name,artifact_path,checksum_algorithm,checksum_file,checksum_value,artifact_manifest_name,artifact_manifest_path,artifact_manifest_checksum_file,artifact_manifest_checksum_value"

  release-signing-contract:
    name: Release signing contract
    runs-on: ubuntu-latest
    needs:
      - release-artifact-contract
    steps:
      - name: Record signing and attestation contract
        shell: bash
        run: |
          set -euo pipefail
          echo "release-signing-contract=active"
          echo "release-signing-policy=unsigned-no-detached-signature"
          echo "release-attestation-policy=github-artifact-attestation-required"
          echo "release-provenance-policy=github-build-provenance-required"

  release-rollback-contract:
    name: Release rollback contract
    runs-on: ubuntu-latest
    needs:
      - release-signing-contract
    steps:
      - name: Record rollback contract
        shell: bash
        run: |
          set -euo pipefail
          echo "release-rollback-contract=active"
          echo "rollback_scope=linux-cli-artifact"
          echo "rollback_trigger=checksum-install-runtime-security-or-provenance-defect"
          echo "rollback_steps=withdraw-release-asset-and-publish-replacement-version"
          echo "replacement_version=next-version-required"
          echo "rollback_owner=maintainer"

  linux-artifact-readiness:
    name: Linux artifact readiness
    runs-on: ubuntu-latest
    needs:
      - release-rollback-contract
    outputs:
      license_status: ${{ steps.license.outputs.license_status }}
      license_source: ${{ steps.license.outputs.license_source }}
      notice_source: ${{ steps.license.outputs.notice_source }}
      artifact_files: ${{ steps.license.outputs.artifact_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Linux artifact readiness
        id: license
        shell: bash
        run: |
          set -euo pipefail
          test -f LICENSE
          test -f CHANGELOG.md
          test -f apps/linux-cli/Cargo.toml
          test -f apps/linux-cli/src/main.rs
          test -f apps/linux-cli/src/lib.rs
          test -f docs/manual-intervention.md
          test -f docs/architecture/linux-artifact-license-notice-confirmation.md
          test -f docs/architecture/linux-package-license-notice-transition-validation-contract.md
          test -f docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          test -f docs/architecture/linux-package-artifact-build-command-validation-contract.md
          test -f docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          test -f docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          test -f docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          test -f docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          test -f docs/architecture/linux-package-artifact-attestation-execution-validation-contract.md
          test -f docs/architecture/linux-package-release-notes-rollback-execution-validation-contract.md
          test -f docs/architecture/linux-package-publish-eligibility-execution-validation-contract.md
          test -f docs/architecture/linux-cli-artifact-installation-rollback.md

          grep -q '^name = "networkcore-linux"$' apps/linux-cli/Cargo.toml
          grep -q '^\[\[bin\]\]$' apps/linux-cli/Cargo.toml
          grep -q '^path = "src/main.rs"$' apps/linux-cli/Cargo.toml

          if grep -q '^linux-artifact-license-notice-status=pending$' docs/manual-intervention.md; then
            echo "::error::linux-artifact-license-notice-status is pending. Confirm Apache-2.0 LICENSE and NOTICE=not-required in docs/manual-intervention.md before packaging."
            exit 1
          fi

          grep -q '^linux-artifact-license-notice-status=confirmed$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-source-contract=docs/architecture/linux-artifact-license-notice-confirmation.md$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-transition-contract=docs/architecture/linux-package-license-notice-transition-validation-contract.md$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-transition-commit=independent-manual-confirmation-commit$' docs/manual-intervention.md
          grep -Eq '^linux-artifact-license-notice-confirmed-at=[0-9]{4}-[0-9]{2}-[0-9]{2}$' docs/manual-intervention.md
          grep -Eq '^linux-artifact-license-notice-confirmed-by=[A-Za-z0-9_.-]+$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-scope=networkcore-linux$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-license-source=LICENSE$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-notice-source=not-required$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-artifact-files=LICENSE$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-package-linux=eligible-after-ci-and-release-gates$' docs/manual-intervention.md
          grep -q '^linux-artifact-license-notice-release-assets=eligible-after-package-signing-checksum-and-rollback-gates$' docs/manual-intervention.md

          echo "license_status=confirmed" >> "${GITHUB_OUTPUT}"
          echo "license_source=LICENSE" >> "${GITHUB_OUTPUT}"
          echo "notice_source=not-required" >> "${GITHUB_OUTPUT}"
          echo "artifact_files=LICENSE" >> "${GITHUB_OUTPUT}"

  ios-upload-readiness:
    name: iOS upload readiness
    runs-on: ubuntu-latest
    needs:
      - release-rollback-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Keep iOS upload blocked until source and signing gates exist
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/ios/README.md
          test -f docs/manual-intervention.md
          grep -q '^ios-upload-workflow-status=pending$' docs/manual-intervention.md
          grep -q '^ios-upload-workflow-release-assets=blocked$' docs/manual-intervention.md
          if find . -path ./.git -prune -o \( -type f \( -name "Package.swift" -o -name "*.swift" -o -name "PrivacyInfo.xcprivacy" -o -name "*.entitlements" -o -name "*.mobileprovision" -o -name "*.provisionprofile" -o -name "*.p12" -o -name "*.cer" -o -name "*.key" -o -name "*.pem" -o -name "*.xcframework" -o -name "*.a" -o -name "ExportOptions.plist" -o -name "*.ipa" \) -o -type d \( -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "*.xcarchive" -o -name "*.xcresult" -o -name "*.dSYM" \) \) -print -quit | grep -q .; then
            echo "::error::iOS source, signing, archive/export, upload, or release material must stay blocked."
            exit 1
          fi
          echo "ios-upload-readiness=blocked-placeholder"

  package-linux:
    name: Package Linux CLI
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - linux-artifact-readiness
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      artifact_path: ${{ steps.package.outputs.artifact_path }}
      checksum_algorithm: ${{ steps.package.outputs.checksum_algorithm }}
      checksum_file: ${{ steps.package.outputs.checksum_file }}
      checksum_value: ${{ steps.package.outputs.checksum_value }}
      artifact_manifest_name: ${{ steps.package.outputs.artifact_manifest_name }}
      artifact_manifest_path: ${{ steps.package.outputs.artifact_manifest_path }}
      artifact_manifest_checksum_file: ${{ steps.package.outputs.artifact_manifest_checksum_file }}
      artifact_manifest_checksum_value: ${{ steps.package.outputs.artifact_manifest_checksum_value }}
      bundle_name: ${{ steps.package.outputs.bundle_name }}
      output_dir: ${{ steps.package.outputs.output_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Build, package, checksum, and manifest Linux CLI
        id: package
        shell: bash
        env:
          VERSION: ${{ needs.release-policy.outputs.version }}
          TARGET: ${{ env.LINUX_TARGET }}
          PACKAGE: ${{ env.LINUX_PACKAGE }}
          BINARY: ${{ env.LINUX_BINARY }}
          RUST_TOOLCHAIN: ${{ env.LINUX_RUST_TOOLCHAIN }}
          RUST_PROFILE: ${{ env.LINUX_RUST_PROFILE }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          RELEASE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          checkout_sha="$(git rev-parse HEAD)"
          if [ "${checkout_sha}" != "${RELEASE_SHA}" ]; then
            echo "::error::Checkout SHA ${checkout_sha} does not match release SHA ${RELEASE_SHA}."
            exit 1
          fi

          rustup toolchain install "${RUST_TOOLCHAIN}" --profile "${RUST_PROFILE}"
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add "${TARGET}" --toolchain "${RUST_TOOLCHAIN}"

          cargo generate-lockfile
          cargo build --locked --release --package "${PACKAGE}" --bin "${BINARY}" --target "${TARGET}"

          binary_path="target/${TARGET}/release/${BINARY}"
          test -f "${binary_path}"
          test -x "${binary_path}"
          if [ -L "${binary_path}" ]; then
            echo "::error::Release binary must not be a symlink."
            exit 1
          fi

          version="${VERSION}"
          target="${TARGET}"
          top_level_dir="networkcore-linux-${version}-${target}"
          dist_dir="dist/linux/${target}"
          staging_root="${dist_dir}/staging"
          staging_dir="${staging_root}/${top_level_dir}"
          output_dir="${dist_dir}/artifacts"
          archive_name="${top_level_dir}.tar.gz"
          archive_path="${output_dir}/${archive_name}"
          archive_checksum_name="${archive_name}.sha256"
          archive_checksum_path="${output_dir}/${archive_checksum_name}"
          manifest_name="${top_level_dir}.manifest.json"
          manifest_path="${output_dir}/${manifest_name}"
          manifest_checksum_name="${manifest_name}.sha256"
          manifest_checksum_path="${output_dir}/${manifest_checksum_name}"
          bundle_name="${top_level_dir}-release-bundle"

          rm -rf "${dist_dir}"
          mkdir -p "${staging_dir}/bin" "${output_dir}"
          install -m 0755 "${binary_path}" "${staging_dir}/bin/${BINARY}"
          install -m 0644 LICENSE "${staging_dir}/LICENSE"
          install -m 0644 CHANGELOG.md "${staging_dir}/CHANGELOG.md"
          cat > "${staging_dir}/INSTALL.md" <<EOF
          # networkcore-linux ${version}

          This archive is generated by GitHub Actions for ${version}.

          ## Install

          1. Verify ${archive_checksum_name}.
          2. Extract ${archive_name} into a versioned directory you control.
          3. Run bin/networkcore-linux directly or add that bin directory to PATH.

          This artifact does not install a system service, grant capabilities, modify DNS,
          routes, firewall rules, certificate trust stores, or background daemon state.

          ## Uninstall

          Stop any foreground networkcore-linux process, remove the extracted directory,
          and remove any user-created symlink, alias, or PATH entry.

          ## Rollback

          Stop the current foreground process, switch PATH or symlink back to a previous
          extracted version, verify that older version's checksum, and run
          networkcore-linux version.
          EOF

          actual_files="$(find "${staging_dir}" -type f -printf '%P\n' | sort | paste -sd ',')"
          expected_files="CHANGELOG.md,INSTALL.md,LICENSE,bin/${BINARY}"
          if [ "${actual_files}" != "${expected_files}" ]; then
            echo "::error::Unexpected archive staging files: ${actual_files}"
            exit 1
          fi

          tar -czf "${archive_path}" -C "${staging_root}" "${top_level_dir}"
          top_level_count="$(tar -tzf "${archive_path}" | awk -F/ 'NF {print $1}' | sort -u | wc -l | tr -d ' ')"
          if [ "${top_level_count}" != "1" ]; then
            echo "::error::Archive must contain exactly one top-level directory."
            exit 1
          fi
          if [ "$(tar -tzf "${archive_path}" | awk -F/ 'NF {print $1}' | sort -u)" != "${top_level_dir}" ]; then
            echo "::error::Archive top-level directory mismatch."
            exit 1
          fi

          (
            cd "${output_dir}"
            sha256sum "${archive_name}" > "${archive_checksum_name}"
          )
          checksum_value="$(cut -d' ' -f1 "${archive_checksum_path}")"
          if ! [[ "${checksum_value}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Archive checksum is not a sha256 digest."
            exit 1
          fi

          archive_size="$(wc -c < "${archive_path}" | tr -d ' ')"
          jq -n \
            --arg artifact_name "${archive_name}" \
            --arg target_triple "${target}" \
            --arg version "${version}" \
            --arg commit_sha "${RELEASE_SHA}" \
            --arg source_ref "${SOURCE_REF}" \
            --arg ci_run_url "${CI_RUN_URL}" \
            --arg release_run_url "${RELEASE_RUN_URL}" \
            --arg runner "ubuntu-latest" \
            --arg rust_toolchain "${RUST_TOOLCHAIN}" \
            --arg archive_relative_path "${archive_path}" \
            --arg archive_checksum_name "${archive_checksum_name}" \
            --arg checksum_value "${checksum_value}" \
            --argjson archive_size "${archive_size}" \
            '{
              schema_version: 1,
              artifact_kind: "linux-cli-tarball",
              package_format: "tar.gz",
              artifact_name: $artifact_name,
              target_triple: $target_triple,
              version: $version,
              commit_sha: $commit_sha,
              source_ref: $source_ref,
              ci_run_url: $ci_run_url,
              release_run_url: $release_run_url,
              runner: $runner,
              rust_toolchain: $rust_toolchain,
              archive: {
                file_name: $artifact_name,
                relative_path: $archive_relative_path,
                size_bytes: $archive_size
              },
              checksum: {
                algorithm: "sha256",
                file_name: $archive_checksum_name,
                value: $checksum_value
              },
              included_files: [
                {path: "bin/networkcore-linux", kind: "binary", required: true, source: "apps/linux-cli"},
                {path: "INSTALL.md", kind: "documentation", required: true, source: "generated-from-linux-cli-artifact-installation-rollback"},
                {path: "LICENSE", kind: "license", required: true, source: "LICENSE"},
                {path: "CHANGELOG.md", kind: "changelog", required: true, source: "CHANGELOG.md"}
              ],
              install_model: "manual-extract",
              system_mutation_policy: "none",
              license_notice_status: "confirmed",
              signing: {
                signing_policy: "unsigned-no-detached-signature",
                signing_status: "not-signed-by-policy",
                attestation_policy: "github-artifact-attestation-required",
                attestation_status: "required-before-publish",
                provenance_policy: "github-build-provenance-required",
                provenance_file: "github-artifact-attestation"
              },
              release_notes: {
                release_notes_policy: "required-before-publish",
                release_notes_status: "generated-before-publish",
                release_notes_source: "CHANGELOG.md-and-release-summary",
                withdrawal_policy: "withdrawal-not-overwrite",
                replacement_policy: "new-version-tag-required"
              },
              rollback: {
                rollback_policy: "manual-extract-version-switch",
                rollback_status: "summarized-before-publish",
                rollback_scope: "linux-cli-artifact",
                rollback_trigger: "checksum-install-runtime-security-or-provenance-defect",
                rollback_steps: "withdraw-release-asset-and-publish-replacement-version",
                replacement_version: "next-version-required",
                rollback_owner: "maintainer"
              },
              publish_eligibility: {
                status: "eligible-after-attestation-release-notes-and-publish-gate",
                required_gates: [
                  "license_notice",
                  "ci",
                  "runner_toolchain",
                  "archive_staging",
                  "checksum_manifest",
                  "artifact_manifest",
                  "publish_upload",
                  "signing_attestation",
                  "release_notes_rollback"
                ],
                license_notice: "confirmed",
                ci: "success",
                runner_toolchain: "matched",
                archive_staging: "matched",
                checksum_manifest: "verified",
                artifact_manifest: "generated",
                publish_upload: "ready",
                signing_attestation: "required-before-publish",
                release_notes_rollback: "summarized-before-publish"
              }
            }' > "${manifest_path}"

          if [ "$(jq -r '.archive.file_name' "${manifest_path}")" != "${archive_name}" ]; then
            echo "::error::Manifest archive file name mismatch."
            exit 1
          fi
          if [ "$(jq -r '.checksum.value' "${manifest_path}")" != "${checksum_value}" ]; then
            echo "::error::Manifest checksum value mismatch."
            exit 1
          fi

          (
            cd "${output_dir}"
            sha256sum "${manifest_name}" > "${manifest_checksum_name}"
            sha256sum -c "${archive_checksum_name}"
            sha256sum -c "${manifest_checksum_name}"
          )
          manifest_checksum_value="$(cut -d' ' -f1 "${manifest_checksum_path}")"

          for file in "${archive_path}" "${archive_checksum_path}" "${manifest_path}" "${manifest_checksum_path}"; do
            test -f "${file}"
            test -s "${file}"
          done
          file_count="$(find "${output_dir}" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [ "${file_count}" != "4" ]; then
            echo "::error::Artifact output dir must contain exactly four files."
            find "${output_dir}" -maxdepth 1 -type f -print
            exit 1
          fi

          {
            echo "artifact_name=${archive_name}"
            echo "artifact_path=${archive_path}"
            echo "checksum_algorithm=sha256"
            echo "checksum_file=${archive_checksum_path}"
            echo "checksum_value=${checksum_value}"
            echo "artifact_manifest_name=${manifest_name}"
            echo "artifact_manifest_path=${manifest_path}"
            echo "artifact_manifest_checksum_file=${manifest_checksum_path}"
            echo "artifact_manifest_checksum_value=${manifest_checksum_value}"
            echo "bundle_name=${bundle_name}"
            echo "output_dir=${output_dir}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Linux CLI Artifact"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Archive | ${archive_name} |"
            echo "| Archive sha256 | ${checksum_value} |"
            echo "| Manifest | ${manifest_name} |"
            echo "| Manifest sha256 | ${manifest_checksum_value} |"
            echo "| Target | ${target} |"
            echo "| Install model | manual-extract |"
            echo "| System mutation policy | none |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Linux release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.bundle_name }}
          path: |
            ${{ steps.package.outputs.artifact_path }}
            ${{ steps.package.outputs.checksum_file }}
            ${{ steps.package.outputs.artifact_manifest_path }}
            ${{ steps.package.outputs.artifact_manifest_checksum_file }}
          retention-days: 14
          if-no-files-found: error

  attest-linux:
    name: Attest Linux CLI bundle
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - package-linux
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      attestation_status: ${{ steps.attestation-output.outputs.attestation_status }}
      provenance_file: ${{ steps.attestation-output.outputs.provenance_file }}
    steps:
      - name: Download Linux release bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package-linux.outputs.bundle_name }}
          path: dist/linux-attestation

      - name: Validate attestation subjects
        shell: bash
        env:
          ARCHIVE_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          ARCHIVE_CHECKSUM_NAME: ${{ needs.package-linux.outputs.artifact_name }}.sha256
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}.sha256
        run: |
          set -euo pipefail
          for file in "${ARCHIVE_NAME}" "${ARCHIVE_CHECKSUM_NAME}" "${MANIFEST_NAME}" "${MANIFEST_CHECKSUM_NAME}"; do
            test -f "dist/linux-attestation/${file}"
            test -s "dist/linux-attestation/${file}"
          done
          test "$(find dist/linux-attestation -maxdepth 1 -type f | wc -l | tr -d ' ')" = "4"
          (
            cd dist/linux-attestation
            sha256sum -c "${ARCHIVE_CHECKSUM_NAME}"
            sha256sum -c "${MANIFEST_CHECKSUM_NAME}"
          )

      - name: Generate Linux artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/linux-attestation/${{ needs.package-linux.outputs.artifact_name }}
            dist/linux-attestation/${{ needs.package-linux.outputs.artifact_name }}.sha256
            dist/linux-attestation/${{ needs.package-linux.outputs.artifact_manifest_name }}
            dist/linux-attestation/${{ needs.package-linux.outputs.artifact_manifest_name }}.sha256

      - name: Emit attestation status
        id: attestation-output
        shell: bash
        run: |
          set -euo pipefail
          echo "attestation_status=attested" >> "${GITHUB_OUTPUT}"
          echo "provenance_file=github-artifact-attestation" >> "${GITHUB_OUTPUT}"
          echo "linux-package-artifact-attestation-execution-status=attested"

  post-release-summary:
    name: Linux release notes and rollback gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - package-linux
      - attest-linux
    outputs:
      release_notes_status: ${{ steps.notes.outputs.release_notes_status }}
      rollback_status: ${{ steps.notes.outputs.rollback_status }}
      withdrawal_policy: ${{ steps.notes.outputs.withdrawal_policy }}
      replacement_policy: ${{ steps.notes.outputs.replacement_policy }}
    steps:
      - name: Validate release notes and rollback fields
        id: notes
        shell: bash
        env:
          VERSION: ${{ needs.release-policy.outputs.version }}
          ARTIFACT_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-linux.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-linux.outputs.artifact_manifest_checksum_value }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          ATTESTATION_STATUS: ${{ needs.attest-linux.outputs.attestation_status }}
        run: |
          set -euo pipefail
          test -n "${VERSION}"
          test -n "${ARTIFACT_NAME}"
          test -n "${CHECKSUM_VALUE}"
          test -n "${MANIFEST_NAME}"
          test -n "${MANIFEST_CHECKSUM_VALUE}"
          test -n "${CI_RUN_URL}"
          test "${ATTESTATION_STATUS}" = "attested"
          echo "release_notes_status=ready" >> "${GITHUB_OUTPUT}"
          echo "rollback_status=summarized" >> "${GITHUB_OUTPUT}"
          echo "withdrawal_policy=withdrawal-not-overwrite" >> "${GITHUB_OUTPUT}"
          echo "replacement_policy=new-version-tag-required" >> "${GITHUB_OUTPUT}"

  publish-eligibility-gate:
    name: Linux publish eligibility gate
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - linux-artifact-readiness
      - package-linux
      - attest-linux
      - post-release-summary
    outputs:
      package_publish_eligibility_status: ${{ steps.eligibility.outputs.package_publish_eligibility_status }}
      package_publish_eligibility_required_gates: ${{ steps.eligibility.outputs.package_publish_eligibility_required_gates }}
    steps:
      - name: Validate Linux publish eligibility
        id: eligibility
        shell: bash
        env:
          CI_CONCLUSION: ${{ needs.release-ci-gate.outputs.ci_run_conclusion }}
          LICENSE_STATUS: ${{ needs.linux-artifact-readiness.outputs.license_status }}
          ARTIFACT_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-linux.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-linux.outputs.artifact_manifest_checksum_value }}
          ATTESTATION_STATUS: ${{ needs.attest-linux.outputs.attestation_status }}
          RELEASE_NOTES_STATUS: ${{ needs.post-release-summary.outputs.release_notes_status }}
          ROLLBACK_STATUS: ${{ needs.post-release-summary.outputs.rollback_status }}
        run: |
          set -euo pipefail
          test "${CI_CONCLUSION}" = "success"
          test "${LICENSE_STATUS}" = "confirmed"
          test -n "${ARTIFACT_NAME}"
          test -n "${CHECKSUM_VALUE}"
          test -n "${MANIFEST_NAME}"
          test -n "${MANIFEST_CHECKSUM_VALUE}"
          test "${ATTESTATION_STATUS}" = "attested"
          test "${RELEASE_NOTES_STATUS}" = "ready"
          test "${ROLLBACK_STATUS}" = "summarized"
          echo "package_publish_eligibility_status=eligible" >> "${GITHUB_OUTPUT}"
          echo "package_publish_eligibility_required_gates=license_notice,ci,runner_toolchain,archive_staging,checksum_manifest,artifact_manifest,publish_upload,signing_attestation,release_notes_rollback" >> "${GITHUB_OUTPUT}"

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - release-ci-gate
      - package-linux
      - attest-linux
      - post-release-summary
      - publish-eligibility-gate
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    permissions:
      contents: write
    outputs:
      release_url: ${{ steps.publish.outputs.release_url }}
    steps:
      - name: Download Linux release bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package-linux.outputs.bundle_name }}
          path: dist/linux-release

      - name: Create GitHub Release with Linux assets
        id: publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-policy.outputs.version }}
          RELEASE_KIND: ${{ needs.release-policy.outputs.release_kind }}
          ELIGIBILITY_STATUS: ${{ needs.publish-eligibility-gate.outputs.package_publish_eligibility_status }}
          ARTIFACT_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-linux.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-linux.outputs.artifact_manifest_checksum_value }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          ATTESTATION_STATUS: ${{ needs.attest-linux.outputs.attestation_status }}
          RELEASE_NOTES_STATUS: ${{ needs.post-release-summary.outputs.release_notes_status }}
          ROLLBACK_STATUS: ${{ needs.post-release-summary.outputs.rollback_status }}
          WITHDRAWAL_POLICY: ${{ needs.post-release-summary.outputs.withdrawal_policy }}
          REPLACEMENT_POLICY: ${{ needs.post-release-summary.outputs.replacement_policy }}
        run: |
          set -euo pipefail
          test "${ELIGIBILITY_STATUS}" = "eligible"
          archive_path="dist/linux-release/${ARTIFACT_NAME}"
          archive_checksum_path="${archive_path}.sha256"
          manifest_path="dist/linux-release/${MANIFEST_NAME}"
          manifest_checksum_path="${manifest_path}.sha256"
          for file in "${archive_path}" "${archive_checksum_path}" "${manifest_path}" "${manifest_checksum_path}"; do
            test -f "${file}"
            test -s "${file}"
          done
          (
            cd dist/linux-release
            sha256sum -c "${ARTIFACT_NAME}.sha256"
            sha256sum -c "${MANIFEST_NAME}.sha256"
          )
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "::error::Release ${VERSION} already exists. Asset overwrite is forbidden."
            exit 1
          fi

          body_path="release-body.md"
          cat > "${body_path}" <<EOF
          # ${VERSION}

          ## Linux CLI

          - Artifact: ${ARTIFACT_NAME}
          - Archive sha256: ${CHECKSUM_VALUE}
          - Manifest: ${MANIFEST_NAME}
          - Manifest sha256: ${MANIFEST_CHECKSUM_VALUE}
          - CI: ${CI_RUN_URL}
          - Attestation: ${ATTESTATION_STATUS} via GitHub artifact attestation
          - Install model: manual-extract
          - System mutation policy: none

          ## Rollback

          - Scope: linux-cli-artifact
          - Trigger: checksum-install-runtime-security-or-provenance-defect
          - Steps: withdraw-release-asset-and-publish-replacement-version
          - Replacement version: next-version-required
          - Owner: maintainer
          - Withdrawal policy: ${WITHDRAWAL_POLICY}
          - Replacement policy: ${REPLACEMENT_POLICY}

          No local build, test, package, or release verification was used.
          EOF

          prerelease_args=()
          if [ "${RELEASE_KIND}" = "prerelease" ]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "${VERSION}" \
            "${archive_path}" \
            "${archive_checksum_path}" \
            "${manifest_path}" \
            "${manifest_checksum_path}" \
            --title "${VERSION}" \
            --notes-file "${body_path}" \
            --verify-tag \
            "${prerelease_args[@]}"

          release_url="$(gh release view "${VERSION}" --json url -q '.url')"
          echo "release_url=${release_url}" >> "${GITHUB_OUTPUT}"
          echo "Published ${release_url}"

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - release-policy
      - release-ci-gate
      - release-artifact-contract
      - release-signing-contract
      - release-rollback-contract
      - linux-artifact-readiness
      - ios-upload-readiness
      - package-linux
      - attest-linux
      - post-release-summary
      - publish-eligibility-gate
      - publish-github-release
    steps:
      - name: Summarize release state
        shell: bash
        env:
          VERSION: ${{ needs.release-policy.outputs.version }}
          RELEASE_POLICY_RESULT: ${{ needs.release-policy.result }}
          RELEASE_CI_GATE_RESULT: ${{ needs.release-ci-gate.result }}
          LINUX_READINESS_RESULT: ${{ needs.linux-artifact-readiness.result }}
          IOS_READINESS_RESULT: ${{ needs.ios-upload-readiness.result }}
          PACKAGE_LINUX_RESULT: ${{ needs.package-linux.result }}
          ATTEST_LINUX_RESULT: ${{ needs.attest-linux.result }}
          RELEASE_NOTES_RESULT: ${{ needs.post-release-summary.result }}
          ELIGIBILITY_RESULT: ${{ needs.publish-eligibility-gate.result }}
          PUBLISH_RESULT: ${{ needs.publish-github-release.result }}
          CI_RUN_URL: ${{ needs.release-ci-gate.outputs.ci_run_url }}
          ARTIFACT_NAME: ${{ needs.package-linux.outputs.artifact_name }}
          CHECKSUM_VALUE: ${{ needs.package-linux.outputs.checksum_value }}
          MANIFEST_NAME: ${{ needs.package-linux.outputs.artifact_manifest_name }}
          MANIFEST_CHECKSUM_VALUE: ${{ needs.package-linux.outputs.artifact_manifest_checksum_value }}
          RELEASE_URL: ${{ needs.publish-github-release.outputs.release_url }}
        run: |
          set -euo pipefail
          {
            echo "### Release Summary"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Version | ${VERSION} |"
            echo "| Release policy | ${RELEASE_POLICY_RESULT} |"
            echo "| Release CI gate | ${RELEASE_CI_GATE_RESULT} |"
            echo "| Linux readiness | ${LINUX_READINESS_RESULT} |"
            echo "| iOS readiness | ${IOS_READINESS_RESULT} |"
            echo "| Package Linux | ${PACKAGE_LINUX_RESULT} |"
            echo "| Attest Linux | ${ATTEST_LINUX_RESULT} |"
            echo "| Release notes/rollback | ${RELEASE_NOTES_RESULT} |"
            echo "| Publish eligibility | ${ELIGIBILITY_RESULT} |"
            echo "| Publish GitHub Release | ${PUBLISH_RESULT} |"
            echo "| CI run | ${CI_RUN_URL} |"
            echo "| Artifact | ${ARTIFACT_NAME} |"
            echo "| Artifact sha256 | ${CHECKSUM_VALUE} |"
            echo "| Manifest | ${MANIFEST_NAME} |"
            echo "| Manifest sha256 | ${MANIFEST_CHECKSUM_VALUE} |"
            echo "| GitHub Release | ${RELEASE_URL} |"
          } >> "${GITHUB_STEP_SUMMARY}"
