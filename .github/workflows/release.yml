            echo
            echo "### Release CI Gate API Implementation Plan"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | api-read-active |"
            echo "| Source plan | docs/architecture/release-ci-gate-api-implementation-plan.md |"
            echo "| Implementation status | active |"
            echo "| Required permission | actions-read |"
            echo "| Permission status | enabled |"
            echo "| Workflow runs endpoint | GET /repos/{owner}/{repo}/actions/workflows/ci.yml/runs |"
            echo "| Workflow jobs endpoint | GET /repos/{owner}/{repo}/actions/runs/{run_id}/jobs |"
            echo "| Query filters | branch=main,status=completed,head_sha=same-release-sha |"
            echo "| Selection rule | latest-successful-same-sha-main-ci |"
            echo "| Summary job | CI summary |"
            echo "| Summary status | success |"
            echo "| Manual input | blocked |"
            echo "| Current package-linux job | not defined |"
            echo "| Current workflow artifact | blocked |"
            echo "| Current release asset | blocked |"
            echo "| Next action | license-notice-and-package-linux-preflight-after-ci-gate |"
            echo
            echo "### Linux Package Artifact Job Preflight Validation Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | contract-only-no-package-linux |"
            echo "| Source contract | docs/architecture/linux-package-artifact-job-preflight-validation-contract.md |"
            echo "| Preflight status | blocked-placeholder |"
            echo "| Required job | package-linux |"
            echo "| Current package-linux job | not defined |"
            echo "| Required needs | release-policy, release-ci-gate, linux-artifact-readiness |"
            echo "| License/NOTICE gate | blocked-pending |"
            echo "| Release CI gate | active |"
            echo "| Checkout | blocked-before-gates |"
            echo "| Toolchain | blocked-before-gates |"
            echo "| Build | blocked-before-gates |"
            echo "| Staging | blocked-before-gates |"
            echo "| Upload | blocked |"
            echo "| Current workflow artifact | blocked |"
            echo "| Current release asset | blocked |"
            echo "| Failure mode | fail-before-checkout-toolchain-build-staging |"
            echo "| Next action | license-notice-and-ci-gate-before-package-linux |"
            echo
            echo "### Linux Package Artifact Build Command Validation Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | contract-only-no-build |"
            echo "| Source contract | docs/architecture/linux-package-artifact-build-command-validation-contract.md |"
            echo "| Build command status | blocked-placeholder |"
            echo "| Required job | package-linux |"
            echo "| Current package-linux job | not defined |"
            echo "| Preflight status | blocked-placeholder |"
            echo "| Target install | blocked-before-preflight |"
            echo "| Rust toolchain | stable |"
