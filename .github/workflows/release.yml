  release-placeholder:
    name: Release placeholder
    runs-on: ubuntu-latest
    needs:
      - linux-artifact-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Explain current release state
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/manual-intervention.md
          test -f docs/architecture/linux-package-checksum-manifest-contract.md
          test -f docs/architecture/linux-package-publish-upload-boundary-contract.md
          test -f docs/architecture/linux-package-signing-attestation-policy-binding-contract.md
          test -f docs/architecture/linux-package-release-notes-rollback-policy-binding-contract.md
          test -f docs/architecture/linux-package-publish-eligibility-aggregate-contract.md
          test -f docs/architecture/linux-package-license-notice-transition-validation-contract.md
          test -f docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          test -f docs/architecture/linux-package-artifact-build-command-validation-contract.md
          test -f docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          test -f docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          test -f docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          test -f docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          test -f docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          test -f docs/architecture/linux-package-artifact-attestation-execution-validation-contract.md
          grep -q "Linux Package Checksum Manifest Contract" docs/architecture/linux-package-checksum-manifest-contract.md
          grep -q "Linux Package Publish Upload Boundary Contract" docs/architecture/linux-package-publish-upload-boundary-contract.md
          grep -q "Linux Package Signing Attestation Policy Binding Contract" docs/architecture/linux-package-signing-attestation-policy-binding-contract.md
          grep -q "Linux Package Release Notes Rollback Policy Binding Contract" docs/architecture/linux-package-release-notes-rollback-policy-binding-contract.md
          grep -q "Linux Package Release Notes Rollback Execution Validation Contract" docs/architecture/linux-package-release-notes-rollback-execution-validation-contract.md
          grep -q "Linux Package Publish Eligibility Aggregate Contract" docs/architecture/linux-package-publish-eligibility-aggregate-contract.md
          grep -q "Linux Package Publish Eligibility Execution Validation Contract" docs/architecture/linux-package-publish-eligibility-execution-validation-contract.md
          grep -q "Linux Package License Notice Transition Validation Contract" docs/architecture/linux-package-license-notice-transition-validation-contract.md
          grep -q "Linux Package Artifact Job Preflight Validation Contract" docs/architecture/linux-package-artifact-job-preflight-validation-contract.md
          grep -q "Linux Package Artifact Build Command Validation Contract" docs/architecture/linux-package-artifact-build-command-validation-contract.md
          grep -q "Linux Package Artifact Staging File Validation Contract" docs/architecture/linux-package-artifact-staging-file-validation-contract.md
          grep -q "Linux Package Artifact Archive Creation Validation Contract" docs/architecture/linux-package-artifact-archive-creation-validation-contract.md
          grep -q "Linux Package Artifact Checksum Execution Validation Contract" docs/architecture/linux-package-artifact-checksum-execution-validation-contract.md
          grep -q "Linux Package Artifact Manifest Generation Validation Contract" docs/architecture/linux-package-artifact-manifest-generation-validation-contract.md
          grep -q "Linux Package Artifact Manifest Checksum Validation Contract" docs/architecture/linux-package-artifact-manifest-checksum-validation-contract.md
          grep -q "Linux Package Workflow Artifact Bundle Upload Validation Contract" docs/architecture/linux-package-workflow-artifact-bundle-upload-validation-contract.md
          grep -q "Linux Package Artifact Attestation Execution Validation Contract" docs/architecture/linux-package-artifact-attestation-execution-validation-contract.md
          require_license_notice_repo_file() {
            case "$1" in
              ""|/*|*..*|http://*|https://*)
                echo "::error::license/NOTICE source must be a repository-relative file path."
                exit 1
                ;;
            esac
            test -f "$1"
          }

          validate_license_notice_transition() {
            grep -q '^linux-artifact-license-notice-source-contract=docs/architecture/linux-artifact-license-notice-confirmation.md$' docs/manual-intervention.md
            if grep -q '^linux-artifact-license-notice-status=confirmed$' docs/manual-intervention.md; then
              if grep -q '^linux-artifact-license-notice-status=pending$' docs/manual-intervention.md; then
                echo "::error::license/NOTICE cannot be pending and confirmed in the same manual record."
                exit 1
              fi
              grep -q '^linux-artifact-license-notice-transition-contract=docs/architecture/linux-package-license-notice-transition-validation-contract.md$' docs/manual-intervention.md
              grep -q '^linux-artifact-license-notice-transition-commit=independent-manual-confirmation-commit$' docs/manual-intervention.md
              grep -Eq '^linux-artifact-license-notice-confirmed-at=[0-9]{4}-[0-9]{2}-[0-9]{2}$' docs/manual-intervention.md
              grep -Eq '^linux-artifact-license-notice-confirmed-by=[A-Za-z0-9_.-]+$' docs/manual-intervention.md
              grep -q '^linux-artifact-license-notice-scope=networkcore-linux$' docs/manual-intervention.md
              grep -q '^linux-artifact-license-notice-license-source=LICENSE$' docs/manual-intervention.md
              license_source="$(sed -n 's/^linux-artifact-license-notice-license-source=//p' docs/manual-intervention.md | tail -n 1)"
              require_license_notice_repo_file "${license_source}"
              notice_source="$(sed -n 's/^linux-artifact-license-notice-notice-source=//p' docs/manual-intervention.md | tail -n 1)"
              if [ "${notice_source}" != "not-required" ]; then
                require_license_notice_repo_file "${notice_source}"
              fi
              grep -q '^linux-artifact-license-notice-artifact-files=.*LICENSE' docs/manual-intervention.md
              artifact_files="$(sed -n 's/^linux-artifact-license-notice-artifact-files=//p' docs/manual-intervention.md | tail -n 1)"
              case "${artifact_files}" in
                ""|/*|*..*|*http://*|*https://*)
                  echo "::error::license/NOTICE artifact files must stay repository/artifact relative and include LICENSE."
                  exit 1
                  ;;
              esac
              grep -q '^linux-artifact-license-notice-package-linux=eligible-after-ci-and-release-gates$' docs/manual-intervention.md
              grep -q '^linux-artifact-license-notice-release-assets=eligible-after-package-signing-checksum-and-rollback-gates$' docs/manual-intervention.md
            else
              grep -q '^linux-artifact-license-notice-status=pending$' docs/manual-intervention.md
              grep -q '^linux-artifact-license-notice-package-linux=blocked$' docs/manual-intervention.md
              grep -q '^linux-artifact-license-notice-release-assets=blocked$' docs/manual-intervention.md
            fi
          }

          validate_license_notice_transition
          if grep -Eq '^  package-linux:' .github/workflows/release.yml; then
            echo "::error::package-linux must stay undefined until license/NOTICE and artifact gates are complete."
            exit 1
          fi
          if grep -Eq '^  publish-github-release:' .github/workflows/release.yml; then
            echo "::error::publish-github-release must stay undefined until publish/upload gates are complete."
            exit 1
          fi
          if grep -Eq '^  (attest-linux|sign-linux):' .github/workflows/release.yml; then
            echo "::error::attest-linux and sign-linux must stay undefined until signing/attestation gates are complete."
            exit 1
          fi
          if grep -Eq '^  post-release-summary:' .github/workflows/release.yml; then
            echo "::error::post-release-summary must stay undefined until release notes/rollback gates are complete."
            exit 1
          fi
          if grep -Eq '^  publish-eligibility-gate:' .github/workflows/release.yml; then
            echo "::error::publish-eligibility-gate must stay undefined until publish eligibility execution is implemented."
            exit 1
          fi
          if grep -Eq '^[[:space:]]+run:[[:space:]]+gh release create([[:space:]]|$)' .github/workflows/release.yml; then
            echo "::error::gh release create must stay disabled until release notes/rollback execution and publish eligibility gates are complete."
            exit 1
          fi
          if grep -Eq '^[[:space:]]+uses:[[:space:]]+(softprops/action-gh-release|ncipollo/release-action|actions/create-release|actions/upload-release-asset)(@|$)' .github/workflows/release.yml; then
            echo "::error::GitHub Release actions must stay disabled until release notes/rollback execution and publish eligibility gates are complete."
            exit 1
          fi
          echo "No release artifacts are defined yet."
          echo "Linux artifact readiness is checked, but package-linux is not defined yet."
          echo "Add platform-specific packaging jobs only after all artifact gates are complete."
          {
            echo "### Linux Artifact Manifest Output Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | placeholder summary only |"
            echo "| Required manifest outputs | artifact_manifest_name, artifact_manifest_path, artifact_manifest_checksum_file, artifact_manifest_checksum_value |"
            echo "| Required archive outputs | artifact_name, artifact_path, checksum_algorithm, checksum_file, checksum_value |"
            echo "| Manifest checksum algorithm | sha256 |"
            echo "| Release summary requirement | archive checksum and manifest checksum must both be visible before upload |"
            echo "| License or NOTICE confirmation | manual confirmation required before real artifact packaging |"
            echo "| Current package-linux job | not defined |"
            echo "| Current release asset upload | blocked |"
            echo
            echo "### Linux Package Release CI Gate Activation Validation Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | api-read-active |"
            echo "| Source contract | docs/architecture/linux-package-release-ci-gate-activation-validation-contract.md |"
            echo "| Activation status | active |"
            echo "| Required permission | actions-read |"
            echo "| Permission status | enabled |"
            echo "| API source | github-actions-runs-api |"
            echo "| API status | queried |"
            echo "| Required workflow | CI |"
            echo "| Required workflow file | .github/workflows/ci.yml |"
            echo "| Required branch | main |"
            echo "| Required status | completed |"
            echo "| Required conclusion | success |"
            echo "| Required head SHA | same-release-sha |"
            echo "| Failure mode | fail-before-package-linux |"
            echo "| Current package-linux job | not defined |"
            echo "| Current artifacts | blocked |"
            echo "| Next action | license-notice-and-package-linux-preflight-after-ci-gate |"
            echo
            echo "### Release CI Gate Execution Validation Contract"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Current mode | api-read-active |"
            echo "| Source contract | docs/architecture/release-ci-gate-execution-validation-contract.md |"
            echo "| Execution status | active |"
            echo "| Required job | release-ci-gate |"
            echo "| Current job status | active |"
            echo "| Required permission | actions-read |"
            echo "| Permission status | enabled |"
            echo "| API source | github-actions-runs-api |"
            echo "| API status | queried |"
            echo "| Query workflow | CI |"
            echo "| Query workflow file | .github/workflows/ci.yml |"
            echo "| Query branch | main |"
            echo "| Query head SHA | same-release-sha |"
            echo "| Query status | completed |"
            echo "| Required conclusion | success |"
            echo "| Allowed events | push,workflow_dispatch |"
            echo "| Required fields | ci_workflow_name,ci_workflow_file,ci_run_id,ci_run_attempt,ci_run_url,ci_run_status,ci_run_conclusion,ci_head_sha,ci_head_branch,ci_event,ci_repository,ci_checked_at |"
            echo "| CI summary | success |"
            echo "| Manual input | blocked |"
            echo "| Current package-linux job | not defined |"
            echo "| Current workflow artifact | blocked |"
            echo "| Current release asset | blocked |"
