          RELEASE_ROLLBACK_CONTRACT_RESULT: ${{ needs.release-rollback-contract.result }}
          LINUX_ARTIFACT_READINESS_RESULT: ${{ needs.linux-artifact-readiness.result }}
          RELEASE_PLACEHOLDER_RESULT: ${{ needs.release-placeholder.result }}
